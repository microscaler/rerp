apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: accounts-payable
  labels:
    delivery.rerp.io/status: scaffold-only
  annotations:
    delivery.rerp.io/activation-gates: real-implementation,tests,published-image,image-policy
spec:
  suspend: true
  interval: 5m
  chart:
    spec:
      chart: ./helm/rerp-microservice
      reconcileStrategy: Revision
      sourceRef: {kind: GitRepository, name: product-rerp, namespace: flux-system}
  values:
    service: {name: accounts-payable}
    image: {repository: 10.177.76.220:5000, name: rerp-accounting-accounts-payable, tag: not-published}
    deployment: {namespace: rerp}
    app: {binaryName: accounts_payable, serviceName: accounts-payable}
---
