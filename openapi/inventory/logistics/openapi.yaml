openapi: 3.1.0
info:
  title: Logistics & Shipping
  version: 1.0.0
  description: Logistics and shipping service integrating with carriers.
servers:
- url: /api/v1/inventory/logistics
  description: Logistics & Shipping API
tags:
- name: carriers
  description: Shipping carrier profiles and configurations
- name: shipments
  description: Outbound shipment management and tracking
- name: shipping-rates
  description: Carrier rate cards and shipping cost calculations
paths:
  /shipments:
    get:
      operationId: list_shipments
      summary: List shipments
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: List of shipments
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Shipment'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
        '401':
          description: Unauthorized - invalid or missing authentication token
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: List all shipments with pagination
      security:
      - httpBearer: []
      tags:
      - shipments
      x-brrtrouter-impl: list_shipments_handler
      x-operation-id: list_shipments
      x-controller: ShipmentController
      x-handler-name: list_shipments
    post:
      operationId: create_shipment
      summary: Create shipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShipmentRequest'
        description: Request body for creating a new shipment
      responses:
        '201':
          description: Shipment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized - invalid or missing authentication token
        '403':
          description: Forbidden - insufficient permissions
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: Create a new shipment
      security:
      - httpBearer: []
      tags:
      - shipments
      x-brrtrouter-impl: create_shipment_handler
      x-operation-id: create_shipment
      x-controller: ShipmentController
      x-handler-name: create_shipment
  /shipments/{id}:
    get:
      operationId: get_shipment
      summary: Get shipment by id
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Shipment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
        '404':
          description: Not found
        '401':
          description: Unauthorized - invalid or missing authentication token
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: Get shipment details by ID
      security:
      - httpBearer: []
      tags:
      - shipments
      x-brrtrouter-impl: get_shipment_handler
      x-operation-id: get_shipment
      x-controller: ShipmentController
      x-handler-name: get_shipment
    put:
      operationId: update_shipment
      summary: Update shipment
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShipmentRequest'
        description: Request body for updating an existing shipment
      responses:
        '200':
          description: Shipment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
        '404':
          description: Not found
        '400':
          description: Bad request - invalid input parameters
        '401':
          description: Unauthorized - invalid or missing authentication token
        '403':
          description: Forbidden - insufficient permissions
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: Update an existing shipment (tracking, status, cost)
      security:
      - httpBearer: []
      tags:
      - shipments
      x-brrtrouter-impl: update_shipment_handler
      x-operation-id: update_shipment
      x-controller: ShipmentController
      x-handler-name: update_shipment
    delete:
      operationId: delete_shipment
      summary: Delete shipment
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Shipment deleted
        '404':
          description: Not found
        '401':
          description: Unauthorized - invalid or missing authentication token
        '403':
          description: Forbidden - insufficient permissions
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: Delete a shipment
      security:
      - httpBearer: []
      tags:
      - shipments
      x-brrtrouter-impl: delete_shipment_handler
      x-operation-id: delete_shipment
      x-controller: ShipmentController
      x-handler-name: delete_shipment
  /carriers:
    get:
      operationId: list_carriers
      summary: List carriers
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: List of carriers
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Carrier'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
        '401':
          description: Unauthorized - invalid or missing authentication token
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: List all shipping carriers with pagination
      security:
      - httpBearer: []
      tags:
      - carriers
      x-brrtrouter-impl: list_carriers_handler
      x-operation-id: list_carriers
      x-controller: CarrierController
      x-handler-name: list_carriers
    post:
      operationId: create_carrier
      summary: Create carrier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCarrierRequest'
        description: Request body for creating a new carrier profile
      responses:
        '201':
          description: Carrier created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrier'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized - invalid or missing authentication token
        '403':
          description: Forbidden - insufficient permissions
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: Create a new carrier profile
      security:
      - httpBearer: []
      tags:
      - carriers
      x-brrtrouter-impl: create_carrier_handler
      x-operation-id: create_carrier
      x-controller: CarrierController
      x-handler-name: create_carrier
  /carriers/{id}:
    get:
      operationId: get_carrier
      summary: Get carrier by id
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Carrier details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrier'
        '404':
          description: Not found
        '401':
          description: Unauthorized - invalid or missing authentication token
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: Get carrier details by ID
      security:
      - httpBearer: []
      tags:
      - carriers
      x-brrtrouter-impl: get_carrier_handler
      x-operation-id: get_carrier
      x-controller: CarrierController
      x-handler-name: get_carrier
    put:
      operationId: update_carrier
      summary: Update carrier
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCarrierRequest'
        description: Request body for updating an existing carrier profile
      responses:
        '200':
          description: Carrier updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrier'
        '404':
          description: Not found
        '400':
          description: Bad request - invalid input parameters
        '401':
          description: Unauthorized - invalid or missing authentication token
        '403':
          description: Forbidden - insufficient permissions
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: Update an existing carrier profile
      security:
      - httpBearer: []
      tags:
      - carriers
      x-brrtrouter-impl: update_carrier_handler
      x-operation-id: update_carrier
      x-controller: CarrierController
      x-handler-name: update_carrier
    delete:
      operationId: delete_carrier
      summary: Delete carrier
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Carrier deleted
        '404':
          description: Not found
        '401':
          description: Unauthorized - invalid or missing authentication token
        '403':
          description: Forbidden - insufficient permissions
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: Delete a carrier profile
      security:
      - httpBearer: []
      tags:
      - carriers
      x-brrtrouter-impl: delete_carrier_handler
      x-operation-id: delete_carrier
      x-controller: CarrierController
      x-handler-name: delete_carrier
  /shipping-rates:
    get:
      operationId: list_shipping_rates
      summary: List shipping-rates
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: List of shipping-rates
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ShippingRate'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
        '401':
          description: Unauthorized - invalid or missing authentication token
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: List all shipping rates with pagination
      security:
      - httpBearer: []
      tags:
      - shipping-rates
      x-brrtrouter-impl: list_shipping_rates_handler
      x-operation-id: list_shipping_rates
      x-controller: ShippingRateController
      x-handler-name: list_shipping_rates
    post:
      operationId: create_shipping_rate
      summary: Create shipping-rate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShippingRateRequest'
        description: Request body for creating a new shipping rate
      responses:
        '201':
          description: ShippingRate created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingRate'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized - invalid or missing authentication token
        '403':
          description: Forbidden - insufficient permissions
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: Create a new shipping rate
      security:
      - httpBearer: []
      tags:
      - shipping-rates
      x-brrtrouter-impl: create_shipping_rate_handler
      x-operation-id: create_shipping_rate
      x-controller: ShippingRateController
      x-handler-name: create_shipping_rate
  /shipping-rates/{id}:
    get:
      operationId: get_shipping_rate
      summary: Get shipping-rate by id
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: ShippingRate details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingRate'
        '404':
          description: Not found
        '401':
          description: Unauthorized - invalid or missing authentication token
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: Get shipping rate details by ID
      security:
      - httpBearer: []
      tags:
      - shipping-rates
      x-brrtrouter-impl: get_shipping_rate_handler
      x-operation-id: get_shipping_rate
      x-controller: ShippingRateController
      x-handler-name: get_shipping_rate
    put:
      operationId: update_shipping_rate
      summary: Update shipping-rate
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShippingRateRequest'
        description: Request body for updating an existing shipping rate
      responses:
        '200':
          description: ShippingRate updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingRate'
        '404':
          description: Not found
        '400':
          description: Bad request - invalid input parameters
        '401':
          description: Unauthorized - invalid or missing authentication token
        '403':
          description: Forbidden - insufficient permissions
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: Update an existing shipping rate
      security:
      - httpBearer: []
      tags:
      - shipping-rates
      x-brrtrouter-impl: update_shipping_rate_handler
      x-operation-id: update_shipping_rate
      x-controller: ShippingRateController
      x-handler-name: update_shipping_rate
    delete:
      operationId: delete_shipping_rate
      summary: Delete shipping-rate
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: ShippingRate deleted
        '404':
          description: Not found
        '401':
          description: Unauthorized - invalid or missing authentication token
        '403':
          description: Forbidden - insufficient permissions
        '409':
          description: Conflict - resource conflict or operation cannot be completed
        '500':
          description: Internal server error
      description: Delete a shipping rate
      security:
      - httpBearer: []
      tags:
      - shipping-rates
      x-brrtrouter-impl: delete_shipping_rate_handler
      x-operation-id: delete_shipping_rate
      x-controller: ShippingRateController
      x-handler-name: delete_shipping_rate
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Search:
      name: search
      in: query
      schema:
        type: string
  schemas:
    BaseEntity:
      type: object
      description: Base entity with audit fields
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
    Carrier:
      type: object
      description: Shipping carrier profile with account details and enabled services
      allOf:
      - $ref: '#/components/schemas/BaseEntity'
      - type: object
        properties:
          name:
            type: string
            description: Carrier display name (e.g., FedEx, UPS, DHL)
          code:
            type: string
            description: Unique carrier code (e.g., FEDEX, UPS, DHL)
          account_number:
            type: string
            description: Carrier account number
          api_key:
            type: string
            description: Carrier API credentials (encrypted)
          service_levels:
            type: array
            items:
              type: string
            description: Enabled service levels (e.g., ground, 2-day, overnight)
          is_active:
            type: boolean
            description: Whether this carrier is enabled for shipping
          default_service:
            type: string
            description: Default service level for rate shopping
          country:
            type: string
            description: Carrier operating country code
          website:
            type: string
            format: uri
            nullable: true
            description: Carrier website URL
          tracking_url_template:
            type: string
            description: URL template for tracking page (e.g., https://www.fedex.com/apps/fedextrack/?tracknumbers={tracking_number})
          notes:
            type: string
            description: Additional notes
    CreateCarrierRequest:
      type: object
      description: Request body for creating a new carrier profile
      required:
      - name
      - code
      properties:
        name:
          type: string
          description: Carrier display name
        code:
          type: string
          description: Unique carrier code
        account_number:
          type: string
          description: Carrier account number
        api_key:
          type: string
          description: Carrier API credentials
        service_levels:
          type: array
          items:
            type: string
          description: Enabled service levels
        is_active:
          type: boolean
          description: Whether carrier is active
        default_service:
          type: string
          description: Default service level
        country:
          type: string
          description: Operating country code
        website:
          type: string
          format: uri
          nullable: true
          description: Carrier website
        tracking_url_template:
          type: string
          description: Tracking URL template
        notes:
          type: string
          description: Additional notes
    UpdateCarrierRequest:
      type: object
      description: Request body for updating an existing carrier profile
      properties:
        name:
          type: string
          description: Carrier display name
        account_number:
          type: string
          description: Account number
        api_key:
          type: string
          description: API credentials
        service_levels:
          type: array
          items:
            type: string
          description: Enabled service levels
        is_active:
          type: boolean
          description: Toggle active status
        default_service:
          type: string
          description: Default service level
        website:
          type: string
          format: uri
          nullable: true
          description: Carrier website
        tracking_url_template:
          type: string
          description: Tracking URL template
        notes:
          type: string
          description: Notes
    Shipment:
      type: object
      description: Outbound shipment with carrier, tracking, and delivery status
      allOf:
      - $ref: '#/components/schemas/BaseEntity'
      - type: object
        properties:
          dropship_order_id:
            type: string
            format: uuid
            nullable: true
            description: Parent dropship order reference
          vendor_order_id:
            type: string
            format: uuid
            nullable: true
            description: Parent vendor order reference
          carrier_id:
            type: string
            format: uuid
            description: Shipping carrier reference
          carrier_name:
            type: string
            description: Carrier display name
          service_level:
            type: string
            description: Selected service level (e.g., ground, 2-day)
          tracking_number:
            type: string
            nullable: true
            description: Carrier tracking number
          tracking_url:
            type: string
            format: uri
            nullable: true
            description: Carrier tracking page URL
          status:
            type: string
            enum:
            - pending
            - label_created
            - in_transit
            - out_for_delivery
            - delivered
            - failed
            - returned
            description: Shipment delivery status
          weight:
            type: number
            format: double
            nullable: true
            description: Package weight in kg
          dimensions:
            type: object
            nullable: true
            properties:
              length:
                type: number
              width:
                type: number
              height:
                type: number
            description: Package dimensions in cm
          shipping_cost:
            type: number
            format: double
            nullable: true
            description: Actual shipping cost paid to carrier
          estimated_delivery:
            type: string
            format: date-time
            nullable: true
            description: Estimated delivery date
          actual_delivery:
            type: string
            format: date-time
            nullable: true
            description: Actual delivery date
          shipping_label_url:
            type: string
            format: uri
            nullable: true
            description: URL to download shipping label PDF
          notes:
            type: string
            description: Additional notes
    CreateShipmentRequest:
      type: object
      description: Request body for creating a new shipment
      required:
      - dropship_order_id
      - carrier_id
      properties:
        dropship_order_id:
          type: string
          format: uuid
          description: Parent dropship order ID
        vendor_order_id:
          type: string
          format: uuid
          nullable: true
          description: Parent vendor order ID
        carrier_id:
          type: string
          format: uuid
          description: Shipping carrier ID
        service_level:
          type: string
          description: Selected service level
        weight:
          type: number
          format: double
          nullable: true
          description: Package weight in kg
        dimensions:
          type: object
          nullable: true
          description: Package dimensions in cm
        notes:
          type: string
          description: Notes
    UpdateShipmentRequest:
      type: object
      description: Request body for updating an existing shipment
      properties:
        tracking_number:
          type: string
          nullable: true
          description: Update tracking number
        status:
          type: string
          enum:
          - pending
          - label_created
          - in_transit
          - out_for_delivery
          - delivered
          - failed
          - returned
          description: Update delivery status
        estimated_delivery:
          type: string
          format: date-time
          nullable: true
          description: Updated estimated delivery
        actual_delivery:
          type: string
          format: date-time
          nullable: true
          description: Record actual delivery
        shipping_cost:
          type: number
          format: double
          nullable: true
          description: Update actual shipping cost
        notes:
          type: string
          description: Update notes
    ShippingRate:
      type: object
      description: Pre-negotiated or negotiated carrier rate by service level and
        zone
      allOf:
      - $ref: '#/components/schemas/BaseEntity'
      - type: object
        properties:
          carrier_id:
            type: string
            format: uuid
            description: Carrier reference
          carrier_name:
            type: string
            description: Carrier display name
          service_level:
            type: string
            description: Service level (e.g., ground, 2-day, overnight)
          origin_zip:
            type: string
            description: Origin ZIP code
          destination_zip:
            type: string
            description: Destination ZIP code
          zone:
            type: string
            description: Shipping zone (e.g., Zone 1-8)
          min_weight:
            type: number
            format: double
            description: Minimum weight for this rate (kg)
          max_weight:
            type: number
            format: double
            description: Maximum weight for this rate (kg)
          base_rate:
            type: number
            format: double
            description: Base rate for weight range
          per_kg_rate:
            type: number
            format: double
            description: Per-kg rate for weight above minimum
          fuel_surcharge:
            type: number
            format: double
            description: Fuel surcharge percentage
          residential_surcharge:
            type: number
            format: double
            description: Residential delivery surcharge
          is_active:
            type: boolean
            description: Whether this rate is active
          effective_from:
            type: string
            format: date-time
            description: Rate effective start date
          effective_until:
            type: string
            format: date-time
            nullable: true
            description: Rate effective end date
          notes:
            type: string
            description: Notes about this rate
    CreateShippingRateRequest:
      type: object
      description: Request body for creating a new shipping rate
      required:
      - carrier_id
      - service_level
      properties:
        carrier_id:
          type: string
          format: uuid
          description: Carrier reference
        carrier_name:
          type: string
          description: Carrier display name
        service_level:
          type: string
          description: Service level
        origin_zip:
          type: string
          description: Origin ZIP code
        destination_zip:
          type: string
          description: Destination ZIP code
        zone:
          type: string
          description: Shipping zone
        min_weight:
          type: number
          format: double
          description: Minimum weight (kg)
        max_weight:
          type: number
          format: double
          description: Maximum weight (kg)
        base_rate:
          type: number
          format: double
          description: Base rate
        per_kg_rate:
          type: number
          format: double
          description: Per-kg rate
        fuel_surcharge:
          type: number
          format: double
          description: Fuel surcharge percentage
        residential_surcharge:
          type: number
          format: double
          description: Residential surcharge
        is_active:
          type: boolean
          description: Whether rate is active
        effective_from:
          type: string
          format: date-time
          description: Effective start date
        effective_until:
          type: string
          format: date-time
          nullable: true
          description: Effective end date
        notes:
          type: string
          description: Notes
    UpdateShippingRateRequest:
      type: object
      description: Request body for updating an existing shipping rate
      properties:
        carrier_id:
          type: string
          format: uuid
          description: Carrier reference
        service_level:
          type: string
