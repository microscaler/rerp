components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Search:
      name: search
      in: query
      schema:
        type: string
    CompanyId:
      name: company_id
      in: query
      schema:
        type: string
        format: uuid
  schemas:
    AccountsPayableApprovalRecord:
      type: object
      required:
      - id
      - invoice_id
      - approver_id
      - action
      - date
      properties:
        id:
          type: string
          format: uuid
        invoice_id:
          type: string
          format: uuid
          description: Invoice being approved
        approver_id:
          type: string
