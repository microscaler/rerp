      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/vendor-invoices/{id}/three-way-match
  /api/accounts-receivable/ar-agings:
    get:
      operationId: list_ar_agings
      summary: List AR aging records
      description: List all AR aging analysis records, optionally filtered by customer or company.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: customer_id
        in: query
        schema:
          type: string
