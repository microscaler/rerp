      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountsPayableUpdateVendorInvoiceRequest'
      responses:
        '200':
          description: VendorInvoice updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableVendorInvoice'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/vendor-invoices/{id}
    delete:
      operationId: delete_vendor_invoice
      summary: Delete vendor invoice
      description: Delete a vendor invoice record. Only allowed for invoices in DRAFT status.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: VendorInvoice deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
        '409':
