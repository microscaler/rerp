paths:
  /api/accounts-payable/approvals:
    get:
      operationId: list_approvals
      summary: List approvals
      description: List all approval records with filtering by invoice, approver, and status.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: invoice_id
        in: query
        schema:
          type: string
          format: uuid
      - name: approver_id
        in: query
        schema:
          type: string
          format: uuid
      - name: action
        in: query
        schema:
          type: string
          enum:
          - APPROVE
          - REJECT
          - REQUEST_INFO
          - DELEGATE
      responses:
        '200':
          description: Paginated list of approval records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayablePaginatedApprovals'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/approvals
    post:
      operationId: create_approval
      summary: Submit approval action
      description: Approve, reject, or request more information on an invoice as part of the approval workflow.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountsPayableCreateApprovalRequest'
      responses:
        '201':
          description: ApprovalRecord created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableApprovalRecord'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableValidationError'
        '403':
          description: Forbidden - user not authorized to approve this invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/approvals
  /api/accounts-payable/commitments:
    get:
      operationId: list_payment_commitments
      summary: List payment commitments
      description: List all payment commitments (approved invoices awaiting payment) with filtering by vendor and due date.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: vendor_id
        in: query
        schema:
          type: string
          format: uuid
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: due_before
        in: query
        schema:
          type: string
          format: date
        description: Due before this date
      - name: due_after
        in: query
        schema:
          type: string
          format: date
        description: Due after this date
      responses:
        '200':
          description: Paginated list of payment commitments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayablePaginatedCommitments'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/commitments
  /api/accounts-payable/payment-batches:
    get:
      operationId: list_payment_batches
      summary: List payment batches
      responses:
        '200':
          description: Payment batches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayablePaginatedPaymentBatches'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/payment-batches
    post:
      operationId: create_payment_batch
      summary: Create payment batch
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountsPayableCreatePaymentBatchRequest'
      responses:
        '201':
          description: Payment batch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayablePaymentBatch'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/payment-batches
  /api/accounts-payable/payment-batches/{id}/approve:
    post:
      operationId: approve_payment_batch
      summary: Approve payment batch
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Payment batch approved
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/payment-batches/{id}/approve
  /api/accounts-payable/payment-batches/{id}/export-payment-file:
    post:
      operationId: export_payment_batch_file
      summary: Export payment batch file
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountsPayableExportPaymentFileRequest'
      responses:
        '202':
          description: Payment file generation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayablePaymentFileExport'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/payment-batches/{id}/export-payment-file
  /api/accounts-payable/payments:
    get:
      operationId: list_payments
      summary: List payments
      description: Paginated list of all vendor payments with filtering by status, date range, and vendor.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
        description: Search by reference number or vendor
      - name: status
        in: query
        schema:
          type: string
          enum:
          - SCHEDULED
          - PENDING
          - SENT
          - COMPLETED
          - FAILED
          - CANCELLED
      - name: payment_method
        in: query
        schema:
          type: string
          enum:
          - WIRE
          - CHECK
          - ACH
          - BANK_TRANSFER
          - PAYMENT_GATEWAY
          - COUNTER_SERVICE
      - name: vendor_id
        in: query
        schema:
          type: string
          format: uuid
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: date_from
        in: query
        schema:
          type: string
          format: date
        description: Payment date from
      - name: date_to
        in: query
        schema:
          type: string
          format: date
        description: Payment date to
      responses:
        '200':
          description: Paginated list of payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayablePaginatedVendorPayments'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/payments
    post:
      operationId: create_payment
      summary: Create payment
      description: Schedule a new vendor payment. Optionally auto-disburse if auto_disburse is true.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountsPayableCreateVendorPaymentRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableVendorPayment'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableValidationError'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/payments
  /api/accounts-payable/payments/{id}:
    get:
      operationId: get_payment
      summary: Get payment by id
      description: Retrieve payment details.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableVendorPayment'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/payments/{id}
    put:
      operationId: update_payment
      summary: Update payment
      description: Update a payment's details. Only scheduled or pending payments can be modified.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountsPayableUpdateVendorPaymentRequest'
      responses:
        '200':
          description: Payment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableVendorPayment'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
        '409':
          description: Cannot update completed or cancelled payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/payments/{id}
    delete:
      operationId: delete_payment
      summary: Delete payment
      description: Delete a payment. Only scheduled or pending payments can be deleted.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Payment deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
        '409':
          description: Cannot delete completed payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/payments/{id}
  /api/accounts-payable/reports/cash-flow-forecast:
    get:
      operationId: cash_flow_forecast
      summary: Cash flow forecast
      description: Generate a cash flow forecast for the AP service showing upcoming payment commitments and scheduled payments.
      x-brrtrouter-impl: true
      parameters:
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by company
      - name: period_start
        in: query
        schema:
          type: string
          format: date
        description: Forecast start date
      - name: period_end
        in: query
        schema:
          type: string
          format: date
        description: Forecast end date
      - name: currency_code
        in: query
        schema:
          type: string
          minLength: 3
          maxLength: 3
        description: Currency for the forecast
      responses:
        '200':
          description: Cash flow forecast with daily breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableCashFlowForecast'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/reports/cash-flow-forecast
  /api/accounts-payable/vendor-invoices:
    get:
      operationId: list_vendor_invoices
      summary: List vendor invoices
      description: Paginated list of all vendor invoices with AP-specific fields including approval status and payment status.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
        description: Search by vendor name, invoice number, or status
      - name: status
        in: query
        schema:
          type: string
          enum:
          - DRAFT
          - PENDING_APPROVAL
          - APPROVED
          - REJECTED
          - POSTED
      - name: approval_status
        in: query
        schema:
          type: string
          enum:
          - PENDING
          - APPROVED
          - REJECTED
          - CANCELLED
      - name: payment_status
        in: query
        schema:
          type: string
          enum:
          - UNPAID
          - SCHEDULED
          - PARTIAL
          - PAID
          - DISPUTED
      - name: vendor_id
        in: query
        schema:
          type: string
          format: uuid
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: currency_code
        in: query
        schema:
          type: string
          minLength: 3
          maxLength: 3
      - name: date_from
        in: query
        schema:
          type: string
          format: date
        description: Invoice date from
      - name: date_to
        in: query
        schema:
          type: string
          format: date
        description: Invoice date to
      responses:
        '200':
          description: Paginated list of vendor invoices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayablePaginatedVendorInvoices'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/vendor-invoices
    post:
      operationId: create_vendor_invoice
      summary: Create vendor invoice
      description: Create a new AP record for a vendor invoice. Links the invoice to the vendor and initializes the approval
        workflow.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountsPayableCreateVendorInvoiceRequest'
      responses:
        '201':
          description: VendorInvoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableVendorInvoice'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableValidationError'
      x-service: accounts-payable
      x-service-base-path: /api/accounts-payable
      x-brrtrouter-downstream-path: /api/accounts-payable/vendor-invoices
  /api/accounts-payable/vendor-invoices/{id}:
    get:
      operationId: get_vendor_invoice
      summary: Get vendor invoice by id
      description: Retrieve a single vendor invoice with its full AP details including approval history and payment status.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: VendorInvoice details with AP context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableVendorInvoiceWithDetails'
        '404':
