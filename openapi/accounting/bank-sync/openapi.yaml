openapi: 3.1.0
info:
  title: Bank Sync
  version: 1.0.0
  description: Bank synchronization service managing bank account connections, statement imports, reconciliations, and cash
    management. Supports multiple bank integrations, automated reconciliation, and bank feed monitoring.
  contact:
    name: RERP Accounting API Support
    email: accounting-api@rerp.ai
servers:
- url: http://localhost:8008/api/v1/accounting/bank-sync
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/accounting/bank-sync
  description: Bank Sync API
tags:
- name: bank-accounts
  description: Bank account management and connections
- name: statements
  description: Bank statement imports and management
- name: reconciliation
  description: Bank reconciliation matching and posting
- name: transactions
  description: Raw bank transaction feed monitoring
- name: reports
  description: Bank reporting and cash management
paths:
  /bank-accounts:
    get:
      operationId: list_bank_accounts
      summary: List bank accounts
      description: Paginated list of all bank accounts with filtering by type, status, and company.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
        description: Search by account name or number
      - name: account_type
        in: query
        schema:
          type: string
          enum:
          - CHECKING
          - SAVINGS
          - CREDIT_CARD
          - LOAN
          - MONEY_MARKET
          - CASH
          - OTHER
      - name: status
        in: query
        schema:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - CLOSED
          - SYNCING
          - ERROR
      - name: currency_code
        in: query
        schema:
          type: string
          minLength: 3
          maxLength: 3
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: sync_enabled
        in: query
        schema:
          type: boolean
        description: Filter by sync enabled status
      responses:
        '200':
          description: Paginated list of bank accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBankAccounts'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_bank_account
      summary: Create bank account
      description: Create a new bank account with optional opening balance.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBankAccountRequest'
      responses:
        '201':
          description: BankAccount created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccount'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: &id001
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: &id002
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: &id003
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /bank-accounts/{id}:
    get:
      operationId: get_bank_account
      summary: Get bank account by id
      description: Retrieve bank account details with recent transactions.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: BankAccount details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccount'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: update_bank_account
      summary: Update bank account
      description: Update bank account details.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBankAccountRequest'
      responses:
        '200':
          description: BankAccount updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccount'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error
          content: &id004
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
    delete:
      operationId: delete_bank_account
      summary: Delete bank account
      description: Delete a bank account. Only allowed for closed or inactive accounts with no transactions.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: BankAccount deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot delete active account with transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /statements:
    get:
      operationId: list_bank_statements
      summary: List bank statements
      description: List all bank statements with filtering by account, date, and status.
      x-brrtrouter-impl: true
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: bank_account_id
        in: query
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        schema:
          type: string
          enum:
          - IMPORTED
          - PROCESSING
          - MATCHED
          - PARTIALLY_MATCHED
          - READY_FOR_RECONCILIATION
          - RECONCILED
          - ERROR
      - name: date_from
        in: query
        schema:
          type: string
          format: date
        description: Statement date from
      - name: date_to
        in: query
        schema:
          type: string
          format: date
        description: Statement date to
      responses:
        '200':
          description: Paginated list of bank statements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBankStatements'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_bank_statement
      summary: Import bank statement
      description: Import a new bank statement with transactions. Supports CSV, OFX, QIF, and MT940 formats.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBankStatementRequest'
      responses:
        '201':
          description: BankStatement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankStatement'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
  /statements/{id}:
    get:
      operationId: get_bank_statement
      summary: Get bank statement by id
      description: Get a bank statement with all transactions.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: BankStatement details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankStatement'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /statements/{id}/trigger-sync:
    post:
      operationId: trigger_statement_sync
      summary: Trigger statement sync
      description: Trigger a sync with the bank to fetch new statements for an account.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Sync triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  sync_status:
                    type: string
                  statements_found:
                    type: integer
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error
          content: *id004
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
  /transactions:
    get:
      operationId: list_bank_transactions
      summary: List bank transactions
      description: List all bank transactions with filtering by account, date, status, and counterparty.
      x-brrtrouter-impl: true
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: bank_account_id
        in: query
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        schema:
          type: string
          enum:
          - RAW
          - MATCHED
          - RECONCILED
          - DISPUTED
          - FILTERED
      - name: date_from
        in: query
        schema:
          type: string
          format: date
        description: Transaction date from
      - name: date_to
        in: query
        schema:
          type: string
          format: date
        description: Transaction date to
      - name: description_contains
        in: query
        schema:
          type: string
        description: Filter by description substring
      - name: min_amount
        in: query
        schema:
          type: number
          format: double
        description: Minimum amount
      - name: max_amount
        in: query
        schema:
          type: number
          format: double
        description: Maximum amount
      responses:
        '200':
          description: Paginated list of bank transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBankTransactions'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /transactions/{id}/match:
    post:
      operationId: match_transaction
      summary: Match transaction to entry
      description: Match a raw bank transaction to a GL entry, invoice, or payment.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBankTransactionMatchingRequest'
      responses:
        '200':
          description: Transaction matched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankTransaction'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Transaction or matched entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Transaction is already matched or reconciled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
  /transactions/auto-match:
    post:
      operationId: auto_match_transactions
      summary: Auto-match transactions
      description: Automatically match raw transactions to existing entries using amount, date, and description matching.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - bank_account_id
              properties:
                bank_account_id:
                  type: string
                  format: uuid
                date_range_from:
                  type: string
                  format: date
                date_range_to:
                  type: string
                  format: date
                match_tolerance:
                  type: number
                  format: double
                  description: Amount match tolerance in seconds
                description_similarity_threshold:
                  type: number
                  format: double
                  description: 0-1 threshold for description matching
      responses:
        '200':
          description: Auto-match results
          content:
            application/json:
              schema:
                type: object
                properties:
                  matched_count:
                    type: integer
                  remaining_unmatched:
                    type: integer
                  matches:
                    type: array
                    items:
                      type: object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
  /reconciliations:
    get:
      operationId: list_reconciliations
      summary: List reconciliations
      description: List all bank reconciliations with filtering by account and date.
      x-brrtrouter-impl: true
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: bank_account_id
        in: query
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        schema:
          type: string
          enum:
          - DRAFT
          - IN_PROGRESS
          - BALANCED
          - IMBALANCED
          - COMPLETED
      - name: date_from
        in: query
        schema:
          type: string
          format: date
        description: Reconciliation date from
      - name: date_to
        in: query
        schema:
          type: string
          format: date
        description: Reconciliation date to
      responses:
        '200':
          description: Paginated list of reconciliations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReconciliations'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_reconciliation
      summary: Create bank reconciliation
      description: Start a new bank reconciliation for a bank account and statement.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBankReconciliationRequest'
      responses:
        '201':
          description: Reconciliation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankReconciliation'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Reconciliation already exists for this account and date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
  /reconciliations/{id}/complete:
    post:
      operationId: complete_reconciliation
      summary: Complete bank reconciliation
      description: Complete a bank reconciliation. Only allowed when the difference is zero (balanced).
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Reconciliation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankReconciliation'
        '400':
          description: Reconciliation is not balanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Reconciliation is already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
  /reports/reconciliation:
    get:
      operationId: reconciliation_report
      summary: Bank reconciliation report
      description: Generate a reconciliation report for a bank account over a period.
      x-brrtrouter-impl: true
      parameters:
      - name: bank_account_id
        in: query
        schema:
          type: string
          format: uuid
        description: Bank account
      - name: period_start
        in: query
        schema:
          type: string
          format: date
        description: Period start
      - name: period_end
        in: query
        schema:
          type: string
          format: date
        description: Period end
      responses:
        '200':
          description: Reconciliation report data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankReconciliationReport'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /reports/cash-position:
    get:
      operationId: cash_position
      summary: Cash position report
      description: Get current cash position across all bank accounts for a company.
      x-brrtrouter-impl: true
      parameters:
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
        description: Company ID
      - name: as_of_date
        in: query
        schema:
          type: string
          format: date
        description: Date for snapshot. Defaults to today.
      responses:
        '200':
          description: Cash position report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashPosition'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /reconciliation-models:
    get:
      operationId: list_reconciliation_models
      summary: List reconciliation models
      responses:
        '200':
          description: Reconciliation models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReconciliationModels'
    post:
      operationId: create_reconciliation_model
      summary: Create reconciliation model
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReconciliationModelRequest'
      responses:
        '201':
          description: Reconciliation model created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationModel'
        '400':
          description: Validation error
          content: *id004
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
  /transactions/{id}/suggestions:
    get:
      operationId: get_transaction_reconciliation_suggestions
      summary: Get reconciliation suggestions for a transaction
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Ranked reconciliation suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationSuggestions'
  /transactions/{id}/reconcile:
    post:
      operationId: reconcile_transaction
      summary: Reconcile transaction
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconcileTransactionRequest'
      responses:
        '200':
          description: Transaction reconciled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationResult'
        '400':
          description: Validation error
          content: *id004
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
  /transactions/{id}/unreconcile:
    post:
      operationId: unreconcile_transaction
      summary: Unreconcile transaction
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Transaction unreconciled
        '400':
          description: Validation error
          content: *id004
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
  /transactions/{id}/write-off:
    post:
      operationId: create_transaction_write_off
      summary: Create transaction write-off
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionWriteOffRequest'
      responses:
        '201':
          description: Write-off created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationAdjustment'
        '400':
          description: Validation error
          content: *id004
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
  /transactions/{id}/exchange-difference:
    post:
      operationId: create_transaction_exchange_difference
      summary: Create exchange-difference entry for transaction
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExchangeDifferenceRequest'
      responses:
        '201':
          description: Exchange-difference entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationAdjustment'
        '400':
          description: Validation error
          content: *id004
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-indexed)
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Page size (1-100)
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
      description: Full-text search across name and description fields
    CompanyId:
      name: company_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Filter by company UUID
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token for authentication. Include in Authorization header as 'Bearer <token>'.
  schemas:
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
          description: Total number of records
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Page size limit
    BankAccount:
      type: object
      required:
      - account_number
      - bank_name
      - company_id
      - currency_code
      - id
      - name
      - status
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this bank account
        name:
          type: string
          maxLength: 200
          description: Bank account name/label
        account_number:
          type: string
          maxLength: 50
          description: Bank account number
        routing_number:
          type: string
          maxLength: 20
          nullable: true
          description: Bank routing/SWIFT/IBAN code
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: Account currency
        bank_name:
          type: string
          maxLength: 200
          description: Name of the banking institution
        bank_id:
          type: string
          format: uuid
          nullable: true
          description: Linked bank institution record
        account_type:
          type: string
          enum:
          - CHECKING
          - SAVINGS
          - CREDIT_CARD
          - LOAN
          - MONEY_MARKET
          - CASH
          - OTHER
          description: Type of bank account
        gl_account_id:
          type: string
          format: uuid
          nullable: true
          description: Linked GL account for reconciliation
        opening_balance:
          type: number
          format: double
          description: Opening balance at account setup
        opening_balance_date:
          type: string
          format: date
          description: Date of the opening balance
        status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - CLOSED
          - SYNCING
          - ERROR
          description: Bank account status
        sync_enabled:
          type: boolean
          default: true
          description: Whether automatic sync is enabled
        last_sync_date:
          type: string
          format: date-time
          nullable: true
          description: Last successful sync date
        sync_frequency:
          type: string
          enum:
          - DAILY
          - HOURLY
          - MANUAL
          default: DAILY
          description: Sync frequency
        company_id:
          type: string
          format: uuid
          description: Company this account belongs to
        notes:
          type: string
          maxLength: 1000
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateBankAccountRequest:
