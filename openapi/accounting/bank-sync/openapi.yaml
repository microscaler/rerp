        statement_date:
          type: string
          format: date
          description: End date of the statement period
        start_date:
          type: string
          format: date
          description: Start date of the statement period
        opening_balance:
          type: number
          format: double
          description: Balance at start of period
        closing_balance:
          type: number
          format: double
          description: Balance at end of period
