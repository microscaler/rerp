        opening_balance:
          type: number
          format: double
          description: Opening balance
        closing_balance:
          type: number
          format: double
          description: Closing balance
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/CreateBankTransactionRequest'
          description: Transactions in this statement
        file_reference:
          type: string
          maxLength: 500
          nullable: true
          description: Reference to uploaded statement file
    BankTransaction:
      type: object
      required:
      - amount
      - currency_code
      - description
      - id
      - statement_id
      - transaction_date
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this transaction
        statement_id:
          type: string
          format: uuid
          description: Statement this transaction belongs to
        bank_account_id:
          type: string
          format: uuid
          description: Bank account this transaction is on
        transaction_date:
          type: string
          format: date
          description: Transaction date
        value_date:
          type: string
          format: date
          nullable: true
          description: Value/settlement date
        amount:
          type: number
          format: double
          description: Transaction amount (positive = credit, negative = debit)
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
