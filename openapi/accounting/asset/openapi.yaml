openapi: 3.1.0
info:
  title: Asset Management
  version: 1.0.0
  description: Fixed asset management service handling asset lifecycle from acquisition
    to disposal. Supports depreciation scheduling, asset tracking, revaluation, and
    integration with general ledger for asset accounts. Compliant with common depreciation
    methods and tax regulations.
  contact:
    name: RERP Accounting API Support
    email: accounting-api@rerp.ai
servers:
- url: http://localhost:8007/api/v1/accounting/asset
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/accounting/asset
  description: Asset Management API
tags:
- name: assets
  description: Fixed asset lifecycle and tracking
- name: depreciation
  description: Depreciation schedules and calculations
- name: revaluation
  description: Asset revaluation and impairment
- name: disposal
  description: Asset disposal, sale, and write-offs
- name: reports
  description: Asset reporting and analysis
paths:
  /assets:
    get:
      operationId: list_assets
      summary: List assets
      description: Paginated list of all fixed assets with filtering by category,
        status, location, department, and useful life range.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
        description: Search by asset number, name, or serial number
      - name: category_id
        in: query
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        schema:
          type: string
          enum:
          - ACTIVE
          - DEPRECIATING
          - FULLY_DEPRECIATED
          - DISPOSED
          - SCRAPPED
          - IN_REPAIR
          - TRANSIT
      - name: department_id
        in: query
        schema:
          type: string
          format: uuid
      - name: custodian_id
        in: query
        schema:
          type: string
          format: uuid
      - name: location
        in: query
        schema:
          type: string
        description: Filter by location name
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: nbv_min
        in: query
        schema:
          type: number
          format: double
        description: Minimum net book value
      - name: nbv_max
        in: query
        schema:
          type: number
          format: double
        description: Maximum net book value
      responses:
        '200':
          description: Paginated list of assets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssets'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_asset
      summary: Create asset
      description: Create a new fixed asset with automatic depreciation schedule generation.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetRequest'
      responses:
        '201':
          description: Asset created with depreciation schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetWithDetails'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — invalid or expired token
          content: &id001
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — insufficient permissions
          content: &id002
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource already exists or violates business rules
          content: &id004
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /assets/{id}:
    get:
      operationId: get_asset
      summary: Get asset by id
      description: Retrieve a single asset with full details including depreciation
        schedule and revaluation history.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Asset details with depreciation schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetWithDetails'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: update_asset
      summary: Update asset
      description: Update an asset's details. Does not allow modification of acquisition
        cost or date after depreciation starts.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssetRequest'
      responses:
        '200':
          description: Asset updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot update depreciation-related fields after depreciation
            starts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error
          content: &id003
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
    delete:
      operationId: delete_asset
      summary: Delete asset
      description: Delete an asset. Only allowed for assets in ACTIVE status with
        no depreciation entries.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Asset deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot delete asset with depreciation entries or non-active
            status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /assets/{id}/depreciation:
    get:
      operationId: list_depreciation_entries
      summary: List depreciation entries
      description: Get all depreciation entries for an asset.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List of depreciation entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDepreciationEntries'
        '404':
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /assets/{id}/depreciate:
    post:
      operationId: run_depreciation
      summary: Run depreciation for asset
      description: Run depreciation calculation for an asset for a specific period.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepreciationEntryRequest'
      responses:
        '201':
          description: Depreciation entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepreciationEntry'
        '404':
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Asset is not in an active depreciation state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error
          content: *id003
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
  /assets/bulk-depreciate:
    post:
      operationId: bulk_depreciate
      summary: Run depreciation for all assets
      description: Run depreciation for all active assets for a given period. Used
        for month-end/year-end close.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - period
              properties:
                period:
                  type: string
                  format: date
                post_to_gl:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Bulk depreciation results with count of entries created
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_entries:
                    type: integer
                  total_depreciation:
                    type: number
                  assets_processed:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
  /revaluations:
    get:
      operationId: list_revaluations
      summary: List revaluations
      description: List all asset revaluations with filtering by asset and date range.
      x-brrtrouter-impl: true
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: asset_id
        in: query
        schema:
          type: string
          format: uuid
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Paginated list of revaluations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRevaluations'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_revaluation
      summary: Create revaluation
      description: Revalue an asset to a new value, recording the change.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRevaluationRequest'
      responses:
        '201':
          description: Revaluation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevaluationRecord'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Asset is not in an active state for revaluation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
  /disposals:
    get:
      operationId: list_disposals
      summary: List disposals
      description: List all asset disposals with filtering by type, date range, and
        asset.
      x-brrtrouter-impl: true
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: asset_id
        in: query
        schema:
          type: string
          format: uuid
      - name: disposal_type
        in: query
        schema:
          type: string
          enum:
          - SALE
          - SCRAP
          - DONATION
          - TRANSFER
          - WRITE_OFF
          - THEFT
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: date_from
        in: query
        schema:
          type: string
          format: date
        description: Disposal date from
      - name: date_to
        in: query
        schema:
          type: string
          format: date
        description: Disposal date to
      responses:
        '200':
          description: Paginated list of disposals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDisposals'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_disposal
      summary: Create disposal
      description: Record the disposal of an asset (sale, scrap, write-off, etc.).
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDisposalRequest'
      responses:
        '201':
          description: Disposal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisposalRecord'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Asset is not in an active state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
  /categories:
    get:
      operationId: list_asset_categories
      summary: List asset categories
      description: List all asset categories with hierarchical support.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Paginated list of categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssetCategories'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_asset_category
      summary: Create asset category
      description: Create a new asset category with default depreciation settings.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetCategoryRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetCategory'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
  /reports/asset-summary:
    get:
      operationId: asset_summary
      summary: Asset summary report
      description: Generate a company-wide asset summary with breakdown by category,
        status, and depreciation expenses.
      x-brrtrouter-impl: true
      parameters:
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by company
      - name: as_of_date
        in: query
        schema:
          type: string
          format: date
        description: Date for asset valuation. Defaults to today.
      - name: include_disposed
        in: query
        schema:
          type: boolean
        description: Include disposed assets in totals
      responses:
        '200':
          description: Asset summary with breakdowns
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetSummary'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /asset-models:
    get:
      operationId: list_asset_models
      summary: List asset models
      responses:
        '200':
          description: Asset models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssetModels'
    post:
      operationId: create_asset_model
      summary: Create asset model
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetModelRequest'
      responses:
        '201':
          description: Asset model created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetModel'
        '400':
          description: Validation error
          content: *id003
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
  /assets/{id}/validate:
    post:
      operationId: validate_asset
      summary: Validate asset
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Asset validated
        '400':
          description: Validation error
          content: *id003
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
  /assets/{id}/pause-depreciation:
    post:
      operationId: pause_asset_depreciation
      summary: Pause asset depreciation
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Asset depreciation paused
        '400':
          description: Validation error
          content: *id003
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
  /assets/{id}/resume-depreciation:
    post:
      operationId: resume_asset_depreciation
      summary: Resume asset depreciation
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Asset depreciation resumed
        '400':
          description: Validation error
          content: *id003
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
  /assets/{id}/modify:
    post:
      operationId: modify_asset
      summary: Modify asset accounting values
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyAssetRequest'
      responses:
        '200':
          description: Asset modified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          description: Validation error
          content: *id003
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-indexed)
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Page size (1-100)
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
      description: Full-text search across name and description fields
    CompanyId:
      name: company_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Filter by company UUID
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token for authentication. Include in Authorization header
        as 'Bearer <token>'.
  schemas:
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
          description: Total number of records
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Page size limit
    Asset:
      type: object
      required:
      - id
      - asset_number
      - name
      - acquisition_cost
      - category_id
      - status
      - company_id
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this asset
        asset_number:
          type: string
          maxLength: 100
          description: Unique asset tag/number
        name:
          type: string
          maxLength: 200
          description: Asset name/description
        description:
          type: string
          maxLength: 2000
          nullable: true
          description: Detailed description
        category_id:
          type: string
          format: uuid
          description: Asset category
        acquisition_cost:
          type: number
          format: double
          minimum: 0
          description: Original acquisition cost
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: Currency of the acquisition cost
        acquisition_date:
          type: string
          format: date
          description: Date the asset was acquired
        location:
          type: string
          maxLength: 500
          nullable: true
          description: Current location of the asset
        department_id:
          type: string
          format: uuid
          nullable: true
          description: Department responsible for the asset
        custodian_id:
          type: string
          format: uuid
          nullable: true
          description: Person responsible for the asset
        status:
          type: string
          enum:
          - ACTIVE
          - DEPRECIATING
          - FULLY_DEPRECIATED
          - DISPOSED
          - SCRAPPED
          - IN_REPAIR
          - TRANSIT
          description: Asset lifecycle status
        acquisition_gl_entry_id:
          type: string
          format: uuid
          nullable: true
          description: GL journal entry created during acquisition
        net_book_value:
          type: number
          format: double
          description: Current net book value (cost - accumulated depreciation)
        accumulated_depreciation:
          type: number
          format: double
          description: Total depreciation to date
        useful_life_months:
          type: integer
          minimum: 1
          description: Useful life in months
        company_id:
          type: string
          format: uuid
          description: Company this asset belongs to
        supplier_id:
          type: string
          format: uuid
          nullable: true
          description: Original supplier/vendor
        serial_number:
          type: string
          maxLength: 200
          nullable: true
          description: Manufacturer serial number
        warranty_expiry:
          type: string
          format: date
          nullable: true
          description: Warranty expiration date
        insurance_policy:
          type: string
          maxLength: 200
