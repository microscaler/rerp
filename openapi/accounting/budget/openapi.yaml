          type: string
          format: uuid
          description: Budget this variance report is for
        budget_name:
          type: string
        fiscal_year:
          type: integer
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        total_budgeted:
          type: number
          format: double
