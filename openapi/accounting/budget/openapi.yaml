openapi: 3.1.0
info:
  title: Budget Management
  version: 1.0.0
  description: Budget management service for financial planning, budget creation,
    variance analysis, and forecasting. Supports multi-level budgets by department,
    cost center, GL account, and period. Tracks actuals against budget with real-time
    variance reporting.
  contact:
    name: RERP Accounting API Support
    email: accounting-api@rerp.ai
servers:
- url: http://localhost:8009/api/v1/accounting/budget
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/accounting/budget
  description: Budget Management API
tags:
- name: budgets
  description: Budget creation and lifecycle management
- name: budget-lines
  description: Budget line items and allocations
- name: variance
  description: Budget vs actuals variance analysis
- name: forecasting
  description: Budget forecasting and scenario planning
- name: approvals
  description: Budget approval workflow
paths:
  /budgets:
    get:
      operationId: list_budgets
      summary: List budgets
      description: Paginated list of all budgets with filtering by fiscal year, status,
        department, and company.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
        description: Search by budget name
      - name: fiscal_year
        in: query
        schema:
          type: integer
        description: Filter by fiscal year
      - name: status
        in: query
        schema:
          type: string
          enum:
          - DRAFT
          - SUBMITTED
          - APPROVED
          - ACTIVE
          - ARCHIVED
          - REJECTED
      - name: department_id
        in: query
        schema:
          type: string
          format: uuid
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Paginated list of budgets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBudgets'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_budget
      summary: Create budget
      description: Create a new budget with line items by GL account and period.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBudgetRequest'
      responses:
        '201':
          description: Budget created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetWithLines'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — invalid or expired token
          content: &id001
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — insufficient permissions
          content: &id002
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource already exists or violates business rules
          content: &id004
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /budgets/{id}:
    get:
      operationId: get_budget
      summary: Get budget by id
      description: Get a budget with all line items and variance summary.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Budget details with lines and variance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetWithLines'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: update_budget
      summary: Update budget
      description: Update a budget. Only allowed for DRAFT status budgets. To submit
        for approval, use the submit endpoint.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBudgetRequest'
      responses:
        '200':
          description: Budget updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot update non-draft budgets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error
          content: &id003
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
    delete:
      operationId: delete_budget
      summary: Delete budget
      description: Delete a budget. Only allowed for DRAFT status budgets.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Budget deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot delete non-draft budgets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /budgets/{id}/submit:
    post:
      operationId: submit_budget
      summary: Submit budget for approval
      description: Submit a budget for approval. Transitions status from DRAFT to
        SUBMITTED.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Budget submitted for approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Budget is not in DRAFT status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error
          content: *id003
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
  /budgets/{id}/lines:
    get:
      operationId: list_budget_lines
      summary: List budget lines
      description: Get all budget lines for a budget, filtered by period and GL account.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: gl_account_id
        in: query
        schema:
          type: string
          format: uuid
      - name: period_from
        in: query
        schema:
          type: string
          format: date
        description: Period from
      - name: period_to
        in: query
        schema:
          type: string
          format: date
        description: Period to
      - name: department_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List of budget lines
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBudgetLines'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_budget_line
      summary: Add budget line
      description: Add a budget line item for a specific GL account and period.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBudgetLineRequest'
      responses:
        '201':
          description: BudgetLine created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetLine'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Budget not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
  /variance:
    get:
      operationId: variance_report
      summary: Variance report
      description: Generate a budget vs actuals variance report for a budget and period.
      x-brrtrouter-impl: true
      parameters:
      - name: budget_id
        in: query
        schema:
          type: string
          format: uuid
        description: Budget to analyze
      - name: period_start
        in: query
        schema:
          type: string
          format: date
        description: Period start
      - name: period_end
        in: query
        schema:
          type: string
          format: date
        description: Period end
      - name: warning_threshold
        in: query
        schema:
          type: number
          format: double
        description: Warning threshold (e.g., 0.05 for 5%)
      - name: breach_threshold
        in: query
        schema:
          type: number
          format: double
        description: Breach threshold (e.g., 0.10 for 10%)
      responses:
        '200':
          description: Variance report with line-by-line details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VarianceReport'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /forecasts:
    get:
      operationId: list_forecasts
      summary: List forecasts
      description: List all budget forecasts with filtering by budget and type.
      x-brrtrouter-impl: true
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: budget_id
        in: query
        schema:
          type: string
          format: uuid
      - name: forecast_type
        in: query
        schema:
          type: string
          enum:
          - ROLLING
          - ANNUAL
          - QUARTERLY
          - SPECIFIC
      - name: status
        in: query
        schema:
          type: string
          enum:
          - DRAFT
          - PENDING_REVIEW
          - APPROVED
          - ARCHIVED
      responses:
        '200':
          description: Paginated list of forecasts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedForecasts'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_forecast
      summary: Create forecast
      description: Create a new budget forecast based on actuals and projections.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateForecastRequest'
      responses:
        '201':
          description: Forecast created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forecast'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
  /budgets/{id}/confirm:
    post:
      operationId: confirm_budget
      summary: Confirm budget
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Budget confirmed
        '400':
          description: Validation error
          content: *id003
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
  /budgets/{id}/cancel:
    post:
      operationId: cancel_budget
      summary: Cancel budget
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Budget cancelled
        '400':
          description: Validation error
          content: *id003
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
  /budgets/{id}/complete:
    post:
      operationId: complete_budget
      summary: Complete budget
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Budget completed
        '400':
          description: Validation error
          content: *id003
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
  /budgets/{id}/reopen:
    post:
      operationId: reopen_budget
      summary: Reopen budget
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Budget reopened
        '400':
          description: Validation error
          content: *id003
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
  /budget-revisions:
    get:
      operationId: list_budget_revisions
      summary: List budget revisions
      responses:
        '200':
          description: Budget revisions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBudgetRevisions'
    post:
      operationId: create_budget_revision
      summary: Create budget revision
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBudgetRevisionRequest'
      responses:
        '201':
          description: Budget revision created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetRevision'
        '400':
          description: Validation error
          content: *id003
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id004
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-indexed)
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Page size (1-100)
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
      description: Full-text search across name and description fields
    CompanyId:
      name: company_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Filter by company UUID
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token for authentication. Include in Authorization header
        as 'Bearer <token>'.
  schemas:
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
          description: Total number of records
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Page size limit
    Budget:
      type: object
      required:
      - id
      - name
      - fiscal_year
      - company_id
      - status
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this budget
        name:
          type: string
          maxLength: 200
          description: Budget name/title
        description:
          type: string
          maxLength: 2000
          nullable: true
          description: Budget description
        fiscal_year:
          type: integer
          minimum: 2000
          maximum: 2100
          description: Fiscal year this budget covers
        version:
          type: integer
          minimum: 1
          default: 1
          description: Budget version number
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: Budget currency
        status:
          type: string
          enum:
          - DRAFT
          - SUBMITTED
          - APPROVED
          - ACTIVE
          - ARCHIVED
          - REJECTED
          description: Budget lifecycle status
        approval_status:
          type: string
          enum:
          - PENDING
          - APPROVED
          - REJECTED
          description: Approval workflow status
        period_type:
          type: string
          enum:
          - MONTHLY
          - QUARTERLY
          - ANNUAL
          - WEEKLY
          default: MONTHLY
          description: Budget period granularity
        total_amount:
          type: number
          format: double
          description: Total budget amount across all lines
        approved_amount:
          type: number
          format: double
          description: Approved budget amount
        company_id:
          type: string
          format: uuid
          description: Company this budget belongs to
        department_id:
          type: string
          format: uuid
          nullable: true
          description: Department this budget applies to (null = company-wide)
        cost_center_id:
          type: string
          format: uuid
          nullable: true
          description: Cost center this budget applies to
        approved_by:
          type: string
          format: uuid
          nullable: true
          description: User who approved the budget
        approved_at:
          type: string
          format: date-time
          nullable: true
          description: When the budget was approved
        notes:
          type: string
          maxLength: 2000
          nullable: true
          description: Budget notes
        created_by:
          type: string
          format: uuid
          description: User who created the budget
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        submitted_at:
          type: string
          format: date-time
          nullable: true
          description: When submitted for approval
    BudgetWithLines:
      allOf:
      - $ref: '#/components/schemas/Budget'
      - type: object
        properties:
          budget_lines:
            type: array
            items:
              $ref: '#/components/schemas/BudgetLine'
            description: Budget line items
          variance_summary:
            type: object
            nullable: true
            description: Summary of budget vs actuals variance
    CreateBudgetRequest:
      type: object
      required:
      - name
      - fiscal_year
      - company_id
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 2000
          nullable: true
        fiscal_year:
          type: integer
          minimum: 2000
          maximum: 2100
        version:
          type: integer
          minimum: 1
          default: 1
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: Defaults to company currency
        period_type:
          type: string
          enum:
          - MONTHLY
          - QUARTERLY
          - ANNUAL
          - WEEKLY
        company_id:
          type: string
          format: uuid
        department_id:
          type: string
          format: uuid
          nullable: true
        cost_center_id:
          type: string
          format: uuid
          nullable: true
        budget_lines:
          type: array
          items:
            $ref: '#/components/schemas/CreateBudgetLineRequest'
          description: Budget line items
        notes:
          type: string
          maxLength: 2000
          nullable: true
    UpdateBudgetRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 2000
          nullable: true
        notes:
          type: string
          maxLength: 2000
          nullable: true
        status:
          type: string
          enum:
          - DRAFT
          - SUBMITTED
          - APPROVED
          - ACTIVE
          - ARCHIVED
          - REJECTED
        budget_lines:
          type: array
          items:
            $ref: '#/components/schemas/CreateBudgetLineRequest'
          description: Replace all budget lines
    BudgetLine:
      type: object
      required:
      - id
      - budget_id
      - period
      - amount
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this budget line
        budget_id:
          type: string
          format: uuid
          description: Budget this line belongs to
        gl_account_id:
          type: string
          format: uuid
          nullable: true
          description: GL account this line is for
        gl_account_code:
          type: string
          maxLength: 50
          nullable: true
          description: GL account code
        gl_account_name:
          type: string
          maxLength: 200
          nullable: true
          description: GL account name
        department_id:
          type: string
          format: uuid
          nullable: true
          description: Department for this line
        cost_center_id:
          type: string
          format: uuid
          nullable: true
          description: Cost center for this line
        period:
          type: string
          format: date
          description: Period for this line (e.g., 2024-01-01 for January)
        period_name:
          type: string
          maxLength: 50
          description: Human-readable period name
        amount:
          type: number
          format: double
          description: Budgeted amount for this period
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: Currency of the budgeted amount
        actual_amount:
          type: number
          format: double
          default: 0
          description: Actual amount spent in this period
        variance:
          type: number
          format: double
          description: Variance (amount - actual_amount)
        variance_percent:
          type: number
          format: double
          nullable: true
          description: Variance as percentage of budget
        notes:
          type: string
          maxLength: 1000
          nullable: true
          description: Notes for this budget line
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateBudgetLineRequest:
      type: object
      required:
      - period
      - amount
      properties:
        gl_account_id:
          type: string
          format: uuid
          nullable: true
        gl_account_code:
          type: string
          maxLength: 50
          nullable: true
        department_id:
          type: string
          format: uuid
          nullable: true
        cost_center_id:
          type: string
          format: uuid
          nullable: true
        period:
          type: string
          format: date
        period_name:
          type: string
          maxLength: 50
        amount:
          type: number
          format: double
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        notes:
          type: string
          maxLength: 1000
          nullable: true
    VarianceReport:
      type: object
      required:
      - budget_id
      - period_start
      - period_end
      properties:
