openapi: 3.1.0
info:
  title: Accounts Payable
  version: 1.0.0
  description: 'Accounts payable management service handling vendor invoices, payments, approvals, and cash flow forecasting. Supports the full AP lifecycle: invoice receipt, approval workflow, payment scheduling, and vendor reconciliation. Integrates with the general ledger for account posting.'
  contact:
    name: RERP Accounting API Support
    email: accounting-api@rerp.ai
servers:
- url: http://localhost:8004/api/v1/accounting/accounts-payable
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/accounting/accounts-payable
  description: Accounts Payable API
tags:
- name: vendor-invoices
  description: Vendor invoices and approval workflow
- name: payments
  description: Vendor payments and payment scheduling
- name: approvals
  description: Invoice approval workflow and hierarchy
- name: vendors
  description: Vendor payment terms and reconciliation
- name: cash-flow
  description: AP cash flow forecasting and commitments
paths:
  /vendor-invoices:
    get:
      operationId: list_vendor_invoices
      summary: List vendor invoices
      description: Paginated list of all vendor invoices with AP-specific fields including approval status and payment status.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
        description: Search by vendor name, invoice number, or status
      - name: status
        in: query
        schema:
          type: string
          enum:
          - DRAFT
          - PENDING_APPROVAL
          - APPROVED
          - REJECTED
          - POSTED
      - name: approval_status
        in: query
        schema:
          type: string
          enum:
          - PENDING
          - APPROVED
          - REJECTED
          - CANCELLED
      - name: payment_status
        in: query
        schema:
          type: string
          enum:
          - UNPAID
          - SCHEDULED
          - PARTIAL
          - PAID
          - DISPUTED
      - name: vendor_id
        in: query
        schema:
          type: string
          format: uuid
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: currency_code
        in: query
        schema:
          type: string
          minLength: 3
          maxLength: 3
      - name: date_from
        in: query
        schema:
          type: string
          format: date
        description: Invoice date from
      - name: date_to
        in: query
        schema:
          type: string
          format: date
        description: Invoice date to
      responses:
        '200':
          description: Paginated list of vendor invoices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVendorInvoices'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_vendor_invoice
      summary: Create vendor invoice
      description: Create a new AP record for a vendor invoice. Links the invoice to the vendor and initializes the approval workflow.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVendorInvoiceRequest'
      responses:
        '201':
          description: VendorInvoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorInvoice'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /vendor-invoices/{id}:
    get:
      operationId: get_vendor_invoice
      summary: Get vendor invoice by id
      description: Retrieve a single vendor invoice with its full AP details including approval history and payment status.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: VendorInvoice details with AP context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorInvoiceWithDetails'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: update_vendor_invoice
      summary: Update vendor invoice
      description: Update an AP record's details. Does not modify the base invoice - use the Invoice service for that.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVendorInvoiceRequest'
      responses:
        '200':
          description: VendorInvoice updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorInvoice'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: delete_vendor_invoice
      summary: Delete vendor invoice
      description: Delete a vendor invoice record. Only allowed for invoices in DRAFT status.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: VendorInvoice deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot delete approved or posted invoices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /payments:
    get:
      operationId: list_payments
      summary: List payments
      description: Paginated list of all vendor payments with filtering by status, date range, and vendor.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
        description: Search by reference number or vendor
      - name: status
        in: query
        schema:
          type: string
          enum:
          - SCHEDULED
          - PENDING
          - SENT
          - COMPLETED
          - FAILED
          - CANCELLED
      - name: payment_method
        in: query
        schema:
          type: string
          enum:
          - WIRE
          - CHECK
          - ACH
          - BANK_TRANSFER
          - PAYMENT_GATEWAY
          - COUNTER_SERVICE
      - name: vendor_id
        in: query
        schema:
          type: string
          format: uuid
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: date_from
        in: query
        schema:
          type: string
          format: date
        description: Payment date from
      - name: date_to
        in: query
        schema:
          type: string
          format: date
        description: Payment date to
      responses:
        '200':
          description: Paginated list of payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVendorPayments'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_payment
      summary: Create payment
      description: Schedule a new vendor payment. Optionally auto-disburse if auto_disburse is true.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVendorPaymentRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorPayment'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /payments/{id}:
    get:
      operationId: get_payment
      summary: Get payment by id
      description: Retrieve payment details.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorPayment'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: update_payment
      summary: Update payment
      description: Update a payment's details. Only scheduled or pending payments can be modified.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVendorPaymentRequest'
      responses:
        '200':
          description: Payment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorPayment'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot update completed or cancelled payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: delete_payment
      summary: Delete payment
      description: Delete a payment. Only scheduled or pending payments can be deleted.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Payment deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot delete completed payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /approvals:
    get:
      operationId: list_approvals
      summary: List approvals
      description: List all approval records with filtering by invoice, approver, and status.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: invoice_id
        in: query
        schema:
          type: string
          format: uuid
      - name: approver_id
        in: query
        schema:
          type: string
          format: uuid
      - name: action
        in: query
        schema:
          type: string
          enum:
          - APPROVE
          - REJECT
          - REQUEST_INFO
          - DELEGATE
      responses:
        '200':
          description: Paginated list of approval records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApprovals'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_approval
      summary: Submit approval action
      description: Approve, reject, or request more information on an invoice as part of the approval workflow.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApprovalRequest'
      responses:
        '201':
          description: ApprovalRecord created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRecord'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '403':
          description: Forbidden - user not authorized to approve this invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /commitments:
    get:
      operationId: list_payment_commitments
      summary: List payment commitments
      description: List all payment commitments (approved invoices awaiting payment) with filtering by vendor and due date.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: vendor_id
        in: query
        schema:
          type: string
          format: uuid
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: due_before
        in: query
        schema:
          type: string
          format: date
        description: Due before this date
      - name: due_after
        in: query
        schema:
          type: string
          format: date
        description: Due after this date
      responses:
        '200':
          description: Paginated list of payment commitments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCommitments'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /reports/cash-flow-forecast:
    get:
      operationId: cash_flow_forecast
      summary: Cash flow forecast
      description: Generate a cash flow forecast for the AP service showing upcoming payment commitments and scheduled payments.
      x-brrtrouter-impl: true
      parameters:
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by company
      - name: period_start
        in: query
        schema:
          type: string
          format: date
        description: Forecast start date
      - name: period_end
        in: query
        schema:
          type: string
          format: date
        description: Forecast end date
      - name: currency_code
        in: query
        schema:
          type: string
          minLength: 3
          maxLength: 3
        description: Currency for the forecast
      responses:
        '200':
          description: Cash flow forecast with daily breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashFlowForecast'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /payment-batches:
    get:
      operationId: list_payment_batches
      summary: List payment batches
      responses:
        '200':
          description: Payment batches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPaymentBatches'
    post:
      operationId: create_payment_batch
      summary: Create payment batch
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentBatchRequest'
      responses:
        '201':
          description: Payment batch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentBatch'
  /payment-batches/{id}/approve:
    post:
      operationId: approve_payment_batch
      summary: Approve payment batch
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Payment batch approved
  /payment-batches/{id}/export-payment-file:
    post:
      operationId: export_payment_batch_file
      summary: Export payment batch file
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportPaymentFileRequest'
      responses:
        '202':
          description: Payment file generation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentFileExport'
  /vendor-invoices/{id}/register-payment:
    post:
      operationId: register_vendor_invoice_payment
      summary: Register vendor invoice payment
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterVendorInvoicePaymentRequest'
      responses:
        '201':
          description: Vendor payment registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorPayment'
  /vendor-invoices/{id}/three-way-match:
    post:
      operationId: perform_vendor_invoice_three_way_match
      summary: Perform three-way match for vendor invoice
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThreeWayMatchRequest'
      responses:
        '200':
          description: Three-way match result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreeWayMatchResult'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token for authentication. Include in Authorization header as 'Bearer <token>'.
  schemas:
    VendorInvoice:
      type: object
      required:
      - id
      - invoice_id
      - vendor_id
      - currency_code
      - status
      - approval_status
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this AP record
        invoice_id:
          type: string
          format: uuid
          description: Reference to the base Invoice entity in the Invoice service
        vendor_id:
          type: string
          format: uuid
          description: Vendor this invoice is for
        invoice_number:
          type: string
          maxLength: 100
          description: Vendor's invoice number for reference
        invoice_date:
          type: string
          format: date
          description: Date on the vendor invoice
        amount:
          type: number
          format: double
          minimum: 0
          description: Total invoice amount
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          pattern: ^[A-Z]{3}$
        tax_amount:
          type: number
          format: double
          minimum: 0
          description: Tax amount on this invoice
        net_amount:
          type: number
          format: double
          minimum: 0
          description: Net amount (total - tax)
        status:
          type: string
          enum:
          - DRAFT
          - PENDING_APPROVAL
          - APPROVED
          - REJECTED
          - POSTED
          description: AP status of this invoice
        approval_status:
          type: string
          enum:
          - PENDING
          - APPROVED
          - REJECTED
          - CANCELLED
          description: Approval workflow status
        payment_status:
          type: string
          enum:
          - UNPAID
          - SCHEDULED
          - PARTIAL
          - PAID
          - DISPUTED
          description: Payment lifecycle state
        due_date:
          type: string
          format: date
          description: Payment due date
        terms:
          type: string
          enum:
          - DUE_ON_RECEIPT
          - NET_15
          - NET_30
          - NET_45
          - NET_60
          - CUSTOM
          description: Payment terms with this vendor
        company_id:
          type: string
          format: uuid
          description: Company this invoice belongs to
        approved_by:
          type: string
          format: uuid
          nullable: true
          description: User who approved this invoice
        approved_at:
          type: string
          format: date-time
          nullable: true
          description: When the invoice was approved
        description:
          type: string
          maxLength: 2000
          nullable: true
          description: Invoice description/memo
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    VendorInvoiceWithDetails:
      allOf:
      - $ref: '#/components/schemas/VendorInvoice'
      - type: object
        properties:
          approval_history:
            type: array
            items:
              $ref: '#/components/schemas/ApprovalRecord'
            description: Approval workflow history
          payment_history:
            type: array
            items:
              $ref: '#/components/schemas/VendorPayment'
            description: Payment history for this invoice
          line_items:
            type: array
            items:
              $ref: '#/components/schemas/VendorInvoiceLineItem'
            description: Invoice line items
    CreateVendorInvoiceRequest:
      type: object
      required:
      - invoice_id
      - vendor_id
      - currency_code
      - amount
      properties:
        invoice_id:
          type: string
          format: uuid
          description: Base Invoice entity reference
        vendor_id:
          type: string
          format: uuid
          description: Vendor
        invoice_number:
          type: string
          maxLength: 100
          description: Vendor's invoice number
        invoice_date:
          type: string
          format: date
          description: Date on the vendor invoice
        amount:
          type: number
          format: double
          minimum: 0
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        tax_amount:
          type: number
          format: double
          minimum: 0
          default: 0
        due_date:
          type: string
          format: date
          nullable: true
          description: Payment due date. Defaults to invoice_date + terms.
        terms:
          type: string
          enum:
          - DUE_ON_RECEIPT
          - NET_15
          - NET_30
          - NET_45
          - NET_60
          - CUSTOM
        description:
          type: string
          maxLength: 2000
          nullable: true
        company_id:
          type: string
          format: uuid
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/CreateInvoiceLineItemRequest'
          description: Invoice line items for GL posting
        auto_approve:
          type: boolean
          default: false
          description: Bypass approval workflow for invoices below threshold
    UpdateVendorInvoiceRequest:
      type: object
      properties:
        status:
          type: string
          enum:
          - DRAFT
          - PENDING_APPROVAL
          - APPROVED
          - REJECTED
          - POSTED
        approval_status:
          type: string
          enum:
          - PENDING
          - APPROVED
          - REJECTED
          - CANCELLED
        payment_status:
          type: string
          enum:
          - UNPAID
          - SCHEDULED
          - PARTIAL
          - PAID
          - DISPUTED
        amount:
          type: number
          format: double
          minimum: 0
        tax_amount:
          type: number
          format: double
          minimum: 0
        due_date:
          type: string
          format: date
        terms:
          type: string
          enum:
          - DUE_ON_RECEIPT
          - NET_15
          - NET_30
          - NET_45
          - NET_60
          - CUSTOM
        description:
          type: string
          maxLength: 2000
          nullable: true
    VendorPayment:
      type: object
      required:
      - id
      - amount
      - currency_code
      - payment_method
      - payment_date
      - status
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the payment
        reference_number:
          type: string
          maxLength: 100
          nullable: true
          description: Payment reference (check number, wire reference)
        amount:
          type: number
          format: double
          minimum: 0
          description: Payment amount
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        payment_method:
          type: string
          enum:
          - WIRE
          - CHECK
          - ACH
          - BANK_TRANSFER
          - PAYMENT_GATEWAY
          - COUNTER_SERVICE
        payment_date:
          type: string
          format: date
          description: Scheduled or actual payment date
        actual_payment_date:
          type: string
          format: date
          nullable: true
          description: When payment was actually sent
        status:
          type: string
          enum:
          - SCHEDULED
          - PENDING
          - SENT
          - COMPLETED
          - FAILED
          - CANCELLED
        vendor_id:
          type: string
