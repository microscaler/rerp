openapi: 3.1.0
info:
  title: EDI & Compliance
  version: 1.0.0
  description: Electronic Data Interchange service supporting PEPPOL and UBL formats.
servers:
- url: http://localhost:8008/api/v1/accounting/edi
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/accounting/edi
  description: EDI & Compliance API
tags:
- name: edi-documents
  description: EDI documents and accounting document exchange
- name: edi-mappings
  description: Mapping rules for inbound and outbound EDI documents
- name: edi-profiles
  description: Trading partner, jurisdiction, and standard profiles
- name: edi-submissions
  description: Submission lifecycle, polling, retry, and acknowledgments
- name: validation
  description: EDI validation profiles and errors
paths:
  /edi-documents:
    get:
      operationId: list_edi_documents
      summary: List edi-documents
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Paginated list of EDI documents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEdiDocuments'
    post:
      operationId: create_edi_document
      summary: Create edi-document
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEdiDocumentRequest'
      responses:
        '201':
          description: EdiDocument created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdiDocument'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — invalid or expired token
          content: &id001
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — insufficient permissions
          content: &id002
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource already exists or violates business rules
          content: &id003
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /edi-documents/{id}:
    get:
      operationId: get_edi_document
      summary: Get edi-document by id
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: EdiDocument details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdiDocument'
        '404':
          description: Not found
    put:
      operationId: update_edi_document
      summary: Update edi-document
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEdiDocumentRequest'
      responses:
        '200':
          description: EdiDocument updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdiDocument'
        '404':
          description: Not found
        '400':
          description: Validation error
          content: &id004
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id003
    delete:
      operationId: delete_edi_document
      summary: Delete edi-document
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: EdiDocument deleted
        '404':
          description: Not found
  /edi-mappings:
    get:
      operationId: list_edi_mappings
      summary: List edi-mappings
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Paginated list of EDI mappings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEdiMappings'
    post:
      operationId: create_edi_mapping
      summary: Create edi-mapping
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEdiMappingRequest'
      responses:
        '201':
          description: EdiMapping created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdiMapping'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id003
  /edi-mappings/{id}:
    get:
      operationId: get_edi_mapping
      summary: Get edi-mapping by id
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: EdiMapping details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdiMapping'
        '404':
          description: Not found
    put:
      operationId: update_edi_mapping
      summary: Update edi-mapping
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEdiMappingRequest'
      responses:
        '200':
          description: EdiMapping updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdiMapping'
        '404':
          description: Not found
        '400':
          description: Validation error
          content: *id004
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id003
    delete:
      operationId: delete_edi_mapping
      summary: Delete edi-mapping
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: EdiMapping deleted
        '404':
          description: Not found
  /edi-profiles:
    get:
      operationId: list_edi_profiles
      summary: List EDI profiles
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: List of EDI profiles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEdiProfiles'
    post:
      operationId: create_edi_profile
      summary: Create EDI profile
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEdiProfileRequest'
      responses:
        '201':
          description: EDI profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdiProfile'
        '400':
          description: Validation error
          content: *id004
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id003
  /edi-validation-profiles:
    get:
      operationId: list_edi_validation_profiles
      summary: List EDI validation profiles
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of EDI validation profiles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEdiValidationProfiles'
    post:
      operationId: create_edi_validation_profile
      summary: Create EDI validation profile
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEdiValidationProfileRequest'
      responses:
        '201':
          description: EDI validation profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdiValidationProfile'
        '400':
          description: Validation error
          content: *id004
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id003
  /edi-submissions:
    get:
      operationId: list_edi_submissions
      summary: List EDI submissions
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/EdiSubmissionStatus'
      responses:
        '200':
          description: List of EDI submissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEdiSubmissions'
    post:
      operationId: create_edi_submission
      summary: Create EDI submission
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEdiSubmissionRequest'
      responses:
        '201':
          description: EDI submission created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdiSubmission'
        '400':
          description: Validation error
          content: *id004
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id003
  /edi-submissions/{id}/submit:
    post:
      operationId: submit_edi_submission
      summary: Submit EDI submission
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '202':
          description: EDI submission accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdiSubmission'
        '400':
          description: Validation error
          content: *id004
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id003
  /edi-submissions/{id}/status:
    get:
      operationId: get_edi_submission_status
      summary: Get EDI submission status
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: EDI submission status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdiSubmission'
  /edi-submissions/{id}/retry:
    post:
      operationId: retry_edi_submission
      summary: Retry EDI submission
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '202':
          description: EDI submission retry accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdiSubmission'
        '400':
          description: Validation error
          content: *id004
        '401':
          description: Unauthorized — invalid or expired token
          content: *id001
        '403':
          description: Forbidden — insufficient permissions
          content: *id002
        '409':
          description: Conflict — resource already exists or violates business rules
          content: *id003
  /edi-acknowledgments:
    get:
      operationId: list_edi_acknowledgments
      summary: List EDI acknowledgments
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of EDI acknowledgments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEdiAcknowledgments'
  /edi-errors:
    get:
      operationId: list_edi_errors
      summary: List EDI errors
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of EDI errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEdiErrors'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-indexed)
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Page size (1-100)
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
      description: Full-text search across name and description fields
    CompanyId:
      name: company_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Filter by company UUID
  schemas:
    EdiStandard:
      type: string
      enum:
      - UBL
      - PEPPOL
      - FACTUR_X
      - SAF_T
      - INTRASTAT
      - ISO20022
      - CUSTOM
    EdiSubmissionStatus:
      type: string
      enum:
      - DRAFT
      - VALIDATING
      - READY
      - SUBMITTED
      - ACCEPTED
      - REJECTED
      - RETRY_REQUIRED
      - CANCELLED
    EdiProfile:
      type: object
      required:
      - id
      - name
      - standard
      - active
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        standard:
          $ref: '#/components/schemas/EdiStandard'
        jurisdiction_code:
          type: string
        trading_partner_id:
          type: string
          format: uuid
        active:
          type: boolean
    CreateEdiProfileRequest:
      type: object
      required:
      - name
      - standard
      properties:
        name:
          type: string
        standard:
          $ref: '#/components/schemas/EdiStandard'
        jurisdiction_code:
          type: string
        trading_partner_id:
          type: string
          format: uuid
    EdiValidationProfile:
      type: object
      required:
      - id
      - profile_id
      - name
      - active
      properties:
        id:
          type: string
          format: uuid
        profile_id:
          type: string
          format: uuid
        name:
          type: string
        rules:
          type: object
        active:
          type: boolean
    CreateEdiValidationProfileRequest:
      type: object
      required:
      - profile_id
      - name
      properties:
        profile_id:
          type: string
          format: uuid
        name:
          type: string
        rules:
          type: object
    EdiSubmission:
      type: object
      required:
      - id
      - document_id
      - profile_id
      - status
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        profile_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/EdiSubmissionStatus'
        external_reference:
          type: string
        submitted_at:
          type: string
          format: date-time
    CreateEdiSubmissionRequest:
      type: object
      required:
      - document_id
      - profile_id
      properties:
        document_id:
          type: string
          format: uuid
        profile_id:
          type: string
          format: uuid
    EdiError:
      type: object
      required:
      - id
      - submission_id
      - message
      properties:
        id:
          type: string
          format: uuid
        submission_id:
          type: string
          format: uuid
        code:
          type: string
        message:
          type: string
        field_path:
          type: string
    EdiDocument:
      type: object
      required:
      - id
      - document_number
      - document_type
      - format_id
      - status
      - received_at
      - retry_count
      - acknowledgment_sent
      properties:
        id:
          type: string
          format: uuid
        document_number:
          type: string
          maxLength: 100
        document_type:
          type: string
          enum:
          - INVOICE
          - PURCHASE_ORDER
          - ACKNOWLEDGMENT
          - SHIPPING_NOTICE
          - PAYMENT_ORDER
        format_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - RECEIVED
          - PARSING
          - PARSED
          - VALIDATED
          - PROCESSED
          - ERROR
        received_at:
          type: string
          format: date-time
        parsed_at:
          type: string
          format: date-time
          nullable: true
        validated_at:
          type: string
          format: date-time
          nullable: true
        processed_at:
          type: string
          format: date-time
          nullable: true
        sender_id:
          type: string
          maxLength: 255
          nullable: true
        receiver_id:
          type: string
          maxLength: 255
          nullable: true
        raw_content:
          type: string
          nullable: true
        parsed_data:
          type: object
          nullable: true
        related_invoice_id:
          type: string
          format: uuid
          nullable: true
        related_purchase_order_id:
          type: string
          format: uuid
          nullable: true
        document_total_amount:
          type: number
          format: decimal
          description: Total amount when document is an invoice or payment order.
          nullable: true
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 currency when document has monetary amount.
          nullable: true
        error_message:
          type: string
          nullable: true
        error_details:
          type: object
          nullable: true
        retry_count:
          type: integer
        last_retry_at:
          type: string
          format: date-time
          nullable: true
        acknowledgment_sent:
          type: boolean
        acknowledgment_sent_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          nullable: true
        company_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
          nullable: true
        updated_by:
          type: string
          format: uuid
          nullable: true
    EdiFormat:
      type: object
      required:
      - id
      - code
      - name
      - is_active
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        version:
          type: string
          maxLength: 50
          nullable: true
        supported_document_types:
          type: string
          maxLength: 255
          nullable: true
        format_config:
          type: object
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    EdiMapping:
      type: object
      required:
      - id
      - format_id
      - document_type
      - mapping_name
      - field_mappings
      - is_active
      properties:
        id:
          type: string
          format: uuid
        format_id:
          type: string
          format: uuid
        document_type:
          type: string
          enum:
          - INVOICE
          - PURCHASE_ORDER
          - ACKNOWLEDGMENT
          - SHIPPING_NOTICE
          - PAYMENT_ORDER
        mapping_name:
          type: string
          maxLength: 100
        field_mappings:
          type: object
        transformation_rules:
          type: object
          nullable: true
        validation_rules:
          type: object
          nullable: true
        default_values:
          type: object
          nullable: true
        is_active:
          type: boolean
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
          nullable: true
        updated_by:
          type: string
          format: uuid
          nullable: true
    EdiAcknowledgment:
      type: object
      required:
      - id
      - document_id
      - acknowledgment_type
      - status
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        acknowledgment_type:
          type: string
          enum:
          - FUNCTIONAL
          - TECHNICAL
          - RECEIPT
        status:
          type: string
          enum:
          - ACCEPTED
          - REJECTED
          - PARTIAL
        acknowledgment_content:
          type: string
          nullable: true
        acknowledgment_data:
          type: object
          nullable: true
        sent_at:
          type: string
          format: date-time
          nullable: true
        received_at:
          type: string
          format: date-time
          nullable: true
        error_codes:
          type: object
          nullable: true
        error_messages:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateEdiDocumentRequest:
      type: object
      required:
      - document_number
      - document_type
      - format_id
      - status
      properties:
        document_number:
          type: string
          maxLength: 100
        document_type:
          type: string
          enum:
          - INVOICE
          - PURCHASE_ORDER
          - ACKNOWLEDGMENT
          - SHIPPING_NOTICE
          - PAYMENT_ORDER
        format_id:
          type: string
          format: uuid
        sender_id:
          type: string
          maxLength: 255
        receiver_id:
          type: string
          maxLength: 255
        document_total_amount:
          type: number
          format: decimal
          description: Total amount when document is an invoice or payment order.
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 currency when document has monetary amount.
        raw_content:
          type: string
        company_id:
          type: string
          format: uuid
    UpdateEdiDocumentRequest:
      type: object
      properties:
        status:
          type: string
          enum:
          - RECEIVED
          - PARSING
          - PARSED
          - VALIDATED
          - PROCESSED
          - ERROR
        parsed_data:
          type: object
        related_invoice_id:
          type: string
          format: uuid
        related_purchase_order_id:
          type: string
          format: uuid
        document_total_amount:
          type: number
          format: decimal
          description: Total amount when document is an invoice or payment order.
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 currency when document has monetary amount.
        error_message:
          type: string
        acknowledgment_sent:
          type: boolean
    CreateEdiMappingRequest:
      type: object
      required:
      - format_id
      - document_type
      - mapping_name
      - field_mappings
      properties:
        format_id:
          type: string
          format: uuid
        document_type:
          type: string
          enum:
          - INVOICE
          - PURCHASE_ORDER
          - ACKNOWLEDGMENT
          - SHIPPING_NOTICE
          - PAYMENT_ORDER
        mapping_name:
          type: string
