openapi: 3.1.0
info:
  title: Accounts Receivable
  version: 1.0.0
  description: 'Accounts receivable management service handling customer invoices, payments, collections, and aging analysis.
    Supports the full AR lifecycle: invoice creation, payment application, credit memos, dispute management, and aging reporting.
    Integrates with the general ledger for account posting.'
  contact:
    name: RERP Accounting API Support
    email: accounting-api@rerp.ai
servers:
- url: http://localhost:8003/api/v1/accounting/accounts-receivable
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/accounting/accounts-receivable
  description: Accounts Receivable API
tags:
- name: customer-invoices
  description: Customer invoices and their AR status
- name: payments
  description: Customer payments and payment applications
- name: credit-memos
  description: Credit memos for returns, adjustments, and disputes
- name: collections
  description: Collection activities, dunning, and follow-ups
- name: aging
  description: Accounts receivable aging analysis and bucketing
- name: reports
  description: Aging summary and collections reports
paths:
  /customer-invoices:
    get:
      operationId: list_customer_invoices
      summary: List customer invoices
      description: Paginated list of all customer invoices with AR-specific fields including aging bucket and outstanding
        amounts.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
        description: Search by customer name, invoice reference, or status
      - name: status
        in: query
        schema:
          type: string
          enum:
          - DRAFT
          - CONFIRMED
          - PARTIAL
          - PAID
          - WRITTEN_OFF
          - DISPUTED
      - name: aging_bucket
        in: query
        schema:
          type: string
          enum:
          - CURRENT
          - 1-30
          - 31-60
          - 61-90
          - 90+
          - INVALID
      - name: customer_id
        in: query
        schema:
          type: string
          format: uuid
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: currency_code
        in: query
        schema:
          type: string
          minLength: 3
          maxLength: 3
      - name: days_overdue_min
        in: query
        schema:
          type: integer
        description: Minimum days overdue filter
      - name: days_overdue_max
        in: query
        schema:
          type: integer
        description: Maximum days overdue filter
      responses:
        '200':
          description: Paginated list of customer invoices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCustomerInvoices'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_customer_invoice
      summary: Create customer invoice
      description: Create a new AR record for an invoice. Links the invoice to the customer and initializes the outstanding
        amount tracking.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerInvoiceRequest'
      responses:
        '201':
          description: CustomerInvoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerInvoice'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Credit limit exceeded for customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: &id001
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: &id002
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /customer-invoices/{id}:
    get:
      operationId: get_customer_invoice
      summary: Get customer invoice by id
      description: Retrieve a single customer invoice with its full AR details including aging, payment history, and credit
        memo history.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: CustomerInvoice details with AR context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerInvoiceWithDetails'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: update_customer_invoice
      summary: Update customer invoice
      description: Update an AR record's status or aging bucket. Does not modify the base invoice.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerInvoiceRequest'
      responses:
        '200':
          description: CustomerInvoice updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerInvoice'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error
          content: &id004
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: &id003
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: delete_customer_invoice
      summary: Delete customer invoice
      description: Delete a customer invoice record. Only allowed for invoices in DRAFT status.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: CustomerInvoice deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot delete confirmed or paid invoices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /payments:
    get:
      operationId: list_payments
      summary: List payments
      description: Paginated list of all customer payments with filtering by status, date range, customer, and payment method.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
        description: Search by reference number or customer
      - name: status
        in: query
        schema:
          type: string
          enum:
          - PENDING
          - APPLIED
          - APPLIED_PARTIAL
          - REFUNDED
          - FAILED
      - name: payment_method
        in: query
        schema:
          type: string
          enum:
          - WIRE
          - CHECK
          - CREDIT_CARD
          - ACH
          - CASH
          - BANK_TRANSFER
          - PAYMENT_GATEWAY
          - COUNTER_SERVICE
      - name: customer_id
        in: query
        schema:
          type: string
          format: uuid
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: date_from
        in: query
        schema:
          type: string
          format: date
        description: Payment date from (inclusive)
      - name: date_to
        in: query
        schema:
          type: string
          format: date
        description: Payment date to (inclusive)
      responses:
        '200':
          description: Paginated list of payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPayments'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_payment
      summary: Create payment
      description: Record a new customer payment. Optionally auto-apply to oldest outstanding invoices if auto_apply is true.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
  /payments/{id}:
    get:
      operationId: get_payment
      summary: Get payment by id
      description: Retrieve payment details with full application history.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Payment details with applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: update_payment
      summary: Update payment
      description: Update a payment's details. Only pending or partially applied payments can be modified.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePaymentRequest'
      responses:
        '200':
          description: Payment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot update fully applied or refunded payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error
          content: *id004
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
    delete:
      operationId: delete_payment
      summary: Delete payment
      description: Delete a payment. Only pending payments can be deleted. Applied payments must be voided instead.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Payment deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot delete applied payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /payments/{id}/applications:
    get:
      operationId: list_payment_applications
      summary: List payment applications
      description: Get all payment applications for a specific payment.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List of payment applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentApplication'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /payments/applications:
    post:
      operationId: create_payment_application
      summary: Apply payment to invoice
      description: Apply an amount from a payment to a specific customer invoice. Supports partial applications.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentApplicationRequest'
      responses:
        '201':
          description: Payment application created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentApplication'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Payment or invoice not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Payment or invoice is in invalid state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
  /payments/{id}/auto-apply:
    post:
      operationId: auto_apply_payment
      summary: Auto-apply payment
      description: Automatically apply a payment to the oldest outstanding customer invoices.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Auto-apply results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentApplicationResult'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error
          content: *id004
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
  /credit-memos:
    get:
      operationId: list_credit_memos
      summary: List credit memos
      description: Paginated list of all credit memos with filtering by customer, reason, and status.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: customer_id
        in: query
        schema:
          type: string
          format: uuid
      - name: reason
        in: query
        schema:
          type: string
          enum:
          - RETURN
          - OVERCHARGE
          - DAMAGE
          - DISCOUNT
          - DISPUTE
          - ADJUSTMENT
          - OTHER
      - name: status
        in: query
        schema:
          type: string
          enum:
          - DRAFT
          - APPLIED
          - AVAILABLE
      responses:
        '200':
          description: Paginated list of credit memos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCreditMemos'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_credit_memo
      summary: Create credit memo
      description: Create a new credit memo for returns, adjustments, or dispute settlements.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCreditMemoRequest'
      responses:
        '201':
          description: CreditMemo created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditMemo'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
  /collections:
    get:
      operationId: list_collection_activities
      summary: List collection activities
      description: Paginated list of all collection activities with filtering by customer, type, and follow-up status.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: customer_id
        in: query
        schema:
          type: string
          format: uuid
      - name: activity_type
        in: query
        schema:
          type: string
          enum:
          - PHONE
          - EMAIL
          - LETTER
          - VISIT
          - REMINDER
          - DUNNING
          - DISPUTE
          - PAYMENT_PLAN
      - name: assigned_to
        in: query
        schema:
          type: string
          format: uuid
      - name: due_before
        in: query
        schema:
          type: string
          format: date
        description: Follow-up due before this date
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Paginated list of collection activities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCollections'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_collection_activity
      summary: Create collection activity
      description: Record a new collection activity (call, email, letter, etc.) against a customer invoice.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionActivityRequest'
      responses:
        '201':
          description: CollectionActivity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionActivity'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
  /ar-agings:
    get:
      operationId: list_ar_agings
      summary: List AR aging records
      description: List all AR aging analysis records, optionally filtered by customer or company.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: customer_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Paginated list of AR aging records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArAgings'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_ar_aging
      summary: Create AR aging record
      description: Create a new AR aging record for analysis. Usually auto-generated by scheduled jobs.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateArAgingRequest'
      responses:
        '201':
          description: ArAging created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArAging'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Unauthorized \u2014 invalid or expired token"
          content: *id001
        '403':
          description: "Forbidden \u2014 insufficient permissions"
          content: *id002
        '409':
          description: "Conflict \u2014 resource already exists or violates business rules"
          content: *id003
  /ar-agings/{id}:
    get:
      operationId: get_ar_aging
      summary: Get AR aging record by id
      description: Get a specific AR aging record with detailed bucket breakdown.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: ArAging details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArAging'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /reports/aging-summary:
    get:
      operationId: aging_summary
      summary: Aging summary report
      description: Generate a company-wide or customer-specific AR aging summary with DSO and collection efficiency metrics.
      x-brrtrouter-impl: true
      parameters:
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by company
      - name: customer_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by customer
      - name: as_of_date
        in: query
        schema:
          type: string
          format: date
        description: Date for aging calculation. Defaults to today.
      responses:
        '200':
          description: Aging summary with metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgingSummary'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /reports/collections-summary:
    get:
      operationId: collections_summary
      summary: Collections summary report
      description: Generate a summary of all collection activities for a period.
      x-brrtrouter-impl: true
      parameters:
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: date_from
        in: query
        schema:
          type: string
          format: date
      - name: date_to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Collections summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_activities:
                    type: integer
                  by_type:
                    type: object
                  response_rate:
                    type: number
                  upcoming_follow_ups:
                    type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /follow-up-levels:
    get:
      operationId: list_follow_up_levels
      summary: List customer follow-up levels
      responses:
        '200':
          description: Follow-up levels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFollowUpLevels'
    post:
      operationId: create_follow_up_level
      summary: Create customer follow-up level
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFollowUpLevelRequest'
      responses:
        '201':
          description: Follow-up level created
          content:
            application/json:
