    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          enum:
          - NOT_FOUND
          - UNAUTHORIZED
          - FORBIDDEN
          - CONFLICT
          - SERVER_ERROR
          - UNKNOWN
          example: NOT_FOUND
        message:
          type: string
          example: Customer invoice not found
        details:
          type: object
          nullable: true
    ValidationError:
      type: object
      required:
      - code
      - message
      - errors
      properties:
        code:
          type: string
          enum:
          - VALIDATION_ERROR
          example: VALIDATION_ERROR
        message:
          type: string
          example: Payment exceeds outstanding amount
        errors:
          type: array
          items:
            type: object
            required:
            - field
            - message
            properties:
              field:
                type: string
                example: amount
              message:
                type: string
                example: Payment amount exceeds outstanding invoice balance
    AgingSummary:
      type: object
      required:
      - as_of_date
      - bucket_1_30
      - bucket_31_60
      - bucket_61_90
      - bucket_90_plus
      - company_id
      - current
      - total_outstanding
      properties:
        company_id:
          type: string
          format: uuid
        as_of_date:
          type: string
          format: date
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        total_outstanding:
          type: number
          format: double
        current:
          type: number
          format: double
        bucket_1_30:
          type: number
          format: double
        bucket_31_60:
          type: number
          format: double
        bucket_61_90:
          type: number
          format: double
        bucket_90_plus:
          type: number
          format: double
        days_sales_outstanding:
          type: number
          format: double
          description: DSO metric
        collection_efficiency_index:
          type: number
          format: double
          description: CEI metric
        bad_debt_reserves:
          type: number
          format: double
          description: Estimated bad debt (90+ bucket * reserve_rate)
    PaymentApplicationResult:
      type: object
      required:
      - payment_id
      - total_applied
      - unapplied_amount
      - applications
      properties:
        payment_id:
          type: string
          format: uuid
        total_applied:
          type: number
          format: double
          description: Total amount applied across all invoices
        unapplied_amount:
          type: number
          format: double
          description: Remaining unapplied amount
        applications:
          type: array
          items:
