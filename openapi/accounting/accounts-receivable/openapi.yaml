components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-indexed)
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Page size (1-100)
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
      description: Full-text search across name and description fields
    CompanyId:
      name: company_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Filter by company UUID
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token for authentication. Include in Authorization header as 'Bearer <token>'.
  schemas:
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
          description: Total number of records
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Page size limit
    CustomerInvoice:
      type: object
      required:
      - aging_bucket
      - company_id
      - created_at
      - credit_limit_check
      - currency_code
      - customer_id
      - due_date
      - id
      - invoice_id
      - original_amount
      - outstanding_amount
      - status
      - terms
      - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this AR record
        invoice_id:
          type: string
          format: uuid
          description: Reference to the base Invoice entity in the Invoice service
        customer_id:
          type: string
          format: uuid
          description: Customer/partner this invoice is for
        original_amount:
          type: number
          format: double
          description: Original invoice amount in invoice currency
          example: 11000.0
        outstanding_amount:
          type: number
          format: double
          description: Remaining unpaid amount
          example: 11000.0
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          pattern: ^[A-Z]{3}$
          description: ISO 4217 currency code
        status:
          type: string
          enum:
          - DRAFT
          - CONFIRMED
          - PARTIAL
          - PAID
          - WRITTEN_OFF
          - DISPUTED
          description: AR status of this invoice
        aging_bucket:
          type: string
          enum:
          - CURRENT
          - 1-30
          - 31-60
          - 61-90
          - 90+
          - INVALID
          description: Aging bucket calculated from due date and current date
        company_id:
          type: string
          format: uuid
          description: Company this invoice belongs to
        due_date:
          type: string
          format: date
          nullable: true
          description: Payment due date
        terms:
          type: string
          enum:
          - NET_15
          - NET_30
          - NET_45
          - NET_60
          - DUE_ON_RECEIPT
          - CUSTOM
          description: Payment terms
        credit_limit_check:
          type: boolean
          nullable: true
          description: Whether this invoice passed credit limit validation
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CustomerInvoiceWithDetails:
      allOf:
      - $ref: '#/components/schemas/CustomerInvoice'
      - type: object
        properties:
          days_overdue:
            type: integer
            nullable: true
            description: Days past due (0 if not overdue)
          payment_history:
            type: array
            items:
              $ref: '#/components/schemas/PaymentApplication'
            description: Payment applications against this invoice
          credit_memo_history:
            type: array
            items:
              $ref: '#/components/schemas/CreditMemo'
            description: Credit memos applied to this invoice
    CreateCustomerInvoiceRequest:
      type: object
      required:
      - invoice_id
      - customer_id
      - currency_code
      properties:
        invoice_id:
          type: string
          format: uuid
          description: Base Invoice entity reference
        customer_id:
          type: string
          format: uuid
          description: Customer/partner
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          pattern: ^[A-Z]{3}$
        due_date:
          type: string
          format: date
          nullable: true
          description: Payment due date. Defaults to invoice date + terms if not provided.
        terms:
          type: string
          enum:
          - NET_15
          - NET_30
          - NET_45
          - NET_60
          - DUE_ON_RECEIPT
          - CUSTOM
        credit_limit_check:
          type: boolean
          default: true
          description: Whether to check customer credit limit
        company_id:
          type: string
          format: uuid
          nullable: true
    UpdateCustomerInvoiceRequest:
      type: object
      properties:
        status:
          type: string
          enum:
          - DRAFT
          - CONFIRMED
          - PARTIAL
          - PAID
          - WRITTEN_OFF
          - DISPUTED
        aging_bucket:
          type: string
          enum:
          - CURRENT
          - 1-30
          - 31-60
          - 61-90
          - 90+
          - INVALID
        due_date:
          type: string
          format: date
        terms:
          type: string
          enum:
          - NET_15
          - NET_30
          - NET_45
          - NET_60
          - DUE_ON_RECEIPT
          - CUSTOM
        credit_limit_check:
          type: boolean
    Payment:
      type: object
      required:
      - amount
      - applied_at
      - company_id
      - currency_code
      - customer_id
      - gl_entry_id
      - id
      - notes
      - payment_date
      - payment_method
      - posted_to_gl
      - reference_number
      - status
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the payment
        reference_number:
          type: string
          maxLength: 100
          nullable: true
          description: External reference (check number, wire reference, etc.)
        amount:
          type: number
          format: double
          minimum: 0
          description: Payment amount
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          pattern: ^[A-Z]{3}$
        payment_method:
          type: string
          enum:
          - WIRE
          - CHECK
          - CREDIT_CARD
          - ACH
          - CASH
          - BANK_TRANSFER
          - PAYMENT_GATEWAY
          - COUNTER_SERVICE
        payment_date:
          type: string
          format: date
          description: Date the payment was received
        status:
          type: string
          enum:
          - PENDING
          - APPLIED
          - APPLIED_PARTIAL
          - REFUNDED
          - FAILED
        customer_id:
          type: string
          format: uuid
          description: Customer who made the payment
        company_id:
          type: string
          format: uuid
          description: Company this payment belongs to
        posted_to_gl:
          type: boolean
          default: false
          description: Whether payment has been posted to general ledger
        gl_entry_id:
          type: string
          format: uuid
          nullable: true
          description: GL journal entry created for this payment
        notes:
          type: string
          maxLength: 1000
          nullable: true
          description: Payment notes
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        applied_at:
          type: string
          format: date-time
          nullable: true
          description: When payment was applied to invoices
    CreatePaymentRequest:
      type: object
      required:
      - amount
      - currency_code
      - payment_method
      - payment_date
      - customer_id
      properties:
        reference_number:
          type: string
          maxLength: 100
          nullable: true
        amount:
          type: number
          format: double
          minimum: 0
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        payment_method:
