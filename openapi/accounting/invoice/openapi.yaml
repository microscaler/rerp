          - CONFLICT
          - SERVER_ERROR
          - UNKNOWN
          example: NOT_FOUND
        message:
          type: string
          example: Invoice not found
        details:
          type: object
          nullable: true
          example: sample value
    ValidationError:
      type: object
      required:
      - code
      - message
      - errors
      properties:
        code:
          type: string
          enum:
          - VALIDATION_ERROR
          example: VALIDATION_ERROR
        message:
          type: string
          example: Line items exceed invoice total
        errors:
          type: array
          items:
            type: object
            required:
            - field
            - message
            properties:
              field:
                type: string
                example: amount
              message:
                type: string
                example: Line item amount exceeds validation threshold
          example: []
security:
- bearerAuth: []
