      - failed
      - results
      properties:
        total:
          type: integer
          description: Total entries processed
        succeeded:
          type: integer
          description: Number of successful operations
        failed:
          type: integer
          description: Number of failed operations
        results:
          type: array
          items:
            type: object
            properties:
              entry_id:
                type: string
                format: uuid
              success:
                type: boolean
