                type: string
                nullable: true
              result:
                nullable: true
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Machine-readable error code
          enum:
          - NOT_FOUND
          - UNAUTHORIZED
          - FORBIDDEN
          - CONFLICT
          - SERVER_ERROR
          - UNKNOWN
          example: NOT_FOUND
        message:
          type: string
          description: Human-readable error message
          example: Account not found
        details:
          type: object
          nullable: true
          description: Additional error context
    ValidationError:
      type: object
      required:
      - code
      - message
      - errors
      properties:
        code:
          type: string
          enum:
          - VALIDATION_ERROR
          description: Validation error code
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable validation error message
          example: Journal entry must be balanced
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
          description: List of field-level validation errors
        line_errors:
          type: array
          items:
            $ref: '#/components/schemas/LineError'
          nullable: true
          description: Line-level validation errors (for journal entries)
        total_debit:
          type: number
          format: double
          nullable: true
        total_credit:
          type: number
          format: double
          nullable: true
        difference:
          type: number
          format: double
          nullable: true
        tolerance:
          type: number
          format: double
          default: 0.01
          description: Balancing tolerance in the entry's currency
    FieldError:
      type: object
      required:
      - field
      - message
      properties:
        field:
          type: string
          description: Field name that failed validation
          example: lines
        message:
          type: string
          description: Human-readable error for this field
          example: Total debits do not equal total credits
        details:
          type: object
          nullable: true
    LineError:
      type: object
      required:
      - index
      - field
      - message
      properties:
        index:
          type: integer
          description: Line item index (0-based)
        field:
          type: string
          description: Field that failed validation
          example: debit
        message:
          type: string
          description: Human-readable error for this line field
          example: Debit exceeds expected amount
    # Chart of Accounts Templates (AccountChartTemplate)
    ChartTemplate:
      type: object
      required:
      - id
      - name
      - code
      - jurisdiction_code
      - version
      - status
      - company_id
      - is_active
      - is_default
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the chart template
        name:
          type: string
          maxLength: 255
          description: Display name of the chart template
        code:
          type: string
          maxLength: 50
          pattern: ^[A-Z0-9._-]+$
          description: Template code (unique identifier)
        jurisdiction_code:
          type: string
          minLength: 2
          maxLength: 5
          description: ISO 3166-1 alpha-2 or ISO 4217 currency code (e.g., 'US', 'FR', 'DE')
        version:
          type: string
          maxLength: 20
          description: Template version (e.g., '1.0', '2.1')
        status:
          type: string
          enum:
          - DRAFT
          - ACTIVE
          - DEPRECATED
          description: Template lifecycle status
        company_id:
          type: string
          format: uuid
          description: Owner company (templates are company-scoped or global)
        is_active:
          type: boolean
          description: Whether the template is available for use
        is_default:
          type: boolean
          description: Whether this is the default template for the company/jurisdiction
        description:
          type: string
          maxLength: 1000
          nullable: true
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: Default currency for this chart template
        fiscal_month:
          type: integer
          minimum: 1
          maximum: 12
          nullable: true
          description: Month the fiscal year starts (NULL = calendar year)
        fiscal_day:
          type: integer
          minimum: 1
          maximum: 7
          nullable: true
          description: Day of week for fiscal week start (1=Mon, 7=Sun)
        number_of_periods:
          type: integer
          minimum: 1
          maximum: 24
          description: Default number of periods in fiscal year
        include_subperiods:
          type: boolean
          default: false
          description: Whether to create subperiods within periods
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
          nullable: true
        updated_by:
          type: string
          format: uuid
          nullable: true
    ChartTemplateWithAccounts:
      allOf:
      - $ref: '#/components/schemas/ChartTemplate'
      - type: object
        properties:
          account_count:
            type: integer
            description: Total number of accounts in this template
          account_hierarchy:
            type: array
            items:
              $ref: '#/components/schemas/ChartTemplateAccountNode'
            description: Full account hierarchy tree
          period_count:
            type: integer
            description: Number of periods defined
    ChartTemplateAccountNode:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        account_code:
          type: string
          maxLength: 50
        account_name:
          type: string
          maxLength: 255
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
        is_parent:
          type: boolean
          description: Whether this is a parent/summary account
        parent_account_id:
          type: string
          format: uuid
          nullable: true
          description: Parent account ID (for flat list representation)
        level:
          type: integer
          nullable: true
          description: Hierarchy level (0 = root)
        child_count:
          type: integer
          nullable: true
          description: Number of direct child accounts
        tags:
          type: array
          items:
            type: string
          nullable: true
    ChartTemplateDeployment:
      type: object
