components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token for authentication. Include in Authorization header as 'Bearer <token>'.
  schemas:
    Account:
      type: object
      required:
      - id
      - chart_of_account_id
      - code
      - name
      - account_type
      - normal_balance
      - currency_code
      - is_active
      - is_system_account
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the account
        chart_of_account_id:
          type: string
          format: uuid
          description: Parent chart of accounts node
        code:
          type: string
          maxLength: 50
          pattern: ^[A-Z0-9._-]+$
          description: Account code (e.g., '1010', '2000.1', '5.1.2')
        name:
          type: string
          maxLength: 255
          description: Account display name
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
          description: Account classification determining normal balance direction
        normal_balance:
          type: string
          enum:
          - DEBIT
          - CREDIT
          description: Expected normal balance side for this account type
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          pattern: ^[A-Z]{3}$
          description: ISO 4217 currency code (e.g., USD, EUR, GBP)
        is_active:
          type: boolean
          description: Whether the account is active (inactive accounts can still be referenced by historical entries)
        is_system_account:
          type: boolean
          description: System-defined account that cannot be modified or deleted
        description:
          type: string
          maxLength: 1000
          nullable: true
          description: Optional account description
        metadata:
          type: object
          nullable: true
          description: Arbitrary metadata for extensions
          properties:
            tags:
              type: array
              items:
                type: string
            custom_fields:
              type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
          nullable: true
        updated_by:
          type: string
          format: uuid
          nullable: true
    AccountWithBalance:
      allOf:
      - $ref: '#/components/schemas/Account'
      - type: object
        properties:
          current_balance:
            type: number
            format: double
            description: Current account balance (debit - credit)
          opening_balance:
            type: number
            format: double
            description: Balance at start of current period
          period_debits:
            type: number
            format: double
            description: Total debits in current period
          period_credits:
            type: number
            format: double
            description: Total credits in current period
          child_accounts:
            type: array
            items:
              $ref: '#/components/schemas/Account'
            description: Direct child accounts in chart hierarchy
    AccountBalance:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        account_code:
          type: string
          maxLength: 50
        account_name:
          type: string
          maxLength: 255
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
        opening_balance:
          type: number
          format: double
          description: Balance at start of period
        period_debits:
          type: number
          format: double
          description: Total debits in period
        period_credits:
          type: number
          format: double
          description: Total credits in period
        closing_balance:
          type: number
          format: double
          description: Balance at end of period
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        period_id:
          type: string
          format: uuid
          nullable: true
          description: Fiscal period this balance is for
        as_of_date:
          type: string
          format: date
          description: Date as of which balance is calculated
    ChartOfAccount:
      type: object
      required:
      - id
      - code
      - name
      - account_type
      - level
      - is_active
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          maxLength: 50
          description: Chart code for grouping accounts
        name:
          type: string
          maxLength: 255
          description: Chart display name
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
          description: Default account type for accounts in this chart
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: Parent chart node for hierarchy
        level:
          type: integer
          minimum: 0
          description: Hierarchy depth level
        is_active:
          type: boolean
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateChartOfAccountRequest:
      type: object
      required:
      - code
      - name
      - account_type
      properties:
        code:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 255
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
        parent_id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
          default: true
    UpdateChartOfAccountRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
    Journal:
      type: object
      required:
      - id
      - name
      - code
      - type
      - company_id
      - is_active
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
          description: Journal display name (e.g., 'General Journal', 'Sales Journal')
        code:
          type: string
          maxLength: 10
          pattern: ^[A-Z]{1,5}$
          description: Short code used as prefix for entry numbers (e.g., 'GEN', 'SAL', 'PCH')
        type:
          type: string
          enum:
          - ENTRY
          - SALE
          - PURCHASE
          - CASH
          - BANK
          - MISC
          description: Journal type determines default account and entry number format
        company_id:
          type: string
          format: uuid
          description: Company that owns this journal
        currency_id:
          type: string
          format: uuid
          nullable: true
          description: Default currency for entries in this journal
        default_account_id:
          type: string
          format: uuid
          nullable: true
          description: Default account for entries when not specified
        suspense_account_id:
          type: string
          format: uuid
          nullable: true
          description: Account for entries awaiting classification
        sequence_number_next:
          type: integer
          description: Next sequence number for entry numbering
        sequence_prefix:
          type: string
          maxLength: 10
          description: Prefix for entry numbering (e.g., 'GEN-2024-')
        company_code:
          type: string
          maxLength: 50
          description: Company code used in entry numbers
        is_active:
          type: boolean
          description: Whether the journal is available for new entries
        restrict_mode_hash_table:
          type: boolean
          description: If true, posted entries are secured with a hash (cannot be modified)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateJournalRequest:
      type: object
      required:
      - name
      - code
      - type
      - company_id
      properties:
        name:
          type: string
          maxLength: 100
          description: Journal display name
        code:
          type: string
          maxLength: 10
          pattern: ^[A-Z]{1,5}$
          description: Short code for entry numbering prefix
        type:
          type: string
          enum:
          - ENTRY
          - SALE
          - PURCHASE
          - CASH
          - BANK
          - MISC
          description: Journal type
        company_id:
          type: string
          format: uuid
        currency_id:
          type: string
          format: uuid
          nullable: true
        default_account_id:
          type: string
          format: uuid
          nullable: true
        suspense_account_id:
          type: string
          format: uuid
          nullable: true
        is_active:
          type: boolean
          default: true
    UpdateJournalRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        code:
          type: string
          maxLength: 10
        default_account_id:
          type: string
          format: uuid
          nullable: true
        suspense_account_id:
          type: string
          format: uuid
          nullable: true
        is_active:
          type: boolean
    JournalEntry:
      type: object
      required:
      - id
      - entry_number
      - entry_date
      - description
      - status
      - total_debit
      - total_credit
      - currency_code
      properties:
        id:
          type: string
          format: uuid
        entry_number:
          type: string
          maxLength: 50
          pattern: ^[A-Z0-9\-]+$
          description: Auto-generated or manual entry number (e.g., 'GEN-2024-0001')
        entry_date:
          type: string
          format: date
          description: Accounting date of the entry
        description:
          type: string
          maxLength: 500
          description: Entry description/narration
        reference_number:
          type: string
          maxLength: 100
          nullable: true
          description: External reference number
        journal_id:
          type: string
          format: uuid
          nullable: true
          description: Journal this entry belongs to
        status:
          type: string
          enum:
          - DRAFT
          - APPROVED
          - POSTED
          - REVERSED
          description: Entry lifecycle state
          example: DRAFT
        total_debit:
          type: number
          format: double
          description: Sum of all line debits
          example: 5000.0
        total_credit:
          type: number
          format: double
          description: Sum of all line credits
          example: 5000.0
        currency_code:
          type: string
