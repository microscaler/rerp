openapi: 3.1.0
info:
  title: CRM Engagement
  version: v1.0.0
  description: Customer engagement service for subscriptions, renewals, gamification,
    and health scoring.
  x-api-version: CRM Engagement API v1.0.0
  x-crm-api-version: v1.0.0
  termsOfService: https://rerp.example.com/terms
  contact:
    name: RERP API Support
    url: https://docs.rerp.com/support
    email: api-support@rerp.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  x-api-docs:
    service: engagement
    openapi_version: 3.1.0
    brrtrouter_version: latest
servers:
- url: http://localhost:10352/api/v1/crm/engagement
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/crm/engagement
  description: Engagement API
tags:
- name: badges
  description: Badge definitions and user achievements
- name: engagement-badges
  description: Badge definitions and awards
- name: engagement-health
  description: Customer health scores and risk assessment
- name: engagement-leaderboard
  description: Performance leaderboards and rankings
- name: goals
  description: Gamification goals and achievements
- name: goals-progress
  description: Goal progress updates and milestones
- name: health
  description: Customer health scoring
- name: renewals
  description: Renewal tracking and alerts
- name: subscriptions
  description: Subscription and recurring revenue management
- name: subscriptions-analytics
  description: Subscription analytics (MRR, churn)
- name: subscriptions-renewal
  description: Subscription renewal processing and tracking
paths:
  /subscriptions:
    get:
      operationId: list_subscriptions
      summary: List all subscriptions
      tags:
      - subscriptions
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_status
        in: query
        schema:
          type: string
          enum:
          - ACTIVE
          - EXPIRED
          - CANCELLED
          - TRIAL
          - PAST_DUE
      - name: filter_customer_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List of subscriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all subscriptions
      x-operation-id: get_subscriptions_list
      x-controller: rerp_crm::engagement::controller::subscriptions
      x-handler-name: subscriptions
    post:
      operationId: create_subscription
      summary: Create a new subscription from a closed opportunity
      tags:
      - subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionRequest'
            examples:
              default: &id002
                customer_id: 00000000-0000-0000-0000-000000000019
                plan: professional
        description: Create a new customer subscription
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
              examples:
                default: &id001
                  id: 00000000-0000-0000-0000-000000000018
                  customer_id: 00000000-0000-0000-0000-000000000019
                  plan: professional
                  status: active
                  mrr: 99.0
                  created_at: '2024-01-15T10:30:00Z'
                  updated_at: '2024-01-15T10:30:00Z'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new subscriptions
      x-operation-id: post_subscriptions_list
      x-controller: rerp_crm::engagement::controller::subscriptions
      x-handler-name: subscriptions
  /subscriptions/{id}:
    get:
      operationId: get_subscription
      summary: Get subscription by id
      tags:
      - subscriptions
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
              examples:
                default: *id001
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get subscriptions by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::engagement::controller::subscriptions::id
      x-handler-name: subscriptions_id
    put:
      operationId: update_subscription
      summary: Update subscription
      tags:
      - subscriptions
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubscriptionRequest'
            examples:
              default: *id002
        description: Update an existing subscription
      responses:
        '200':
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
              examples:
                default: *id001
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update subscriptions by ID
      x-operation-id: put_id_by_id
      x-controller: rerp_crm::engagement::controller::subscriptions::id
      x-handler-name: subscriptions_id
    delete:
      operationId: delete_subscription
      summary: Cancel subscription
      tags:
      - subscriptions
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Subscription cancelled
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Delete subscriptions by ID
      x-operation-id: delete_id_by_id
      x-controller: rerp_crm::engagement::controller::subscriptions::id
      x-handler-name: subscriptions_id
  /subscriptions/{id}/renew:
    post:
      operationId: renew_subscription
      summary: Renew an active or expired subscription
      tags:
      - subscriptions
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                new_end_date:
                  type: string
                  format: date
                value:
                  type: number
                  format: double
      responses:
        '200':
          description: Subscription renewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
              examples:
                default: *id001
        '404':
          description: Not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Renew a subscription
      x-operation-id: post_subscriptions_renew
      x-controller: rerp_crm::engagement::controller::subscriptions::id::renew
      x-handler-name: subscriptions_id_renew
  /subscriptions/mrr:
    get:
      operationId: get_mrr
      summary: Get monthly recurring revenue metrics
      tags:
      - subscriptions
      responses:
        '200':
          description: MRR metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all subscriptions
      x-operation-id: get_mrr
      x-controller: rerp_crm::engagement::controller::subscriptions::mrr
      x-handler-name: subscriptions_mrr
  /subscriptions/churn:
    get:
      operationId: get_churn_metrics
      summary: Get churn rate and churned customers
      tags:
      - subscriptions
      parameters:
      - name: period
        in: query
        schema:
          type: string
          enum:
          - MONTH
          - QUARTER
          - YEAR
      responses:
        '200':
          description: Churn metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all subscriptions
      x-operation-id: get_churn
      x-controller: rerp_crm::engagement::controller::subscriptions::churn
      x-handler-name: subscriptions_churn
  /renewals/upcoming:
    get:
      operationId: list_upcoming_renewals
      summary: List upcoming renewals
      tags:
      - renewals
      parameters:
      - name: days_ahead
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 365
          default: 30
      responses:
        '200':
          description: Upcoming renewals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Renew a subscription
      x-operation-id: get_upcoming
      x-controller: rerp_crm::engagement::controller::renewals::upcoming
      x-handler-name: renewals_upcoming
  /goals:
    get:
      operationId: list_goals
      summary: List all goals
      tags:
      - goals
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_type
        in: query
        schema:
          type: string
          enum:
          - REVENUE
          - DEALS
          - CALLS
          - MEETINGS
          - LEADS
      - name: filter_user_id
        in: query
        schema:
          type: string
          format: uuid
      - name: filter_team_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List of goals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all goals
      x-operation-id: get_goals_list
      x-controller: rerp_crm::engagement::controller::goals
      x-handler-name: goals
    post:
      operationId: create_goal
      summary: Create a new goal
      tags:
      - goals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGoalRequest'
            examples:
              default: &id004
                name: Close 10 deals
                target: 10
                period: quarterly
        description: Create a new performance goal
      responses:
        '201':
          description: Goal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
              examples:
                default: &id003
                  id: 00000000-0000-0000-0000-000000000020
                  name: Close 10 deals
                  target: 10
                  current: 7
                  period: quarterly
                  created_at: '2024-01-15T10:30:00Z'
                  updated_at: '2024-01-15T10:30:00Z'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new goals
      x-operation-id: post_goals_list
      x-controller: rerp_crm::engagement::controller::goals
      x-handler-name: goals
  /goals/{id}:
    get:
      operationId: get_goal
      summary: Get goal by id with progress
      tags:
      - goals
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Goal details with progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
              examples:
                default: *id003
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get goals by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::engagement::controller::goals::id
      x-handler-name: goals_id
    put:
      operationId: update_goal
      summary: Update goal
      tags:
      - goals
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGoalRequest'
            examples:
              default: *id004
        description: Update an existing goal
      responses:
        '200':
          description: Goal updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
              examples:
                default: *id003
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update goals by ID
      x-operation-id: put_id_by_id
      x-controller: rerp_crm::engagement::controller::goals::id
      x-handler-name: goals_id
  /goals/{id}/progress:
    put:
      operationId: update_goal_progress
      summary: Update goal progress (called when a deal closes, etc.)
      tags:
      - goals
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                completed_value:
                  type: number
                  format: double
                delta:
                  type: number
                  format: double
        description: Update goal progress and milestones
      responses:
        '200':
          description: Progress updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
              examples:
                default: *id003
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update goals by ID
      x-operation-id: put_progress_by_id
      x-controller: rerp_crm::engagement::controller::goals::id::progress
      x-handler-name: goals_id_progress
  /leaderboard:
    get:
      operationId: get_leaderboard
      summary: Get ranked list of users by metric
      tags:
      - goals
      parameters:
      - name: metric
        in: query
        schema:
          type: string
          enum:
          - REVENUE
          - DEALS
          - LEADS
          - MEETINGS
          default: REVENUE
      - name: period_start
        in: query
        schema:
          type: string
          format: date
      - name: period_end
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get performance leaderboard
      x-operation-id: get_leaderboard_list
      x-controller: rerp_crm::engagement::controller::leaderboard
      x-handler-name: leaderboard
  /badges:
    get:
      operationId: list_badges
      summary: List all available badges
      tags:
      - badges
      responses:
        '200':
          description: List of badges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all badges
      x-operation-id: get_badges_list
      x-controller: rerp_crm::engagement::controller::badges
      x-handler-name: badges
  /users/{id}/badges:
    get:
      operationId: get_user_badges
      summary: Get user's earned badges
      tags:
      - badges
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: User's earned badges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get users by ID
      x-operation-id: get_badges_by_id
      x-controller: rerp_crm::engagement::controller::users::id::badges
      x-handler-name: users_id_badges
  /customers/{id}/health:
    get:
      operationId: get_customer_health
      summary: Get customer health score
      tags:
      - health
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Customer health score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '404':
          description: Customer not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get customer health score
      x-operation-id: get_health_by_id
      x-controller: rerp_crm::engagement::controller::customers::id::health
      x-handler-name: customers_id_health
  /customers/at-risk:
    get:
      operationId: list_at_risk_customers
      summary: List customers with health score below threshold
      tags:
      - health
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: threshold
        in: query
        schema:
          type: integer
          minimum: 0
          maximum: 100
          default: 40
      responses:
        '200':
          description: At-risk customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get at-risk customers
      x-operation-id: get_at-risk
      x-controller: rerp_crm::engagement::controller::customers::at-risk
      x-handler-name: customers_at-risk
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination (1-indexed)
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 'Maximum number of items per page (default: 20, max: 100)'
    Search:
      name: search
      in: query
      schema:
        type: string
      description: Search query string for filtering resources
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique identifier for the resource
  schemas:
    Subscription:
      type: object
      required:
      - id
      - status
      - billing_cycle
      - start_date
      - value
      properties:
        id:
          type: string
          format: uuid
        opportunity_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/SubscriptionStatus'
        plan_id:
          type: string
          format: uuid
        plan_name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        renewal_date:
          type: string
          format: date
        renewal_automatic:
          type: boolean
        value:
          type: number
          format: double
        monthly_value:
          type: number
          format: double
          readOnly: true
        currency_id:
          type: string
          format: uuid
        billing_cycle:
          $ref: '#/components/schemas/BillingCycle'
        payment_method:
          type: string
        seats:
          type: integer
        created_at:
          type: string
          format: date-time
          readOnly: true
        cancelled_at:
          type: string
          format: date-time
          readOnly: true
        cancellation_reason:
          type: string
        churn_risk_score:
          type: number
          format: float
          description: Churn probability (0-100)
      description: A customer subscription to a product or service plan
    CreateSubscriptionRequest:
      type: object
      required:
      - opportunity_id
      - plan_id
      - start_date
      - value
      - billing_cycle
      properties:
        opportunity_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        plan_name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        renewal_automatic:
          type: boolean
        value:
          type: number
          format: double
        billing_cycle:
          $ref: '#/components/schemas/BillingCycle'
        payment_method:
          type: string
        seats:
          type: integer
      description: Request body for creating a new customer subscription
    UpdateSubscriptionRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/SubscriptionStatus'
        end_date:
          type: string
          format: date
        value:
          type: number
          format: double
        seats:
          type: integer
        payment_method:
          type: string
        cancellation_reason:
          type: string
      required:
      - end_date
      - value
      - seats
      - payment_method
      - cancellation_reason
      description: Request body for updating an existing subscription
    MRRMetrics:
      type: object
      properties:
        current_mrr:
          type: number
          format: double
        new_mrr:
          type: number
          format: double
        expansion_mrr:
          type: number
          format: double
        churn_mrr:
          type: number
          format: double
        net_mrr:
          type: number
          format: double
        period:
          type: string
      required:
      - current_mrr
      - new_mrr
      - expansion_mrr
      - churn_mrr
      - net_mrr
      - period
      description: Monthly Recurring Revenue metrics with breakdown by source
    ChurnMetrics:
      type: object
      properties:
        total_subscriptions:
          type: integer
        churned_subscriptions:
          type: integer
        churn_rate:
          type: number
          format: float
        churned_revenue:
          type: number
          format: double
        period:
          type: string
      required:
      - total_subscriptions
      - churned_subscriptions
      - churn_rate
      - churned_revenue
      - period
      description: Churn rate metrics including counts and revenue impact
    Goal:
      type: object
      required:
      - id
      - name
      - type
      - target_value
      - start_date
      - end_date
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        type:
          $ref: '#/components/schemas/GoalType'
        target_value:
          type: number
          format: double
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        user_id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        currency_id:
          type: string
          format: uuid
        is_active:
          type: boolean
        completed_value:
          type: number
          format: double
          readOnly: true
        completion_percentage:
          type: number
          format: float
          readOnly: true
      description: A target metric for sales teams or individuals to achieve
    CreateGoalRequest:
      type: object
      required:
      - name
      - type
      - target_value
      - start_date
      - end_date
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/GoalType'
        target_value:
          type: number
          format: double
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        user_id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        currency_id:
          type: string
          format: uuid
      description: Request body for creating a new performance goal
    UpdateGoalRequest:
      type: object
      properties:
        name:
          type: string
        target_value:
          type: number
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        is_active:
          type: boolean
      required:
      - name
      - target_value
      - start_date
      - end_date
      - is_active
      description: Request body for updating an existing goal
    Badge:
      type: object
      required:
      - id
      - name
      - criteria
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        description:
          type: string
        icon:
          type: string
          maxLength: 32
        criteria:
          type: object
          description: Achievement criteria (JSON)
        is_active:
          type: boolean
      description: Badge definition with name, criteria, and icon
    UserBadge:
      type: object
      required:
      - id
      - user_id
      - badge_id
      - earned_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        badge_id:
          type: string
          format: uuid
        earned_at:
          type: string
          format: date-time
        badge:
          $ref: '#/components/schemas/Badge'
      description: Record of a user earning a badge with timestamp
    CustomerHealthScore:
      type: object
      required:
      - customer_id
      - score
      properties:
        customer_id:
          type: string
          format: uuid
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: Overall health score (0-100)
        engagement_score:
          type: integer
          minimum: 0
          maximum: 100
        support_score:
          type: integer
          minimum: 0
          maximum: 100
        usage_score:
          type: integer
          minimum: 0
          maximum: 100
        payment_score:
          type: integer
          minimum: 0
          maximum: 100
        last_updated:
          type: string
          format: date-time
        risk_level:
          $ref: '#/components/schemas/RiskLevel'
      description: Customer health score with contributing sub-scores
    SubscriptionStatus:
      type: string
      enum:
      - ACTIVE
      - EXPIRED
      - CANCELLED
      - TRIAL
      - PAST_DUE
      description: Enum of subscription statuses (active, cancelled, past_due)
    BillingCycle:
      type: string
      enum:
      - MONTHLY
      - QUARTERLY
      - ANNUALLY
      description: Enum of billing cycles (monthly, quarterly, annual)
    GoalType:
      type: string
      enum:
      - REVENUE
      - DEALS
      - CALLS
      - MEETINGS
      - LEADS
      description: Enum of goal types (revenue, activity, retention)
    RiskLevel:
      type: string
      enum:
      - HEALTHY
      - AT_RISK
      - CHURN_RISK
      description: Enum of risk levels (low, medium, high, critical)
    Userbadges:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
