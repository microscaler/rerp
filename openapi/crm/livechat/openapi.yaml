openapi: 3.1.0
info:
  title: Live Chat
  version: v1.0.0
  description: Real-time live chat service with visitor tracking, agent management,
    and chat-to-lead conversion.
  x-api-version: CRM LiveChat API v1.0.0
  x-crm-api-version: v1.0.0
  termsOfService: https://rerp.example.com/terms
servers:
- url: http://localhost:10352/api/v1/crm/livechat
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/crm/livechat
  description: Livechat API
tags:
- name: agent-metrics
  description: Agent performance metrics and queue status
- name: agents
  description: Chat agent management
- name: chats
  description: Chat session management
- name: chats-conversion
  description: Chat-to-lead conversion workflows
- name: chats-messages
  description: Chat message operations and transcripts
- name: messages
  description: Chat message management
paths:
  /chats:
    get:
      operationId: list_chats
      summary: List chat sessions
      tags:
      - chats
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Search'
      - name: filter_status
        in: query
        schema:
          type: string
          enum:
          - WAITING
          - ACTIVE
          - CLOSED
          - TRANSFERRED
      - name: filter_agent_id
        in: query
        schema:
          type: string
          format: uuid
      - name: filter_started_after
        in: query
        schema:
          type: string
          format: date-time
      - name: filter_started_before
        in: query
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: List of chat sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChatSession'
              examples:
                default:
                  items:
                  - &id001
                    id: 00000000-0000-0000-0000-000000000013
                    visitor_id: 00000000-0000-0000-0000-000000000014
                    agent_id: 00000000-0000-0000-0000-000000000015
                    status: active
                    started_at: '2024-01-15T10:30:00Z'
                    updated_at: '2024-01-15T10:30:00Z'
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all chats
      x-operation-id: get_chats_list
      x-controller: rerp_crm::livechat::controller::chats
      x-handler-name: chats
    post:
      operationId: create_chat
      summary: Start a new chat session
      tags:
      - chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatRequest'
      responses:
        '201':
          description: Chat session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSession'
              examples:
                default: *id001
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new chats
      x-operation-id: post_chats_list
      x-controller: rerp_crm::livechat::controller::chats
      x-handler-name: chats
  /chats/active:
    get:
      operationId: list_active_chats
      summary: List currently active chat sessions
      tags:
      - chats
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Active chat sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChatSession'
              examples:
                default:
                  items:
                  - *id001
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all chats
      x-operation-id: get_active
      x-controller: rerp_crm::livechat::controller::chats::active
      x-handler-name: chats_active
  /chats/{id}:
    get:
      operationId: get_chat
      summary: Get chat session by id
      tags:
      - chats
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Chat session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSession'
              examples:
                default: *id001
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get chats by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::livechat::controller::chats::id
      x-handler-name: chats_id
    delete:
      operationId: delete_chat
      summary: Delete chat session transcript
      tags:
      - chats
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Chat deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Delete chats by ID
      x-operation-id: delete_id_by_id
      x-controller: rerp_crm::livechat::controller::chats::id
      x-handler-name: chats_id
  /chats/{id}/message:
    post:
      operationId: send_chat_message
      summary: Send a message in a chat session
      tags:
      - chats
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessage'
              examples:
                default: &id002
                  id: 00000000-0000-0000-0000-000000000016
                  session_id: 00000000-0000-0000-0000-000000000013
                  sender_id: 00000000-0000-0000-0000-000000000015
                  content: Hello, how can I help you?
                  created_at: '2024-01-15T10:30:00Z'
        '400':
          description: Invalid request
        '404':
          description: Chat not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Perform an action on chats
      x-operation-id: post_message_by_id
      x-controller: rerp_crm::livechat::controller::chats::id::message
      x-handler-name: chats_id_message
  /chats/{id}/close:
    post:
      operationId: close_chat
      summary: Close a chat session
      tags:
      - chats
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Chat closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSession'
              examples:
                default: *id001
        '404':
          description: Not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Perform an action on chats
      x-operation-id: post_chats_close
      x-controller: rerp_crm::livechat::controller::chats::id::close
      x-handler-name: chats_id_close
  /chats/{id}/transcript:
    get:
      operationId: get_chat_transcript
      summary: Get full chat transcript
      tags:
      - chats
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Chat transcript
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTranscript'
              examples:
                default:
                  session_id: 00000000-0000-0000-0000-000000000013
                  messages:
                  - sender: agent
                    content: Hello, how can I help?
                    timestamp: '2024-01-15T10:30:00Z'
                  - sender: visitor
                    content: I need pricing info
                    timestamp: '2024-01-15T10:30:15Z'
                  total_messages: 5
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get chat session transcript
      x-operation-id: get_transcript_by_id
      x-controller: rerp_crm::livechat::controller::chats::id::transcript
      x-handler-name: chats_id_transcript
  /chats/convert:
    post:
      operationId: convert_chat_to_lead
      summary: Convert a chat session into a CRM lead
      tags:
      - chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertChatRequest'
      responses:
        '200':
          description: Chat converted to lead
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatConversionResult'
              examples:
                default:
                  session_id: 00000000-0000-0000-0000-000000000013
                  converted_to_lead: true
                  lead_id: 00000000-0000-0000-0000-000000000001
                  converted_at: '2024-01-15T10:30:00Z'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new chats
      x-operation-id: post_convert
      x-controller: rerp_crm::livechat::controller::chats::convert
      x-handler-name: chats_convert
  /messages:
    get:
      operationId: list_messages
      summary: List all messages across sessions
      tags:
      - messages
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_session_id
        in: query
        schema:
          type: string
          format: uuid
      - name: filter_sender_type
        in: query
        schema:
          type: string
          enum:
          - AGENT
          - VISITOR
          - BOT
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChatMessage'
              examples:
                default:
                  items:
                  - *id002
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all messages
      x-operation-id: get_messages_list
      x-controller: rerp_crm::livechat::controller::messages
      x-handler-name: messages
  /messages/{id}:
    get:
      operationId: get_message
      summary: Get message by id
      tags:
      - messages
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Message details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessage'
              examples:
                default: *id002
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get messages by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::livechat::controller::messages::id
      x-handler-name: messages_id
  /agents:
    get:
      operationId: list_agents
      summary: List all chat agents
      tags:
      - agents
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_online
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAgent'
              examples:
                default:
                  items:
                  - &id003
                    id: 00000000-0000-0000-0000-000000000015
                    name: Agent Smith
                    email: agent@example.com
                    status: available
                    created_at: '2024-01-15T10:30:00Z'
                    updated_at: '2024-01-15T10:30:00Z'
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all agents
      x-operation-id: get_agents_list
      x-controller: rerp_crm::livechat::controller::agents
      x-handler-name: agents
    post:
      operationId: create_agent
      summary: Create a new chat agent
      tags:
      - agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequest'
            examples:
              default: &id004
                name: Agent Smith
                email: agent@example.com
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
              examples:
                default: *id003
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new agents
      x-operation-id: post_agents_list
      x-controller: rerp_crm::livechat::controller::agents
      x-handler-name: agents
  /agents/{id}:
    get:
      operationId: get_agent
      summary: Get agent by id
      tags:
      - agents
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
              examples:
                default: *id003
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get agents by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::livechat::controller::agents::id
      x-handler-name: agents_id
    put:
      operationId: update_agent
      summary: Update agent fields
      tags:
      - agents
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentRequest'
            examples:
              default: *id004
      responses:
        '200':
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
              examples:
                default: *id003
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update agents by ID
      x-operation-id: put_id_by_id
      x-controller: rerp_crm::livechat::controller::agents::id
      x-handler-name: agents_id
    delete:
      operationId: delete_agent
      summary: Delete agent
      tags:
      - agents
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Agent deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Delete agents by ID
      x-operation-id: delete_id_by_id
      x-controller: rerp_crm::livechat::controller::agents::id
      x-handler-name: agents_id
  /agents/{id}/status:
    put:
      operationId: set_agent_status
      summary: Set an agent's online/offline status
      tags:
      - agents
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaginatedAgentStatusRequest'
            examples:
              default: *id004
      responses:
        '200':
          description: Agent status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
              examples:
                default: *id003
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Get or update agent status
      x-operation-id: put_status_by_id
      x-controller: rerp_crm::livechat::controller::agents::id::status
      x-handler-name: agents_id_status
  /agents/status:
    get:
      operationId: get_all_agent_status
      summary: Get all agent online statuses
      tags:
      - agents
      responses:
        '200':
          description: All agent statuses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAgentStatus'
              examples:
                default:
                  items:
                  - agent_id: 00000000-0000-0000-0000-000000000015
                    status: available
                    current_chats: 2
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get or update agent status
      x-operation-id: get_status
      x-controller: rerp_crm::livechat::controller::agents::status
      x-handler-name: agents_status
  /agents/{id}/metrics:
    get:
      operationId: get_agent_metrics
      summary: Get agent performance metrics
      tags:
      - agents
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Agent metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentMetrics'
              examples:
                default:
                  agent_id: 00000000-0000-0000-0000-000000000015
                  total_chats: 45
                  avg_response_time: 12
                  satisfaction_score: 4.5
                  period: weekly
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get agent performance metrics
      x-operation-id: get_metrics_by_id
      x-controller: rerp_crm::livechat::controller::agents::id::metrics
      x-handler-name: agents_id_metrics
  /agents/queue:
    get:
      operationId: get_waiting_queue
      summary: Get current waiting queue for chat
      tags:
      - agents
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: Waiting queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAgentQueueItem'
              examples:
                default:
                  items:
                  - id: 00000000-0000-0000-0000-000000000001
                    name: John Doe
                    source: website
                    score: 45
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all agents
      x-operation-id: get_queue
      x-controller: rerp_crm::livechat::controller::agents::queue
      x-handler-name: agents_queue
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Search:
      name: search
      in: query
      schema:
        type: string
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    ChatSession:
      type: object
      required:
      - id
      - agent_id
      - status
      - started_at
      properties:
        id:
          type: string
          format: uuid
        visitor_id:
          type: string
          description: Anonymous visitor ID (session cookie)
        contact_id:
          type: string
          format: uuid
          description: Converted contact record
        lead_id:
          type: string
          format: uuid
          description: Converted lead record
        agent_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ChatStatus'
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        duration_seconds:
          type: integer
          readOnly: true
          description: Session duration in seconds
        transcript:
          type: object
          description: Full chat message history (JSON array of messages)
        satisfaction_rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Visitor satisfaction rating
        tags:
          type: array
          items:
            type: string
          description: Session tags (e.g., pricing, demo)
        converted_to_lead:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      description: A live chat session between a visitor and an agent
    CreateChatRequest:
      type: object
      required:
      - visitor_id
      properties:
        visitor_id:
          type: string
          description: Anonymous visitor ID
        contact_id:
          type: string
          format: uuid
          description: Pre-linked contact
        lead_id:
          type: string
          format: uuid
          description: Pre-linked lead
        agent_id:
          type: string
          format: uuid
          description: Specific agent to assign (optional)
        tags:
          type: array
          items:
            type: string
    SendChatRequest:
      type: object
      required:
      - visitor_id
      properties:
        visitor_id:
          type: string
    ConvertChatRequest:
      type: object
      required:
      - chat_id
      properties:
        chat_id:
          type: string
          format: uuid
        name:
          type: string
          description: Contact/lead name
        email:
          type: string
          format: email
        phone:
          type: string
        company_name:
          type: string
        team_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        tags:
          type: array
          items:
            type: string
    ChatConversionResult:
      type: object
      properties:
        chat_id:
          type: string
          format: uuid
        lead_id:
          type: string
          format: uuid
        contact_id:
          type: string
          format: uuid
        lead:
          type: object
      required:
      - chat_id
      - lead_id
      - contact_id
    ChatTranscript:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        duration_seconds:
          type: integer
      required:
      - session_id
      - messages
      - started_at
      - ended_at
      - duration_seconds
    ChatMessage:
      type: object
      required:
      - id
      - session_id
      - sender_type
      - message
      - sent_at
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        sender_type:
          $ref: '#/components/schemas/SenderType'
        sender_id:
          type: string
          format: uuid
          description: User ID (agent) or bot ID
        message:
          type: string
        is_system:
          type: boolean
          description: System message (e.g., "Agent joined")
        sent_at:
          type: string
          format: date-time
        read_at:
          type: string
          format: date-time
      description: A single message within a chat session
    SendMessageRequest:
      type: object
      required:
      - message
      properties:
        message:
          type: string
        sender_type:
          $ref: '#/components/schemas/SenderType'
        sender_id:
          type: string
          format: uuid
    Agent:
      type: object
      required:
      - id
      - is_online
      - max_concurrent
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        is_online:
          type: boolean
        active_sessions:
          type: integer
          readOnly: true
        max_concurrent:
          type: integer
          description: 'Max concurrent chats (default: 3)'
        total_chats_today:
          type: integer
          readOnly: true
        avg_response_time_seconds:
          type: number
          format: float
          readOnly: true
        satisfaction_avg:
          type: number
          format: float
          readOnly: true
        queue_position:
          type: integer
          readOnly: true
        skills:
          type: array
          items:
            type: string
          description: Agent skills (e.g., technical, sales)
        create_date:
          type: string
          format: date-time
          readOnly: true
      description: A customer support agent who handles live chat sessions
    CreateAgentRequest:
      type: object
      required:
      - user_id
      properties:
        user_id:
          type: string
          format: uuid
        max_concurrent:
          type: integer
          default: 3
        skills:
          type: array
          items:
            type: string
    UpdateAgentRequest:
      type: object
      properties:
        max_concurrent:
          type: integer
        skills:
          type: array
          items:
            type: string
        is_online:
          type: boolean
      required:
      - max_concurrent
      - skills
      - is_online
    AgentStatusRequest:
      type: object
      required:
      - is_online
      properties:
        is_online:
          type: boolean
    AgentMetrics:
      type: object
      properties:
        agent_id:
          type: string
          format: uuid
        total_chats:
          type: integer
        avg_duration_seconds:
          type: number
          format: float
        avg_response_time_seconds:
          type: number
          format: float
        satisfaction_avg:
          type: number
          format: float
        chats_today:
          type: integer
        chats_this_week:
          type: integer
      required:
      - agent_id
      - total_chats
      - avg_duration_seconds
      - avg_response_time_seconds
      - satisfaction_avg
      - chats_today
      - chats_this_week
      description: Agent performance metrics including response times and satisfaction
    ChatStatus:
      type: string
      enum:
      - WAITING
      - ACTIVE
      - CLOSED
      - TRANSFERRED
    SenderType:
      type: string
      enum:
      - AGENT
      - VISITOR
      - BOT
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      description: A generic paginated response wrapper with items and pagination
        metadata
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: integer
          description: HTTP error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: string
          description: Additional error details
      description: An error response with code, message, and optional details
    PaginatedAgent:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/Agent'
    PaginatedChatSession:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/ChatSession'
    PaginatedChatMessage:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/ChatMessage'
    PaginatedAgentStatus:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        is_online:
          type: boolean
        active_sessions:
          type: integer
      required:
      - name
      - is_online
      - active_sessions
    AgentQueueItem:
      type: object
      required:
      - visitor_id
      - page_views
      - waiting_since
      properties:
        visitor_id:
          type: string
        page_views:
          type: integer
        waiting_since:
          type: string
          format: date-time
      description: A visitor waiting in the agent queue
    PaginatedAgentQueueItem:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/AgentQueueItem'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
