openapi: 3.1.0
info:
  title: Accounts
  version: v1.0.0
  description: Account/company management — companies, industry, size, hierarchy.
  x-api-version: CRM Accounts API v1.0.0
  x-crm-api-version: v1.0.0
  termsOfService: https://rerp.example.com/terms
  contact:
    name: RERP API Support
    url: https://docs.rerp.com/support
    email: api-support@rerp.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  x-api-docs:
    service: accounts
    openapi_version: 3.1.0
    brrtrouter_version: latest
servers:
- url: http://localhost:10352/api/v1/crm/accounts
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/crm/accounts
  description: Accounts API
tags:
- name: accounts
  description: Account/company CRUD
- name: accounts-contacts
  description: Account-contact associations
- name: accounts-hierarchy
  description: Account parent-child relationships and tree navigation
- name: accounts-leads
  description: Account-lead associations
- name: accounts-reporting
  description: Account-level analytics and summary reports
paths:
  /accounts:
    get:
      operationId: list_accounts
      summary: List accounts/companies
      tags:
      - accounts
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
      - name: filter_parent_id
        in: query
        schema:
          type: string
          format: uuid
      - name: filter_industry_id
        in: query
        schema:
          type: string
          format: uuid
      - name: filter_active
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
              examples:
                default:
                  items: []
                  total: 0
                  page: 1
                  per_page: 20
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all accounts
      x-operation-id: get_accounts_list
      x-controller: rerp_crm::accounts::controller::accounts
      x-handler-name: accounts
    post:
      operationId: create_account
      summary: Create a new account/company
      tags:
      - accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
            examples:
              default: &id002
                name: Acme Corp
                website: https://acme.com
                industry: Technology
                size: medium
                owner_id: 00000000-0000-0000-0000-000000000010
        description: Create a new account/organization in the CRM
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
              examples:
                default: &id001
                  id: 00000000-0000-0000-0000-000000000003
                  name: Acme Corp
                  website: https://acme.com
                  industry: Technology
                  size: medium
                  owner_id: 00000000-0000-0000-0000-000000000010
                  created_at: '2024-01-15T10:30:00Z'
                  updated_at: '2024-01-15T10:30:00Z'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new accounts
      x-operation-id: post_accounts_list
      x-controller: rerp_crm::accounts::controller::accounts
      x-handler-name: accounts
  /accounts/{id}:
    get:
      operationId: get_account
      summary: Get account by id
      tags:
      - accounts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
              examples:
                default: *id001
        '404':
          description: Not found
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      description: Get accounts by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::accounts::controller::accounts::id
      x-handler-name: accounts_id
    put:
      operationId: update_account
      summary: Update account fields
      tags:
      - accounts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
            examples:
              default: *id002
        description: Update an existing account by ID
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
              examples:
                default: *id001
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update accounts by ID
      x-operation-id: put_id_by_id
      x-controller: rerp_crm::accounts::controller::accounts::id
      x-handler-name: accounts_id
    delete:
      operationId: delete_account
      summary: Soft-delete account
      tags:
      - accounts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Account deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Delete accounts by ID
      x-operation-id: delete_id_by_id
      x-controller: rerp_crm::accounts::controller::accounts::id
      x-handler-name: accounts_id
  /accounts/{id}/tree:
    get:
      operationId: get_account_hierarchy
      summary: Get account's org tree (parent + children)
      tags:
      - accounts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Org tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
              examples:
                default:
                  items: []
                  total: 0
                  page: 1
                  per_page: 20
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get hierarchical tree structure
      x-operation-id: get_tree_by_id
      x-controller: rerp_crm::accounts::controller::accounts::id::tree
      x-handler-name: accounts_id_tree
  /accounts/{id}/contacts:
    get:
      operationId: get_account_contacts
      summary: Get contacts associated with an account
      tags:
      - accounts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: Related contacts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
              examples:
                default:
                  items: []
                  total: 0
                  page: 1
                  per_page: 20
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get accounts by ID
      x-operation-id: get_contacts_by_id
      x-controller: rerp_crm::accounts::controller::accounts::id::contacts
      x-handler-name: accounts_id_contacts
  /accounts/{id}/leads:
    get:
      operationId: get_account_leads
      summary: Get leads associated with an account
      tags:
      - accounts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: Related leads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
              examples:
                default:
                  items: []
                  total: 0
                  page: 1
                  per_page: 20
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get leads associated with a campaign
      x-operation-id: get_leads_by_id
      x-controller: rerp_crm::accounts::controller::accounts::id::leads
      x-handler-name: accounts_id_leads
  /accounts/reports/summary:
    get:
      operationId: get_accounts_report
      summary: Get account statistics by industry and size
      tags:
      - accounts
      responses:
        '200':
          description: Account report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
              examples:
                default:
                  items: []
                  total: 0
                  page: 1
                  per_page: 20
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all accounts
      x-operation-id: get_summary
      x-controller: rerp_crm::accounts::controller::accounts::reports::summary
      x-handler-name: accounts_reports_summary
components:
  schemas:
    Account:
      type: object
      required:
      - id
      - name
      - create_date
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        phone:
          type: string
          maxLength: 64
        website:
          type: string
          format: uri
          maxLength: 255
        industry_id:
          type: string
          format: uuid
        industry_name:
          type: string
          readOnly: true
        company_size:
          type: string
          enum:
          - STARTUP
          - SMB
          - MID_MARKET
          - ENTERPRISE
        employees:
          type: integer
        annual_revenue:
          type: number
          format: double
        description:
          type: string
        parent_id:
          type: string
          format: uuid
          description: Parent company
        child_ids:
          type: array
          items:
            type: string
            format: uuid
          readOnly: true
        street:
          type: string
          maxLength: 255
        street2:
          type: string
          maxLength: 255
        city:
          type: string
          maxLength: 128
        state_id:
          type: string
          format: uuid
        zip:
          type: string
          maxLength: 32
        country_id:
          type: string
          format: uuid
        country_name:
          type: string
          readOnly: true
        active:
          type: boolean
          default: true
        color:
          type: integer
          minimum: 1
          maximum: 16
        create_date:
          type: string
          format: date-time
          readOnly: true
        write_date:
          type: string
          format: date-time
          readOnly: true
        contact_count:
          type: integer
          readOnly: true
        active_lead_count:
          type: integer
          readOnly: true
        total_revenue:
          type: number
          format: double
          readOnly: true
      description: A company or organization that is a customer or prospect
    CreateAccountRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        phone:
          type: string
        website:
          type: string
          format: uri
        industry_id:
          type: string
          format: uuid
        company_size:
          type: string
          enum:
          - STARTUP
          - SMB
          - MID_MARKET
          - ENTERPRISE
        employees:
          type: integer
        annual_revenue:
          type: number
          format: double
        description:
          type: string
        parent_id:
          type: string
          format: uuid
        street:
          type: string
        street2:
          type: string
        city:
          type: string
        state_id:
          type: string
          format: uuid
        zip:
          type: string
        country_id:
          type: string
          format: uuid
      description: Request body for creating a new account/organization
    UpdateAccountRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        website:
          type: string
        industry_id:
          type: string
          format: uuid
        company_size:
          type: string
          enum:
          - STARTUP
          - SMB
          - MID_MARKET
          - ENTERPRISE
        employees:
          type: integer
        annual_revenue:
          type: number
        description:
          type: string
        parent_id:
          type: string
          format: uuid
        street:
          type: string
        street2:
          type: string
        city:
          type: string
        state_id:
          type: string
          format: uuid
        zip:
          type: string
        country_id:
          type: string
          format: uuid
        active:
          type: boolean
      required:
      - name
      - email
      - phone
      - website
      - industry_id
      - company_size
      - employees
      - annual_revenue
      - description
      - parent_id
      - street
      - street2
      - city
      - state_id
      - zip
      - country_id
      - active
      description: Request body for updating an existing account/organization
    AccountHierarchy:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/Account'
        parent:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        children:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
      required:
      - children
      description: Account tree with parent-child relationships for org structure
    AccountContactSummary:
      type: object
      properties:
        contact_id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        function:
          type: string
      required:
      - contact_id
      - name
      - email
      - phone
      - function
      description: Summary of contacts associated with an account
    AccountReport:
      type: object
      properties:
        by_industry:
          type: array
          items:
            type: object
            properties:
              industry:
                type: string
              count:
                type: integer
              active_leads:
                type: integer
        by_size:
          type: array
          items:
            type: object
            properties:
              size:
                type: string
              count:
                type: integer
        total_accounts:
          type: integer
        total_employees:
          type: integer
      required:
      - by_industry
      - by_size
      - total_accounts
      - total_employees
      description: Analytics report data for an account including metrics and KPIs
    Accountcontactsummarys:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/AccountContactSummary'
      description: Collection of account-contact summary records
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: integer
          description: HTTP error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: string
          description: Additional error details
      description: An error response with code, message, and optional details
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      description: A generic paginated response wrapper with items and pagination
        metadata
    PaginatedAccount:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/Account'
      description: Paginated list of Account records
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique identifier for the resource
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination (1-indexed)
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 'Maximum number of items per page (default: 20, max: 100)'
externalDocs:
  description: Accounts API Reference
  url: https://docs.rerp.com/crm/accounts/api-reference
