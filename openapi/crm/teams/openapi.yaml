openapi: 3.1.0
info:
  title: Teams
  version: v1.0.0
  description: Sales team management — teams, members, auto-assignment, unassigned
    queue.
  x-api-version: CRM Teams API v1.0.0
  x-crm-api-version: v1.0.0
  termsOfService: https://rerp.example.com/terms
  contact:
    name: RERP API Support
    url: https://docs.rerp.com/support
    email: api-support@rerp.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  x-api-docs:
    service: teams
    openapi_version: 3.1.0
    brrtrouter_version: latest
servers:
- url: http://localhost:10352/api/v1/crm/teams
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/crm/teams
  description: Teams API
tags:
- name: lead-assignment
  description: Automated lead assignment to teams/queues
- name: members
  description: Team member management
- name: team-members
  description: Team member management
- name: teams
  description: Team CRUD
paths:
  /teams:
    get:
      operationId: list_teams
      summary: List sales teams
      tags:
      - teams
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
      responses:
        '200':
          description: List of teams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTeam'
              examples:
                default:
                  items:
                  - &id001
                    id: 00000000-0000-0000-0000-000000000006
                    name: Sales Team Alpha
                    description: Enterprise sales team
                    members: []
                    created_at: '2024-01-15T10:30:00Z'
                    updated_at: '2024-01-15T10:30:00Z'
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all teams
      x-operation-id: get_teams_list
      x-controller: rerp_crm::teams::controller::teams
      x-handler-name: teams
    post:
      operationId: create_team
      summary: Create a new sales team
      tags:
      - teams
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
            examples:
              default: &id002
                name: Sales Team Alpha
                description: Enterprise sales team
      responses:
        '201':
          description: Team created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
              examples:
                default: *id001
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new teams
      x-operation-id: post_teams_list
      x-controller: rerp_crm::teams::controller::teams
      x-handler-name: teams
  /teams/{id}:
    get:
      operationId: get_team
      summary: Get team by id with member stats
      tags:
      - teams
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Team details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
              examples:
                default: *id001
        '404':
          description: Not found
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      description: Get teams by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::teams::controller::teams::id
      x-handler-name: teams_id
    put:
      operationId: update_team
      summary: Update team fields
      tags:
      - teams
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamRequest'
            examples:
              default: *id002
      responses:
        '200':
          description: Team updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
              examples:
                default: *id001
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update teams by ID
      x-operation-id: put_id_by_id
      x-controller: rerp_crm::teams::controller::teams::id
      x-handler-name: teams_id
    delete:
      operationId: delete_team
      summary: Delete team
      tags:
      - teams
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Team deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Delete teams by ID
      x-operation-id: delete_id_by_id
      x-controller: rerp_crm::teams::controller::teams::id
      x-handler-name: teams_id
  /teams/{id}/members:
    get:
      operationId: list_team_members
      summary: List team members with stats
      tags:
      - members
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: List of team members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMembers'
              examples:
                default:
                  team_id: 00000000-0000-0000-0000-000000000006
                  members:
                  - id: 00000000-0000-0000-0000-000000000010
                    name: Jane Smith
                  - id: 00000000-0000-0000-0000-000000000034
                    name: John Doe
                  total: 2
        '404':
          description: Team not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get team members
      x-operation-id: get_members_by_id
      x-controller: rerp_crm::teams::controller::teams::id::members
      x-handler-name: teams_id_members
    post:
      operationId: add_team_member
      summary: Add a member to a sales team
      tags:
      - members
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTeamMemberRequest'
            examples:
              default: *id002
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMember'
              examples:
                default:
                  id: 00000000-0000-0000-0000-000000000010
                  name: Jane Smith
                  email: jane@example.com
                  role: sales_rep
        '400':
          description: Invalid request
        '404':
          description: Team not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Get team members
      x-operation-id: post_members_by_id
      x-controller: rerp_crm::teams::controller::teams::id::members
      x-handler-name: teams_id_members
  /teams/{id}/members/{member_id}:
    delete:
      operationId: remove_team_member
      summary: Remove a member from a sales team
      tags:
      - members
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: member_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Member removed
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get team members
      x-operation-id: delete_member_id_by_id
      x-controller: rerp_crm::teams::controller::teams::id::members::member_id
      x-handler-name: teams_id_members_member_id
  /queues/unassigned:
    get:
      operationId: list_unassigned
      summary: List unassigned leads for auto-assignment
      tags:
      - teams
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: team_id
        in: query
        schema:
          type: string
          format: uuid
      - name: filter_stage
        in: query
        schema:
          type: string
          enum:
          - UNASSIGNED
          - AWAITING_ASSIGNMENT
      responses:
        '200':
          description: List of unassigned leads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUnassignedLeads'
              examples:
                default:
                  items:
                  - id: 00000000-0000-0000-0000-000000000001
                    name: John Doe
                    score: 45
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get unassigned leads in the queue
      x-operation-id: get_unassigned
      x-controller: rerp_crm::teams::controller::queues::unassigned
      x-handler-name: queues_unassigned
  /assign/run:
    post:
      operationId: run_assignment
      summary: Manually trigger lead assignment
      tags:
      - teams
      responses:
        '200':
          description: Assignment completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResult'
              examples:
                default:
                  lead_id: 00000000-0000-0000-0000-000000000001
                  assigned_to: 00000000-0000-0000-0000-000000000010
                  assigned_at: '2024-01-15T10:30:00Z'
                  reason: round_robin
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Run a workflow manually
      x-operation-id: post_run
      x-controller: rerp_crm::teams::controller::assign::run
      x-handler-name: assign_run
components:
  schemas:
    Team:
      type: object
      required:
      - id
      - name
      - assignment_enabled
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        description:
          type: string
        alias_name:
          type: string
          maxLength: 128
          description: Email alias for lead creation
        use_leads:
          type: boolean
          default: true
        use_opportunities:
          type: boolean
          default: true
        assignment_enabled:
          type: boolean
        assignment_auto_enabled:
          type: boolean
          default: false
        assignment_optout:
          type: boolean
        assignment_max:
          type: integer
          readOnly: true
          description: Monthly capacity (sum of members' max)
        assignment_domain:
          type: string
          maxLength: 64
          description: Domain filter for lead routing
        emoji:
          type: string
          maxLength: 16
        privacy_security:
          type: string
          enum:
          - MY_TEAM
          - MY_COMPANY
          - ALL
          description: Record visibility scope
        create_date:
          type: string
          format: date-time
          readOnly: true
        member_count:
          type: integer
          readOnly: true
        active_lead_count:
          type: integer
          readOnly: true
        total_revenue:
          type: number
          format: double
          readOnly: true
      description: A group of sales representatives organized by region or product
        line
    CreateTeamRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          maxLength: 128
        description:
          type: string
        use_leads:
          type: boolean
        use_opportunities:
          type: boolean
        assignment_enabled:
          type: boolean
        assignment_auto_enabled:
          type: boolean
        assignment_domain:
          type: string
        emoji:
          type: string
        privacy_security:
          type: string
          enum:
          - MY_TEAM
          - MY_COMPANY
          - ALL
    UpdateTeamRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        use_leads:
          type: boolean
        use_opportunities:
          type: boolean
        assignment_enabled:
          type: boolean
        assignment_auto_enabled:
          type: boolean
        assignment_optout:
          type: boolean
        assignment_domain:
          type: string
        emoji:
          type: string
        privacy_security:
          type: string
          enum:
          - MY_TEAM
          - MY_COMPANY
          - ALL
      required:
      - name
      - description
      - use_leads
      - use_opportunities
      - assignment_enabled
      - assignment_auto_enabled
      - assignment_optout
      - assignment_domain
      - emoji
      - privacy_security
    TeamMember:
      type: object
      required:
      - id
      - user_id
      - crm_team_id
      - assignment_enabled
      - assignment_max
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        crm_team_id:
          type: string
          format: uuid
        assignment_enabled:
          type: boolean
        assignment_optout:
          type: boolean
        assignment_domain:
          type: string
          maxLength: 64
        assignment_max:
          type: integer
          description: 30-day lead capacity
        lead_day_count:
          type: integer
          readOnly: true
        lead_month_count:
          type: integer
          readOnly: true
        quota_monthly:
          type: number
          format: double
        quota_quarterly:
          type: number
          format: double
        quota_yearly:
          type: number
          format: double
        color:
          type: integer
          minimum: 1
          maximum: 16
        user_name:
          type: string
          readOnly: true
      description: A team member with their role and details
    AddTeamMemberRequest:
      type: object
      required:
      - user_id
      properties:
        user_id:
          type: string
          format: uuid
        assignment_max:
          type: integer
        assignment_domain:
          type: string
        quota_monthly:
          type: number
          format: double
    AssignmentResult:
      type: object
      properties:
        assigned_count:
          type: integer
        failed_count:
          type: integer
        details:
          type: array
          items:
            type: object
            properties:
              lead_id:
                type: string
                format: uuid
              assigned_to:
                type: string
                format: uuid
              reason:
                type: string
      required:
      - assigned_count
      - failed_count
      - details
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      description: A generic paginated response wrapper with items and pagination
        metadata
    TeamMembers:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/TeamMember'
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: integer
          description: HTTP error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: string
          description: Additional error details
      description: An error response with code, message, and optional details
    PaginatedTeam:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/Team'
    UnassignedLead:
      type: object
      required:
      - lead_id
      - lead_name
      - created_at
      - email_from
      - source
      properties:
        lead_id:
          type: string
          format: uuid
        lead_name:
          type: string
        created_at:
          type: string
          format: date-time
        email_from:
          type: string
        source:
          type: string
    PaginatedUnassignedLeads:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/UnassignedLead'
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
externalDocs:
  description: Teams API Reference
  url: https://docs.rerp.com/crm/teams/api-reference
