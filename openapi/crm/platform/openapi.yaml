components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination (1-indexed)
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 'Maximum number of items per page (default: 20, max: 100)'
    Search:
      name: search
      in: query
      schema:
        type: string
      description: Search query string for filtering resources
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique identifier for the resource
  schemas:
    CustomField:
      type: object
      required:
      - id
      - entity
      - name
      - label
      - field_type
      - visible
      properties:
        id:
          type: string
          format: uuid
        entity:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 128
        label:
          type: string
          maxLength: 255
        field_type:
          $ref: '#/components/schemas/FieldType'
        options:
          type: object
          description: Type-specific options (e.g., select values)
        required:
          type: boolean
        visible:
          type: boolean
        searchable:
          type: boolean
        default_value:
          type: string
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
          readOnly: true
      description: A custom field definition for extending entity schemas
    CreateCustomFieldRequest:
      type: object
      required:
      - entity
      - name
      - label
      - field_type
      properties:
        entity:
          type: string
          enum:
          - crm.lead
          - crm.contact
          - crm.account
          - crm.stage
          - crm.team
          - crm.opportunity
        name:
          type: string
          maxLength: 128
        label:
          type: string
          maxLength: 255
        field_type:
          $ref: '#/components/schemas/FieldType'
        options:
          type: object
        required:
          type: boolean
        visible:
          type: boolean
          default: true
        searchable:
          type: boolean
          default: false
        default_value:
          type: string
      description: Request body for creating a custom field definition
    UpdateCustomFieldRequest:
      type: object
      properties:
        label:
          type: string
        field_type:
          $ref: '#/components/schemas/FieldType'
        options:
          type: object
        required:
          type: boolean
        visible:
          type: boolean
        searchable:
          type: boolean
        default_value:
          type: string
      required:
      - label
      - required
      - visible
      - searchable
      - default_value
      description: Request body for updating a custom field definition
    Webhook:
      type: object
      required:
      - id
      - name
      - url
      - events
      - is_active
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        url:
          type: string
          maxLength: 512
        events:
          type: array
          items:
            type: string
          description: Event types to listen for
        secret:
          type: string
        is_active:
          type: boolean
        headers:
          type: object
          description: Custom HTTP headers (JSON)
        retry_count:
          type: integer
          default: 3
        last_triggered:
          type: string
          format: date-time
          readOnly: true
        last_status:
          $ref: '#/components/schemas/WebhookDeliveryStatus'
        created_at:
          type: string
          format: date-time
          readOnly: true
      description: A webhook endpoint for receiving event notifications
    CreateWebhookRequest:
      type: object
      required:
      - name
      - url
      - events
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        secret:
          type: string
        headers:
          type: object
        retry_count:
          type: integer
      description: Request body for creating a webhook endpoint
    UpdateWebhookRequest:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        events:
          type: array
          items:
            type: string
        secret:
          type: string
        is_active:
          type: boolean
        headers:
          type: object
        retry_count:
          type: integer
      required:
      - name
      - url
      - events
      - secret
      - is_active
      - retry_count
      description: Request body for updating a webhook endpoint
    WebhookDeliveryLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        webhook_id:
          type: string
          format: uuid
        event:
          type: string
        request_body:
          type: object
        response_status:
          type: integer
        response_body:
          type: string
        delivered_at:
          type: string
          format: date-time
        retry_count:
          type: integer
      required:
      - webhook_id
      - event
      - response_status
      - response_body
      - delivered_at
      - retry_count
      description: A log entry for webhook delivery attempts
    AuditLogEntry:
      type: object
      required:
      - id
      - entity
      - entity_id
      - action
      - user_id
      - created_at
      properties:
        id:
          type: string
          format: uuid
        entity:
          type: string
          maxLength: 64
        entity_id:
          type: string
        action:
          $ref: '#/components/schemas/AuditAction'
        user_id:
          type: string
          format: uuid
        changes:
          type: object
          description: Field changes before/after
        ip_address:
          type: string
        user_agent:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      description: An audit log entry recording a system action
    ApiKey:
      type: object
      required:
      - id
      - name
      - is_active
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        key_hash:
          type: string
          readOnly: true
        scopes:
          type: object
          description: Allowed scopes per entity
        rate_limit:
          type: integer
        ip_whitelist:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        last_used:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
      description: An API key used for authentication and authorization
    CreateApiKeyRequest:
      type: object
      required:
      - name
      - scopes
      properties:
        name:
          type: string
          maxLength: 128
        scopes:
          type: object
          description: Permissions object
        rate_limit:
          type: integer
        ip_whitelist:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
      description: Request body for creating an API key
    Integration:
      type: object
      required:
      - id
      - name
      - type
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        type:
          $ref: '#/components/schemas/IntegrationType'
        config:
          type: object
          description: Configuration including credentials
        is_active:
          type: boolean
        sync_direction:
          $ref: '#/components/schemas/SyncDirection'
        last_sync:
          type: string
          format: date-time
        sync_status:
          $ref: '#/components/schemas/SyncStatus'
        created_at:
          type: string
          format: date-time
          readOnly: true
      description: A third-party integration configuration
    CreateIntegrationRequest:
      type: object
      required:
      - name
      - type
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/IntegrationType'
        config:
          type: object
        sync_direction:
          $ref: '#/components/schemas/SyncDirection'
      description: Request body for creating a third-party integration
    FieldType:
      type: string
      enum:
      - STRING
      - INTEGER
      - FLOAT
      - BOOLEAN
      - DATE
      - DATETIME
      - EMAIL
      - PHONE
      - URL
      - TEXT
      - HTML
      - SELECT
      - MANY2ONE
      - MANY2MANY
      description: Enum of custom field types (text, number, date, boolean, select,
        email, phone)
    AuditAction:
      type: string
      enum:
      - CREATE
      - UPDATE
      - DELETE
      - READ
      - EXPORT
      - IMPORT
      description: Enum of audit action types (create, update, delete, login, logout)
    WebhookEvent:
      type: string
      enum:
      - lead.create
      - lead.update
      - lead.delete
      - opportunity.won
      - opportunity.lost
      - contact.create
      - subscription.renewal_due
      description: Enum of webhook event types (lead.created, contact.updated, etc.)
    WebhookDeliveryStatus:
      type: string
      enum:
      - PENDING
      - SUCCESS
      - FAILED
      - RETRYING
      description: Enum of webhook delivery statuses (pending, sent, failed, retrying)
    IntegrationType:
      type: string
      enum:
      - ERP
      - ACCOUNTING
      - MARKETING
      - SUPPORT
      - CUSTOM
      description: Enum of integration types (email, calendar, crm, accounting)
    SyncDirection:
      type: string
      enum:
      - CRM_TO_EXTERNAL
      - EXTERNAL_TO_CRM
      - BIDIRECTIONAL
      description: Enum of sync directions (inbound, outbound, bidirectional)
    SyncStatus:
      type: string
      enum:
      - IDLE
      - SYNCING
      - ERROR
      description: Enum of sync statuses (syncing, completed, failed, paused)
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      description: A generic paginated response wrapper with items and pagination
        metadata
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: integer
          description: HTTP error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: string
          description: Additional error details
      description: An error response with code, message, and optional details
    PaginatedWebhook:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/Webhook'
      description: Paginated list of Webhook records
    PaginatedApiKey:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/ApiKey'
      description: Paginated list of ApiKey records
    PaginatedAuditLogEntry:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/AuditLogEntry'
      description: Paginated list of AuditLogEntry records
    PaginatedCustomField:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/CustomField'
      description: Paginated list of CustomField records
    PaginatedIntegration:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/Integration'
      description: Paginated list of Integration records
    PaginatedWebhookDeliveryLog:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/WebhookDeliveryLog'
      description: Paginated list of WebhookDeliveryLog records
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
