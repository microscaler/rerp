openapi: 3.1.0
info:
  title: CRM Platform & Extensibility
  version: v1.0.0
  description: Custom fields, webhooks, audit logging, API keys, and integrations.
  x-api-version: CRM Platform API v1.0.0
  x-crm-api-version: v1.0.0
  termsOfService: https://rerp.example.com/terms
  contact:
    name: RERP API Support
    url: https://docs.rerp.com/support
    email: api-support@rerp.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  x-api-docs:
    service: platform
    openapi_version: 3.1.0
    brrtrouter_version: latest
servers:
- url: http://localhost:10352/api/v1/crm/platform
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/crm/platform
  description: Platform API
tags:
- name: api-keys
  description: API key management and authentication
- name: audit-log
  description: Immutable audit trail of all operations
- name: auth
  description: Authentication validation
- name: custom-fields
  description: Custom field definitions per entity
- name: integrations
  description: Third-party integration configuration
- name: webhooks
  description: Webhook delivery for entity events
paths:
  /custom-fields:
    get:
      operationId: list_custom_fields
      summary: List all custom fields
      tags:
      - custom-fields
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_entity
        in: query
        schema:
          type: string
      responses:
        '200':
          description: List of custom fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCustomField'
              examples:
                default:
                  items:
                  - &id001
                    id: 00000000-0000-0000-0000-000000000021
                    entity: lead
                    name: priority
                    type: string
                    required: false
                    created_at: '2024-01-15T10:30:00Z'
                    updated_at: '2024-01-15T10:30:00Z'
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all custom-fields
      x-operation-id: get_custom-fields_list
      x-controller: rerp_crm::platform::controller::custom-fields
      x-handler-name: custom-fields
    post:
      operationId: create_custom_field
      summary: Create a custom field on any entity
      tags:
      - custom-fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomFieldRequest'
            examples:
              default: &id002
                entity: lead
                name: priority
                type: string
                required: false
        description: Create a new custom field definition
      responses:
        '201':
          description: Custom field created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomField'
              examples:
                default: *id001
        '400':
          description: Invalid request
        '403':
          description: Insufficient permissions
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new custom-fields
      x-operation-id: post_custom-fields_list
      x-controller: rerp_crm::platform::controller::custom-fields
      x-handler-name: custom-fields
  /custom-fields/{id}:
    get:
      operationId: get_custom_field
      summary: Get custom field by id
      tags:
      - custom-fields
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Custom field details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomField'
              examples:
                default: *id001
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get custom-fields by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::platform::controller::custom-fields::id
      x-handler-name: custom-fields_id
    put:
      operationId: update_custom_field
      summary: Update custom field
      tags:
      - custom-fields
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomFieldRequest'
            examples:
              default: *id002
        description: Update a custom field definition
      responses:
        '200':
          description: Custom field updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomField'
              examples:
                default: *id001
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update custom-fields by ID
      x-operation-id: put_id_by_id
      x-controller: rerp_crm::platform::controller::custom-fields::id
      x-handler-name: custom-fields_id
    delete:
      operationId: delete_custom_field
      summary: Delete custom field
      tags:
      - custom-fields
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Custom field deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Delete custom-fields by ID
      x-operation-id: delete_id_by_id
      x-controller: rerp_crm::platform::controller::custom-fields::id
      x-handler-name: custom-fields_id
  /entities/{entity}/custom-fields:
    get:
      operationId: list_entity_custom_fields
      summary: List custom fields for a specific entity
      tags:
      - custom-fields
      parameters:
      - name: entity
        in: path
        required: true
        schema:
          type: string
          enum:
          - crm.lead
          - crm.contact
          - crm.account
          - crm.stage
          - crm.team
          - crm.opportunity
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Custom fields for entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCustomField'
              examples:
                default:
                  items:
                  - *id001
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '404':
          description: Entity not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get entities by ID
      x-operation-id: get_custom-fields_by_id
      x-controller: rerp_crm::platform::controller::entities::entity::custom-fields
      x-handler-name: entities_entity_custom-fields
  /webhooks:
    get:
      operationId: list_webhooks
      summary: List all webhooks
      tags:
      - webhooks
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_active
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: List of webhooks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWebhook'
              examples:
                default:
                  items:
                  - &id003
                    id: 00000000-0000-0000-0000-000000000022
                    url: https://example.com/webhook
                    events:
                    - lead.created
                    - lead.updated
                    enabled: true
                    created_at: '2024-01-15T10:30:00Z'
                    updated_at: '2024-01-15T10:30:00Z'
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all webhooks
      x-operation-id: get_webhooks_list
      x-controller: rerp_crm::platform::controller::webhooks
      x-handler-name: webhooks
    post:
      operationId: create_webhook
      summary: Create a new webhook
      tags:
      - webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
            examples:
              default: &id004
                url: https://example.com/webhook
                events:
                - lead.created
                - lead.updated
                enabled: true
        description: Create a new webhook endpoint
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
              examples:
                default: *id003
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new webhooks
      x-operation-id: post_webhooks_list
      x-controller: rerp_crm::platform::controller::webhooks
      x-handler-name: webhooks
  /webhooks/{id}:
    get:
      operationId: get_webhook
      summary: Get webhook by id
      tags:
      - webhooks
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Webhook details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
              examples:
                default: *id003
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get webhooks by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::platform::controller::webhooks::id
      x-handler-name: webhooks_id
    put:
      operationId: update_webhook
      summary: Update webhook
      tags:
      - webhooks
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookRequest'
            examples:
              default: *id004
        description: Update an existing webhook
      responses:
        '200':
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
              examples:
                default: *id003
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update webhooks by ID
      x-operation-id: put_id_by_id
      x-controller: rerp_crm::platform::controller::webhooks::id
      x-handler-name: webhooks_id
    delete:
      operationId: delete_webhook
      summary: Delete webhook
      tags:
      - webhooks
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Webhook deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Delete webhooks by ID
      x-operation-id: delete_id_by_id
      x-controller: rerp_crm::platform::controller::webhooks::id
      x-handler-name: webhooks_id
  /webhooks/{id}/test:
    post:
      operationId: test_webhook
      summary: Send a test webhook payload
      tags:
      - webhooks
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Test webhook sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent:
                    type: boolean
                  response_code:
                    type: integer
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Test a rule configuration
      x-operation-id: post_webhooks_test
      x-controller: rerp_crm::platform::controller::webhooks::id::test
      x-handler-name: webhooks_id_test
  /webhooks/{id}/logs:
    get:
      operationId: list_webhook_logs
      summary: Get webhook delivery logs
      tags:
      - webhooks
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Delivery logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWebhookDeliveryLog'
              examples:
                default:
                  items:
                  - id: 00000000-0000-0000-0000-000000000039
                    event: lead.created
                    status: success
                    response_code: 200
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get webhook delivery logs
      x-operation-id: get_logs_by_id
      x-controller: rerp_crm::platform::controller::webhooks::id::logs
      x-handler-name: webhooks_id_logs
  /audit-log:
    get:
      operationId: list_audit_log
      summary: Get audit log entries
      tags:
      - audit-log
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_entity
        in: query
        schema:
          type: string
      - name: filter_action
        in: query
        schema:
          type: string
          enum:
          - CREATE
          - UPDATE
          - DELETE
          - READ
          - EXPORT
          - IMPORT
      - name: filter_user_id
        in: query
        schema:
          type: string
          format: uuid
      - name: filter_date_from
        in: query
        schema:
          type: string
          format: date-time
      - name: filter_date_to
        in: query
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogEntry'
              examples:
                default:
                  items:
                  - id: 00000000-0000-0000-0000-000000000038
                    entity: lead
                    entity_id: 00000000-0000-0000-0000-000000000001
                    action: updated
                    timestamp: '2024-01-15T10:30:00Z'
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all audit-log
      x-operation-id: get_audit-log_list
      x-controller: rerp_crm::platform::controller::audit-log
      x-handler-name: audit-log
  /audit-log/{entity}/{entity_id}:
    get:
      operationId: get_entity_audit_log
      summary: Get audit log for a specific entity record
      tags:
      - audit-log
      parameters:
      - name: entity
        in: path
        required: true
        schema:
          type: string
      - name: entity_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Entity audit log
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLogEntry'
                  total:
                    type: integer
        '404':
          description: Entity not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get audit-log by ID
      x-operation-id: get_entity_id_by_id
      x-controller: rerp_crm::platform::controller::audit-log::entity::entity_id
      x-handler-name: audit-log_entity_entity_id
  /api-keys:
    get:
      operationId: list_api_keys
      summary: List all API keys
      tags:
      - api-keys
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApiKey'
              examples:
                default:
                  items:
                  - id: 00000000-0000-0000-0000-000000000023
                    name: Production API
                    key: sk_test_00000000000000000000
                    enabled: true
                    created_at: '2024-01-15T10:30:00Z'
                    updated_at: '2024-01-15T10:30:00Z'
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all api-keys
      x-operation-id: get_api-keys_list
      x-controller: rerp_crm::platform::controller::api-keys
      x-handler-name: api-keys
    post:
      operationId: create_api_key
      summary: Generate a new API key
      tags:
      - api-keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
            examples:
              default:
                name: Production API
                enabled: true
        description: Create a new API key
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  key:
                    type: string
                    description: This key will only be shown once — save it now.
                  key_hash:
                    type: string
              examples:
                default:
                  id: 00000000-0000-0000-0000-000000000004
                  name: Discovery
                  order: 1
                  pipeline_id: 00000000-0000-0000-0000-000000000005
                  created_at: '2024-01-15T10:30:00Z'
                  updated_at: '2024-01-15T10:30:00Z'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new api-keys
      x-operation-id: post_api-keys_list
      x-controller: rerp_crm::platform::controller::api-keys
      x-handler-name: api-keys
  /auth/validate:
    post:
      operationId: validate_api_key
      summary: Validate an API key and return permissions
      tags:
      - api-keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - key
              properties:
                key:
                  type: string
                  description: API key (plain text, not hashed)
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  scope:
                    type: object
                  rate_limit_remaining:
                    type: integer
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Validate an API key or token
      x-operation-id: post_validate
      x-controller: rerp_crm::platform::controller::auth::validate
      x-handler-name: auth_validate
  /integrations:
    get:
      operationId: list_integrations
      summary: List all configured integrations
      tags:
      - integrations
      responses:
        '200':
          description: List of integrations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedIntegration'
              examples:
                default:
                  items:
                  - &id005
                    id: 00000000-0000-0000-0000-000000000024
                    name: Slack Integration
                    type: messaging
                    status: connected
                    created_at: '2024-01-15T10:30:00Z'
                    updated_at: '2024-01-15T10:30:00Z'
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all integrations
      x-operation-id: get_integrations_list
      x-controller: rerp_crm::platform::controller::integrations
      x-handler-name: integrations
    post:
      operationId: create_integration
      summary: Configure a new integration
      tags:
      - integrations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIntegrationRequest'
            examples:
              default:
                name: Slack Integration
                type: messaging
        description: Create a new integration
      responses:
        '201':
          description: Integration configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Integration'
              examples:
                default: *id005
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new integrations
      x-operation-id: post_integrations_list
      x-controller: rerp_crm::platform::controller::integrations
      x-handler-name: integrations
  /integrations/{id}/sync:
    post:
      operationId: trigger_integration_sync
      summary: Manually trigger a data sync for an integration
      tags:
      - integrations
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Sync triggered
          content:
            application/json:
              schema:
                type: object
                properties:
