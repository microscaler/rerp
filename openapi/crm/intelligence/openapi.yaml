openapi: 3.1.0
info:
  title: CRM Intelligence
  version: v1.0.0
  description: Predictive analytics, lead scoring, enrichment, and data verification.
  x-api-version: CRM Intelligence API v1.0.0
  x-crm-api-version: v1.0.0
  termsOfService: https://rerp.example.com/terms
  contact:
    name: RERP API Support
    url: https://docs.rerp.com/support
    email: api-support@rerp.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  x-api-docs:
    service: intelligence
    openapi_version: 3.1.0
    brrtrouter_version: latest
servers:
- url: http://localhost:10352/api/v1/crm/intelligence
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/crm/intelligence
  description: Intelligence API
tags:
- name: enrichment
  description: Data enrichment from external sources
- name: lead-enrichment
  description: Lead data enrichment from external sources
- name: lead-mining
  description: Prospect discovery and ICP matching
- name: lead-queues
  description: Lead hot/warm/cold queue management
- name: lead-scoring
  description: Automated lead scoring and ranking
- name: lead-scoring-frequencies
  description: Scoring frequency configuration
- name: lead-scoring-thresholds
  description: Score threshold definitions
- name: lead-verification
  description: Email and phone verification services
- name: mining
  description: Lead discovery and mining
- name: scoring
  description: Lead scoring and probability
- name: verification
  description: Email and phone verification
paths:
  /leads/score-batch:
    post:
      operationId: score_all_leads
      summary: Compute scores for all leads (triggers Bayesian PLS rebuild)
      tags:
      - scoring
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                team_id:
                  type: string
                  format: uuid
                  description: Scope to specific team (optional)
        description: Batch score multiple leads
      responses:
        '200':
          description: Scoring batch completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  scores_computed:
                    type: integer
                  time_ms:
                    type: integer
              examples:
                default: &id001
                  scores_computed: 5
                  time_ms: 120
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
              examples:
                default: *id001
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Score a batch of leads asynchronously
      x-operation-id: post_score-batch
      x-controller: rerp_crm::intelligence::controller::leads::score-batch
      x-handler-name: leads_score-batch
  /leads/score-bulk:
    post:
      operationId: score_leads_bulk
      summary: Score a batch of specific leads
      tags:
      - scoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - lead_ids
              properties:
                lead_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
        description: Calculate lead scores for multiple leads in bulk
      responses:
        '200':
          description: Scores computed
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        lead_id:
                          type: string
                          format: uuid
                        probability:
                          type: number
                          format: float
                        top_factors:
                          type: array
                          items:
                            type: object
                            properties:
                              field:
                                type: string
                              value:
                                type: string
                              impact:
                                type: number
                                format: float
              examples:
                default: &id002
                  scores_computed: 10
                  time_ms: 250
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
              examples:
                default: *id002
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Score a batch of leads synchronously
      x-operation-id: post_score-bulk
      x-controller: rerp_crm::intelligence::controller::leads::score-bulk
      x-handler-name: leads_score-bulk
  /leads/{id}/score:
    get:
      operationId: get_lead_score
      summary: Get score for a single lead
      tags:
      - scoring
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Lead score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadScore'
              examples:
                default:
                  lead_id: 00000000-0000-0000-0000-000000000001
                  score: 85
                  level: hot
                  updated_at: '2024-01-15T10:30:00Z'
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get leads by ID
      x-operation-id: get_score_by_id
      x-controller: rerp_crm::intelligence::controller::leads::id::score
      x-handler-name: leads_id_score
  /leads/{id}/score/explain:
    get:
      operationId: explain_lead_score
      summary: Get score explanation with top contributing factors
      tags:
      - scoring
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Score explanation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoreExplanation'
              examples:
                default:
                  lead_id: 00000000-0000-0000-0000-000000000001
                  score: 85
                  factors:
                  - name: email_verified
                    weight: 10
                    applied: 10
                  - name: company_size
                    weight: 20
                    applied: 20
                  - name: industry_match
                    weight: 30
                    applied: 25
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Explain scoring factors for a lead
      x-operation-id: get_explain_by_id
      x-controller: rerp_crm::intelligence::controller::leads::id::score::explain
      x-handler-name: leads_id_score_explain
  /scoring/frequencies:
    get:
      operationId: list_scoring_frequencies
      summary: View scoring frequency data
      tags:
      - scoring
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_variable
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Scoring frequencies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedScoringFrequency'
              examples:
                default:
                  items:
                  - id: 00000000-0000-0000-0000-000000000011
                    name: Daily
                    interval: daily
                    enabled: true
                    created_at: '2024-01-15T10:30:00Z'
                    updated_at: '2024-01-15T10:30:00Z'
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all scoring
      x-operation-id: get_frequencies
      x-controller: rerp_crm::intelligence::controller::scoring::frequencies
      x-handler-name: scoring_frequencies
  /scoring/frequencies/rebuild:
    post:
      operationId: rebuild_scoring_frequencies
      summary: Rebuild scoring frequency tables from historical data
      tags:
      - scoring
      responses:
        '200':
          description: Frequencies rebuilt
          content:
            application/json:
              schema:
                type: object
                properties:
                  records_processed:
                    type: integer
                  frequencies_updated:
                    type: integer
              examples:
                default:
                  success: true
                  frequencies_rebuilt: 3
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Rebuild scoring frequencies from historical data
      x-operation-id: post_rebuild
      x-controller: rerp_crm::intelligence::controller::scoring::frequencies::rebuild
      x-handler-name: scoring_frequencies_rebuild
  /scoring/thresholds:
    get:
      operationId: get_scoring_thresholds
      summary: Get hot/warm/cold thresholds
      tags:
      - scoring
      responses:
        '200':
          description: Scoring thresholds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoringThresholds'
              examples:
                default:
                  hot_threshold: 80
                  warm_threshold: 50
                  cold_threshold: 0
                  updated_at: '2024-01-15T10:30:00Z'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all scoring
      x-operation-id: get_thresholds
      x-controller: rerp_crm::intelligence::controller::scoring::thresholds
      x-handler-name: scoring_thresholds
    put:
      operationId: update_scoring_thresholds
      summary: Update hot/warm/cold thresholds
      tags:
      - scoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateThresholdsRequest'
        description: Update lead scoring thresholds
      responses:
        '200':
          description: Thresholds updated
          content:
            application/json:
              schema: {}
              examples:
                default: {}
        '400':
          description: Invalid request
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Scoring threshold not found
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update scoring by ID
      x-operation-id: put_thresholds
      x-controller: rerp_crm::intelligence::controller::scoring::thresholds
      x-handler-name: scoring_thresholds
  /leads/hot:
    get:
      operationId: list_hot_leads
      summary: List all hot leads (score >= 75)
      tags:
      - scoring
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Hot leads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeadScoreSummary'
              examples:
                default:
                  items:
                  - &id003
                    total_leads: 150
                    hot: 45
                    warm: 65
                    cold: 40
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all leads
      x-operation-id: get_hot
      x-controller: rerp_crm::intelligence::controller::leads::hot
      x-handler-name: leads_hot
  /leads/warm:
    get:
      operationId: list_warm_leads
      summary: List all warm leads (score 40-74)
      tags:
      - scoring
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Warm leads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeadScoreSummary'
              examples:
                default:
                  items:
                  - *id003
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all leads
      x-operation-id: get_warm
      x-controller: rerp_crm::intelligence::controller::leads::warm
      x-handler-name: leads_warm
  /leads/cold:
    get:
      operationId: list_cold_leads
      summary: List all cold leads (score < 40)
      tags:
      - scoring
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Cold leads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeadScoreSummary'
              examples:
                default:
                  items:
                  - *id003
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all leads
      x-operation-id: get_cold
      x-controller: rerp_crm::intelligence::controller::leads::cold
      x-handler-name: leads_cold
  /leads/ranked:
    get:
      operationId: list_ranked_leads
      summary: List all leads sorted by score descending
      tags:
      - scoring
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Leads ranked by score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeadScoreRanked'
              examples:
                default:
                  items:
                  - lead_id: 00000000-0000-0000-0000-000000000001
                    name: John Doe
                    score: 92
                    rank: 1
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all leads
      x-operation-id: get_ranked
      x-controller: rerp_crm::intelligence::controller::leads::ranked
      x-handler-name: leads_ranked
  /enrichment/lookup:
    post:
      operationId: lookup_enrichment
      summary: Enrich a lead by email address
      tags:
      - enrichment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrichmentLookupRequest'
        description: Enrich lead data from external sources using email lookup
      responses:
        '200':
          description: Enrichment result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrichmentResponse'
              examples:
                default: &id004
                  lead_id: 00000000-0000-0000-0000-000000000001
                  company: Acme Corp
                  industry: Technology
                  employees: 500
                  found: true
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
              examples:
                default:
                  company:
                    name: Example Inc
                    domain: example.com
                    industry: Technology
                  person:
                    name: John Doe
                    title: CTO
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Enrich lead data from email address
      x-operation-id: post_lookup
      x-controller: rerp_crm::intelligence::controller::enrichment::lookup
      x-handler-name: enrichment_lookup
  /enrichment/website:
    post:
      operationId: lookup_by_website
      summary: Enrich by company website
      tags:
      - enrichment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebsiteEnrichmentRequest'
        description: Enrich lead data from external sources using website lookup
      responses:
        '200':
          description: Enrichment result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrichmentResponse'
              examples:
                default: *id004
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
              examples:
                default:
                  company:
                    name: Target Corp
                    domain: target.com
                    industry: Retail
                  confidence: 0.85
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Enrich lead data from company website
      x-operation-id: post_website
      x-controller: rerp_crm::intelligence::controller::enrichment::website
      x-handler-name: enrichment_website
  /enrichment/batch:
    post:
      operationId: batch_enrich
      summary: Enrich multiple records at once
      tags:
      - enrichment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchEnrichmentRequest'
        description: Enrich multiple leads from external sources in batch
      responses:
        '200':
          description: Batch enrichment results
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed:
                    type: integer
                  successful:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/EnrichmentResponse'
              examples:
                default: &id005
                  enriched: 10
                  failed: 0
                  results: []
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
              examples:
                default: *id005
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new enrichment
      x-operation-id: post_batch
      x-controller: rerp_crm::intelligence::controller::enrichment::batch
      x-handler-name: enrichment_batch
  /enrichment/auto-fill:
    post:
      operationId: auto_fill
      summary: Auto-fill from partial email data
      tags:
      - enrichment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              properties:
                email:
                  type: string
                lead_id:
                  type: string
                  format: uuid
        description: Auto-fill lead data from external sources based on email or domain
      responses:
        '200':
          description: Auto-fill changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrichmentResponse'
              examples:
                default: *id004
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
              examples:
                default:
                  company:
                    name: Example Inc
                    domain: example.com
                  person:
                    name: John Doe
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Auto-fill lead data from email domain
      x-operation-id: post_auto-fill
      x-controller: rerp_crm::intelligence::controller::enrichment::auto-fill
      x-handler-name: enrichment_auto-fill
  /enrichment/{id}/result:
    get:
      operationId: get_enrichment_result
      summary: Get enrichment result by request ID
      tags:
      - enrichment
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Enrichment result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrichmentResult'
              examples:
                default:
                  id: 00000000-0000-0000-0000-000000000012
                  lead_id: 00000000-0000-0000-0000-000000000001
                  company: Acme Corp
                  industry: Technology
                  employees: 500
                  founded: 2010
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get enrichment by ID
      x-operation-id: get_result_by_id
      x-controller: rerp_crm::intelligence::controller::enrichment::id::result
      x-handler-name: enrichment_id_result
  /verify/email:
    post:
      operationId: verify_email
      summary: Verify a single email address
      tags:
      - verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              properties:
                email:
                  type: string
                  format: email
        description: Verify an email address
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationResult'
              examples:
                default:
                  email: john@example.com
                  valid: true
                  disposable: false
                  role_account: false
                  mx_records: true
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
              examples:
                default:
                  email: test@example.com
                  valid: true
                  disposable: false
                  role_based: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Verify email address validity
      x-operation-id: post_email
      x-controller: rerp_crm::intelligence::controller::verify::email
      x-handler-name: verify_email
  /verify/batch:
    post:
      operationId: verify_batch
      summary: Verify a list of emails
      tags:
      - verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - emails
              properties:
                emails:
                  type: array
                  items:
                    type: string
                    format: email
        description: Verify multiple email addresses in batch
      responses:
        '200':
          description: Batch verification results
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  valid:
                    type: integer
                  invalid:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/EmailVerificationResult'
              examples:
                default: &id006
                  verified: 10
                  valid: 8
                  invalid: 2
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
              examples:
                default: *id006
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Verify email addresses in batch
      x-operation-id: post_batch
      x-controller: rerp_crm::intelligence::controller::verify::batch
      x-handler-name: verify_batch
  /verify/phone:
    post:
      operationId: verify_phone
      summary: Verify a phone number
      tags:
      - verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - phone
              properties:
                phone:
                  type: string
        description: Verify a phone number
      responses:
        '200':
          description: Phone verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneVerificationResult'
              examples:
                default:
                  phone: +1-555-0123
                  valid: true
                  line_type: mobile
                  carrier: Verizon
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
              examples:
                default:
                  phone: +1-555-0123
                  valid: true
                  carrier: Verizon
                  phone_type: mobile
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Verify phone number validity
      x-operation-id: post_phone
      x-controller: rerp_crm::intelligence::controller::verify::phone
      x-handler-name: verify_phone
  /mining/search:
    post:
      operationId: search_leads
      summary: Search for leads matching ICP criteria
      tags:
      - mining
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadMiningRequest'
            examples:
              default:
                name: John Doe
                email: john@example.com
                phone: +1-555-0123
                company: Acme Corp
                source: website
        description: Search for ICP-matched leads
      responses:
        '200':
          description: Mining results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/DiscoveredLead'
                  total:
                    type: integer
              examples:
                default: &id007
                  total_matches: 150
                  leads:
                  - name: John Doe
                    email: john@target.com
                    company: Target Corp
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
              examples:
                default: *id007
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new mining
      x-operation-id: post_search
      x-controller: rerp_crm::intelligence::controller::mining::search
      x-handler-name: mining_search
  /mining/icp-match:
    post:
      operationId: find_icp_matches
      summary: Find leads matching Ideal Customer Profile
      tags:
      - mining
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ICPMatchRequest'
        description: Find leads matching ideal customer profile
      responses:
        '200':
          description: ICP match results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/DiscoveredLead'
                  total:
                    type: integer
              examples:
                default: &id008
                  total_matches: 50
                  leads:
                  - name: Jane Smith
                    email: jane@ideal.com
                    company: Ideal Corp
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
              examples:
                default: *id008
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Find leads matching ideal customer profile
      x-operation-id: post_icp-match
      x-controller: rerp_crm::intelligence::controller::mining::icp-match
      x-handler-name: mining_icp-match
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination (1-indexed)
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 'Maximum number of items per page (default: 20, max: 100)'
    Search:
      name: search
      in: query
      schema:
        type: string
      description: Search query string for filtering resources
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique identifier for the resource
  schemas:
    LeadScore:
      type: object
      required:
      - lead_id
      - probability
      properties:
        id:
          type: string
          format: uuid
        lead_id:
          type: string
          format: uuid
        probability:
          type: number
          format: float
          minimum: 0
          maximum: 100
        automated_probability:
          type: number
          format: float
          minimum: 0
          maximum: 100
        is_automated_probability:
          type: boolean
        top_factors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              value:
                type: string
              impact:
                type: number
                format: float
        computation_date:
          type: string
          format: date-time
          readOnly: true
        total_records:
          type: integer
          readOnly: true
      description: A lead score with its calculated value and level
    ScoreExplanation:
      type: object
      properties:
        lead_id:
          type: string
          format: uuid
        probability:
          type: number
          format: float
        bucket:
          $ref: '#/components/schemas/ScoreBucket'
        contributing_factors:
          type: array
          items:
            type: object
            properties:
              variable:
                type: string
              value:
                type: string
              won_rate:
                type: number
                format: float
              impact:
                type: number
                format: float
                description: Positive pushes up, negative pushes down
        total_records:
          type: integer
      required:
      - lead_id
      - probability
      - contributing_factors
      - total_records
      description: A detailed explanation of how a lead score was calculated
    ScoringFrequency:
      type: object
      required:
      - variable
      - value
      - won_count
      - lost_count
      properties:
        id:
          type: string
          format: uuid
        variable:
          type: string
          maxLength: 128
        value:
          type: string
          maxLength: 255
        won_count:
          type: integer
        lost_count:
          type: integer
        team_id:
          type: string
          format: uuid
        total:
          type: integer
          readOnly: true
      description: Configuration for how often lead scores should be recalculated
    ScoringThresholds:
      type: object
      required:
      - hot
      - warm
      - cold
      properties:
        hot:
          type: object
          properties:
            min:
              type: integer
            label:
              type: string
            color:
              type: string
        warm:
          type: object
          properties:
            min:
              type: integer
            max:
              type: integer
            label:
              type: string
            color:
              type: string
        cold:
          type: object
          properties:
            max:
              type: integer
            label:
              type: string
            color:
              type: string
      description: Score thresholds defining hot/warm/cold levels
    UpdateThresholdsRequest:
      type: object
      properties:
        hot_threshold:
          type: integer
        warm_threshold:
          type: integer
      required:
      - hot_threshold
      - warm_threshold
      description: Request body for updating lead scoring thresholds
    EnrichmentLookupRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
        lead_id:
          type: string
          format: uuid
        company_name:
          type: string
        website:
          type: string
      description: Request body for enriching lead from email lookup
    WebsiteEnrichmentRequest:
      type: object
      required:
      - website
      properties:
        website:
          type: string
          format: uri
        company_name:
          type: string
      description: Request body for enriching lead from website lookup
    BatchEnrichmentRequest:
      type: object
      required:
      - emails
      properties:
        emails:
          type: array
          items:
            type: string
            format: email
        source:
          type: string
          enum:
          - CLEARBIT
          - HUNTER
          - ZOOMINFO
          - APOLLO
      description: Request body for batch-enriching leads from external sources
    EnrichmentResponse:
      type: object
      properties:
        company:
          type: object
          properties:
            name:
              type: string
            industry:
              type: string
            size:
              $ref: '#/components/schemas/CompanySize'
            website:
              type: string
            location:
              type: string
            country:
              type: string
            tech_stack:
              type: array
              items:
                type: string
            funding_total:
              type: number
              format: double
            funding_round:
              type: string
            employee_count:
              type: integer
            annual_revenue:
              type: number
              format: double
            logo_url:
              type: string
            linkedin_url:
              type: string
        person:
          type: object
          properties:
            name:
              type: string
            title:
              type: string
            role:
              $ref: '#/components/schemas/PersonRole'
            seniority:
              $ref: '#/components/schemas/PersonSeniority'
            email:
              type: string
              format: email
            email_valid:
              type: boolean
            phone:
              type: string
            linkedin_url:
              type: string
      required:
      - company
      - person
      description: Result of enriching lead data from external sources including company
        and person info
    EnrichmentResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        enrichment_request_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/EnrichmentStatus'
        source:
          $ref: '#/components/schemas/EnrichmentSource'
        company:
          type: object
        person:
          type: object
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
      required:
      - enrichment_request_id
      - completed_at
      description: Enriched data obtained from external sources for a lead
    EmailVerificationResult:
      type: object
      properties:
        email:
          type: string
        valid:
          type: boolean
        disposable:
          type: boolean
        role_based:
          type: boolean
        domain_valid:
          type: boolean
        mx_records_exist:
          type: boolean
      required:
      - email
      - valid
      - disposable
      - role_based
      - domain_valid
      - mx_records_exist
      description: Result of email verification including deliverability check
    PhoneVerificationResult:
      type: object
      properties:
        phone:
          type: string
        valid:
          type: boolean
        carrier:
          type: string
        phone_type:
          $ref: '#/components/schemas/PhoneType'
      required:
      - phone
      - valid
      - carrier
      description: Result of phone verification including carrier detection
    LeadMiningRequest:
      type: object
      required:
      - criteria
      properties:
        criteria:
          type: object
          description: Search criteria JSON (industry, size, location, title, etc.)
        source:
          type: string
          enum:
          - CLEARBIT
          - ZOOMINFO
          - APOLLO
          - LINKEDIN
        limit:
          type: integer
          default: 50
      description: Request body for searching ICP-matched leads
    ICPMatchRequest:
      type: object
      required:
      - icp_profile
      properties:
        icp_profile:
          type: object
          description: Ideal Customer Profile definition
        limit:
          type: integer
          default: 50
      description: Request body for matching leads against ideal customer profile
    DiscoveredLead:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        company:
          type: string
        title:
          type: string
        industry:
          type: string
        size:
          $ref: '#/components/schemas/CompanySize'
        match_score:
          type: number
          format: float
          description: ICP match score (0-100)
      required:
      - name
      - email
      - phone
      - company
      - title
      - industry
      - match_score
      description: A discovered lead match from ICP-based prospecting with contact
        and company details
    ScoreBucket:
      type: string
      enum:
      - HOT
      - WARM
      - COLD
      description: Enum of score buckets (hot, warm, cold, unscored)
    CompanySize:
      type: string
      enum:
      - STARTUP
      - SMB
      - MID_MARKET
      - ENTERPRISE
      description: Enum of company size categories (micro, small, medium, enterprise)
    PersonRole:
      type: string
      enum:
      - EXECUTIVE
      - MANAGER
      - INDIVIDUAL_CONTRIBUTOR
      - INTERN
      - OTHER
      description: Enum of person roles (decision_maker, influencer, end_user)
    PersonSeniority:
      type: string
      enum:
      - C_LEVEL
      - VP
      - DIRECTOR
      - MANAGER
      - SENIOR
      - MID
      - JUNIOR
      description: Enum of seniority levels (junior, mid, senior, executive, c_suite)
    EnrichmentStatus:
      type: string
      enum:
      - PENDING
      - SUCCESS
      - FAILED
      description: Enum of enrichment statuses (pending, completed, failed)
    EnrichmentSource:
      type: string
      enum:
      - CLEARBIT
      - HUNTER
      - ZOOMINFO
      - APOLLO
      - LINKEDIN
      description: Enum of data enrichment sources (clearbit, hunter, linkedin)
    PhoneType:
      type: string
      enum:
      - MOBILE
      - LANDLINE
      - VOIP
      description: Enum of phone types (mobile, landline, toll_free)
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      description: A generic paginated response wrapper with items and pagination
        metadata
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: integer
          description: HTTP error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: string
          description: Additional error details
      description: An error response with code, message, and optional details
    PaginatedScoringFrequency:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/ScoringFrequency'
      description: Paginated list of ScoringFrequency records
    LeadScoreSummary:
      type: object
      required:
      - lead_id
      - lead_name
      - score
      properties:
        lead_id:
          type: string
          format: uuid
        lead_name:
          type: string
        score:
          type: number
          format: float
      description: Aggregated lead score distribution across hot/warm/cold levels
    LeadScoreRanked:
      type: object
      required:
      - lead_id
      - lead_name
      - rank
      - score
      properties:
        lead_id:
          type: string
          format: uuid
        lead_name:
          type: string
        rank:
          type: integer
        score:
          type: number
          format: float
      description: A ranked lead with its score and position in the ranking
    PaginatedLeadScoreSummary:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/LeadScoreSummary'
      description: Paginated list of LeadScoreSummary records
    PaginatedLeadScoreRanked:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/LeadScoreRanked'
      description: Paginated list of LeadScoreRanked records
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
externalDocs:
  description: Intelligence API Reference
  url: https://docs.rerp.com/crm/intelligence/api-reference
