openapi: 3.1.0
info:
  title: CRM Automation
  version: 1.0.0
  description: Workflow automation service for CRM pipelines with triggers, rules,
    and scheduled actions.
servers:
- url: http://localhost:10352/api/v1/crm/automation
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/crm/automation
  description: Automation API
tags:
- name: workflows
  description: Workflow definitions and management
- name: rules
  description: Condition-action rules within workflows
- name: triggers
  description: Event hooks that fire workflows
- name: actions
  description: Scheduled and manual actions
paths:
  /workflows:
    get:
      operationId: list_workflows
      summary: List workflows
      tags:
      - workflows
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Search'
      - name: filter_active
        in: query
        schema:
          type: boolean
      - name: filter_trigger_type
        in: query
        schema:
          type: string
          enum:
          - STAGE_CHANGE
          - FIELD_CHANGE
          - TIME_BASED
          - WEBHOOK
          - MANUAL
      responses:
        '200':
          description: List of workflows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all workflows
    post:
      operationId: create_workflow
      summary: Create a new workflow
      tags:
      - workflows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowRequest'
      responses:
        '201':
          description: Workflow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new workflows
  /workflows/{id}:
    get:
      operationId: get_workflow
      summary: Get workflow by id
      tags:
      - workflows
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Workflow details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get workflows by ID
    put:
      operationId: update_workflow
      summary: Update workflow
      tags:
      - workflows
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkflowRequest'
      responses:
        '200':
          description: Workflow updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update workflows by ID
    delete:
      operationId: delete_workflow
      summary: Delete workflow
      tags:
      - workflows
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Workflow deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Delete workflows by ID
  /workflows/{id}/rules:
    get:
      operationId: list_workflow_rules
      summary: List rules for a workflow
      tags:
      - rules
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '404':
          description: Workflow not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get workflow rules
    post:
      operationId: create_workflow_rule
      summary: Add a rule to a workflow
      tags:
      - rules
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuleRequest'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '400':
          description: Invalid request
        '404':
          description: Workflow not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Get workflow rules
  /workflows/{id}/run:
    post:
      operationId: run_workflow
      summary: Manually trigger a workflow for testing
      tags:
      - workflows
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Workflow execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowExecutionResult'
        '404':
          description: Not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Run a workflow manually
  /workflows/{id}/run-history:
    get:
      operationId: list_workflow_run_history
      summary: View execution history for a workflow
      tags:
      - workflows
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Workflow run history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get workflow execution history
  /rules:
    get:
      operationId: list_rules
      summary: List all rules across workflows
      tags:
      - rules
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_workflow_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List of rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get workflow rules
    post:
      operationId: create_rule
      summary: Create a standalone rule (adds to a workflow)
      tags:
      - rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuleRequest'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Get workflow rules
  /rules/{id}:
    get:
      operationId: get_rule
      summary: Get rule by id
      tags:
      - rules
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Rule details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get workflow rules
    put:
      operationId: update_rule
      summary: Update rule
      tags:
      - rules
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRuleRequest'
      responses:
        '200':
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Get workflow rules
    delete:
      operationId: delete_rule
      summary: Delete rule
      tags:
      - rules
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Rule deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get workflow rules
  /rules/test:
    post:
      operationId: test_rule
      summary: Test a rule against a sample lead
      tags:
      - rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rule_id:
                  type: string
                  format: uuid
                lead_data:
                  type: object
                  description: Sample lead data for evaluation
      responses:
        '200':
          description: Rule test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleTestResult'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Get workflow rules
  /triggers:
    get:
      operationId: list_triggers
      summary: List all triggers
      tags:
      - triggers
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_type
        in: query
        schema:
          type: string
          enum:
          - STAGE_CHANGE
          - FIELD_CHANGE
          - TIME_BASED
          - WEBHOOK
          - ON_CREATE
          - ON_UPDATE
          - ON_DELETE
      - name: filter_enabled
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: List of triggers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all triggers
    post:
      operationId: create_trigger
      summary: Create a new trigger
      tags:
      - triggers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTriggerRequest'
      responses:
        '201':
          description: Trigger created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trigger'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new triggers
  /triggers/{id}:
    get:
      operationId: get_trigger
      summary: Get trigger by id
      tags:
      - triggers
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Trigger details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trigger'
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get triggers by ID
    put:
      operationId: update_trigger
      summary: Update trigger (enable/disable, schedule)
      tags:
      - triggers
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTriggerRequest'
      responses:
        '200':
          description: Trigger updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trigger'
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update triggers by ID
    delete:
      operationId: delete_trigger
      summary: Delete trigger
      tags:
      - triggers
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Trigger deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Delete triggers by ID
  /triggers/{id}/fire:
    post:
      operationId: fire_trigger
      summary: Manually fire a trigger for testing
      tags:
      - triggers
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Trigger fired successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  executed:
                    type: boolean
                  workflows_fired:
                    type: integer
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Fire a trigger manually
  /actions/schedule:
    post:
      operationId: schedule_action
      summary: Schedule a one-time action
      tags:
      - actions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleActionRequest'
      responses:
        '201':
          description: Action scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledAction'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Schedule a report to run on a recurring basis
  /actions/recurring:
    post:
      operationId: schedule_recurring_action
      summary: Schedule a recurring action
      tags:
      - actions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecurringActionRequest'
      responses:
        '201':
          description: Recurring action scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledAction'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new actions
  /actions/upcoming:
    get:
      operationId: list_upcoming_actions
      summary: List upcoming scheduled actions
      tags:
      - actions
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Upcoming actions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all actions
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Search:
      name: search
      in: query
      schema:
        type: string
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    Workflow:
      type: object
      required:
      - id
      - name
      - is_active
      - trigger_type
      - trigger_config
      - action_type
      - action_config
      - sequence
      - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        description:
          type: string
        is_active:
          type: boolean
        trigger_type:
          $ref: '#/components/schemas/TriggerType'
        trigger_config:
          type: object
          description: Trigger-specific configuration (JSON)
        action_type:
          $ref: '#/components/schemas/ActionType'
        action_config:
          type: object
          description: Action-specific configuration (JSON)
        conditions:
          type: object
          description: Additional AND/OR conditions (JSON)
        sequence:
          type: integer
          description: Execution order (lower = earlier)
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
        run_count:
          type: integer
          readOnly: true
        last_run:
          type: string
          format: date-time
          readOnly: true
    CreateWorkflowRequest:
      type: object
      required:
      - name
      - trigger_type
      - action_type
      - action_config
      - conditions
      properties:
        name:
          type: string
          maxLength: 128
        description:
          type: string
        trigger_type:
          $ref: '#/components/schemas/TriggerType'
        trigger_config:
          type: object
        action_type:
          $ref: '#/components/schemas/ActionType'
        action_config:
          type: object
        conditions:
          type: object
        sequence:
          type: integer
        is_active:
          type: boolean
          default: true
    UpdateWorkflowRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        trigger_type:
          $ref: '#/components/schemas/TriggerType'
        trigger_config:
          type: object
        action_type:
          $ref: '#/components/schemas/ActionType'
        action_config:
          type: object
        conditions:
          type: object
        sequence:
          type: integer
        is_active:
          type: boolean
      required:
      - name
      - description
      - sequence
      - is_active
    Rule:
      type: object
      required:
      - id
      - workflow_id
      - condition_field
      - condition_operator
      - sequence
      - is_active
      properties:
        id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
        condition_field:
          type: string
          maxLength: 128
        condition_operator:
          $ref: '#/components/schemas/ConditionOperator'
        condition_value:
          type: string
        condition_value_type:
          $ref: '#/components/schemas/ConditionValueType'
        action_type:
          $ref: '#/components/schemas/ActionType'
        action_config:
          type: object
          description: Action-specific configuration (JSON)
        is_active:
          type: boolean
        sequence:
          type: integer
        created_at:
          type: string
          format: date-time
          readOnly: true
    CreateRuleRequest:
      type: object
      required:
      - workflow_id
      - condition_field
      - condition_operator
      - condition_value
      - action_type
      - action_config
      properties:
        workflow_id:
          type: string
          format: uuid
        condition_field:
          type: string
        condition_operator:
          $ref: '#/components/schemas/ConditionOperator'
        condition_value:
          type: string
        condition_value_type:
          $ref: '#/components/schemas/ConditionValueType'
        action_type:
          $ref: '#/components/schemas/ActionType'
        action_config:
          type: object
        is_active:
          type: boolean
        sequence:
          type: integer
    UpdateRuleRequest:
      type: object
      properties:
        condition_field:
          type: string
        condition_operator:
          $ref: '#/components/schemas/ConditionOperator'
        condition_value:
          type: string
        condition_value_type:
          $ref: '#/components/schemas/ConditionValueType'
        action_type:
          $ref: '#/components/schemas/ActionType'
        action_config:
          type: object
        is_active:
          type: boolean
        sequence:
          type: integer
      required:
      - condition_field
      - condition_value
      - is_active
      - sequence
    Trigger:
      type: object
      required:
      - id
      - workflow_id
      - type
      - entity
      - enabled
      properties:
        id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/TriggerType'
        entity:
          type: string
          maxLength: 64
          description: Entity to watch (crm.lead, crm.contact, etc.)
        field:
          type: string
          maxLength: 128
          description: Field to watch (for field-based triggers)
        schedule:
          type: string
          description: Cron expression (for time-based triggers)
        enabled:
          type: boolean
        last_fired:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
    CreateTriggerRequest:
      type: object
      required:
      - workflow_id
      - type
      - entity
      properties:
        workflow_id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/TriggerType'
        entity:
          type: string
        field:
          type: string
        schedule:
          type: string
        enabled:
          type: boolean
          default: true
    UpdateTriggerRequest:
      type: object
      properties:
        enabled:
          type: boolean
        schedule:
          type: string
        type:
          $ref: '#/components/schemas/TriggerType'
        entity:
          type: string
        field:
          type: string
      required:
      - enabled
      - schedule
      - entity
      - field
    WorkflowExecution:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
        triggered_by:
          type: string
          format: uuid
          description: User or cron job ID
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/ExecutionStatus'
        result_summary:
          type: object
          description: Summary of actions executed
      required:
      - workflow_id
      - triggered_by
      - started_at
      - completed_at
    WorkflowExecutionResult:
      type: object
      properties:
        workflow_id:
          type: string
          format: uuid
        executed:
          type: boolean
        actions_ran:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
      - workflow_id
      - executed
      - actions_ran
      - errors
    RuleTestResult:
      type: object
      properties:
        rule_id:
          type: string
          format: uuid
        condition_met:
          type: boolean
        matching_conditions:
          type: array
          items:
            type: string
        actions_to_fire:
          type: array
          items:
            type: string
      required:
      - rule_id
      - condition_met
      - matching_conditions
      - actions_to_fire
    ScheduledAction:
      type: object
      required:
      - id
      - scheduled_at
      - status
      properties:
        id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
        scheduled_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/ExecutionStatus'
        action_config:
          type: object
        executed_at:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
    ScheduleActionRequest:
      type: object
      required:
      - workflow_id
      - scheduled_at
      properties:
        workflow_id:
          type: string
          format: uuid
        scheduled_at:
          type: string
          format: date-time
        action_config:
          type: object
    RecurringActionRequest:
      type: object
      required:
      - workflow_id
      - schedule
      properties:
        workflow_id:
          type: string
          format: uuid
        schedule:
          type: string
          description: Cron expression
        action_config:
          type: object
    TriggerType:
      type: string
      enum:
      - STAGE_CHANGE
      - FIELD_CHANGE
      - TIME_BASED
      - WEBHOOK
      - MANUAL
      - ON_CREATE
      - ON_UPDATE
      - ON_DELETE
    ActionType:
      type: string
      enum:
      - SEND_EMAIL
      - CREATE_TASK
      - UPDATE_FIELD
      - ASSIGN_LEAD
      - CALL_WEBHOOK
      - CREATE_RECORD
      - SET_VALUE
      - ESCALATE
    ConditionOperator:
      type: string
      enum:
      - EQUALS
      - NOT_EQUALS
      - GREATER_THAN
      - LESS_THAN
      - CONTAINS
      - NOT_CONTAINS
      - IS_EMPTY
      - IS_NOT_EMPTY
      - IN
      - NOT_IN
    ConditionValueType:
      type: string
      enum:
      - TEXT
      - INTEGER
      - FLOAT
      - BOOLEAN
      - DATE
      - ENTITY
    ExecutionStatus:
      type: string
      enum:
      - PENDING
      - RUNNING
      - SUCCESS
      - FAILED
      - CANCELLED
    Workflowexecutions:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/WorkflowExecution'
    Scheduledactions:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/ScheduledAction'
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: integer
          description: HTTP error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: string
          description: Additional error details
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    PaginatedWorkflow:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/Workflow'
    PaginatedRule:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/Rule'
    PaginatedTrigger:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/Trigger'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
