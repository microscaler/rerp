openapi: 3.1.0
info:
  title: CRM Automation
  version: v1.0.0
  description: Workflow automation service for CRM pipelines with triggers, rules,
    and scheduled actions.
  x-api-version: CRM Automation API v1.0.0
  x-crm-api-version: v1.0.0
  termsOfService: https://rerp.example.com/terms
  contact:
    name: RERP API Support
    url: https://docs.rerp.com/support
    email: api-support@rerp.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  x-api-docs:
    service: automation
    openapi_version: 3.1.0
    brrtrouter_version: latest
servers:
- url: http://localhost:10352/api/v1/crm/automation
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/crm/automation
  description: Automation API
tags:
- name: actions
  description: Scheduled and manual actions
- name: automation-execution
  description: Workflow execution and run history
- name: rules
  description: Condition-action rules within workflows
- name: triggers
  description: Event hooks that fire workflows
- name: workflows
  description: Workflow definitions and management
paths:
  /workflows:
    get:
      operationId: list_workflows
      summary: List workflows
      tags:
      - workflows
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Search'
      - name: filter_active
        in: query
        schema:
          type: boolean
      - name: filter_trigger_type
        in: query
        schema:
          type: string
          enum:
          - STAGE_CHANGE
          - FIELD_CHANGE
          - TIME_BASED
          - WEBHOOK
          - MANUAL
      responses:
        '200':
          description: List of workflows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
              examples:
                default:
                  items: []
                  total: 0
                  page: 1
                  per_page: 20
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
        '500':
          description: Internal server error
      security:
      - bearerAuth: []
      description: List all workflows
      x-operation-id: get_workflows_list
      x-controller: rerp_crm::automation::controller::workflows
      x-handler-name: workflows
    post:
      operationId: create_workflow
      summary: Create a new workflow
      tags:
      - workflows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowRequest'
            examples:
              default: &id002
                name: Lead Assignment
                description: Auto-assign leads based on region
                enabled: true
        description: Create a new workflow automation
      responses:
        '201':
          description: Workflow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
              examples:
                default: &id001
                  id: 00000000-0000-0000-0000-000000000007
                  name: Lead Assignment
                  description: Auto-assign leads based on region
                  enabled: true
                  created_at: '2024-01-15T10:30:00Z'
                  updated_at: '2024-01-15T10:30:00Z'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Not found
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new workflows
      x-operation-id: post_workflows_list
      x-controller: rerp_crm::automation::controller::workflows
      x-handler-name: workflows
  /workflows/{id}:
    get:
      operationId: get_workflow
      summary: Get workflow by id
      tags:
      - workflows
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Workflow details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
              examples:
                default: *id001
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '500':
          description: Internal server error
      security:
      - bearerAuth: []
      description: Get workflows by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::automation::controller::workflows::id
      x-handler-name: workflows_id
    put:
      operationId: update_workflow
      summary: Update workflow
      tags:
      - workflows
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkflowRequest'
            examples:
              default: *id002
        description: Update an existing workflow
      responses:
        '200':
          description: Workflow updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
              examples:
                default: *id001
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update workflows by ID
      x-operation-id: put_id_by_id
      x-controller: rerp_crm::automation::controller::workflows::id
      x-handler-name: workflows_id
    delete:
      operationId: delete_workflow
      summary: Delete workflow
      tags:
      - workflows
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Workflow deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Delete workflows by ID
      x-operation-id: delete_id_by_id
      x-controller: rerp_crm::automation::controller::workflows::id
      x-handler-name: workflows_id
  /workflows/{id}/rules:
    get:
      operationId: list_workflow_rules
      summary: List rules for a workflow
      tags:
      - rules
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
              examples:
                default:
                  items: []
                  total: 0
                  page: 1
                  per_page: 20
        '404':
          description: Workflow not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '500':
          description: Internal server error
      security:
      - bearerAuth: []
      description: Get workflow rules
      x-operation-id: get_rules_by_id
      x-controller: rerp_crm::automation::controller::workflows::id::rules
      x-handler-name: workflows_id_rules
    post:
      operationId: create_workflow_rule
      summary: Add a rule to a workflow
      tags:
      - rules
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuleRequest'
            examples:
              default: &id003
                name: Assign to region A
                condition:
                  field: region
                  operator: equals
                  value: A
                action:
                  type: assign
                  value: team-001
        description: Add a rule to a workflow
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
              examples:
                default: &id004
                  id: 00000000-0000-0000-0000-000000000008
                  name: Assign to region A
                  condition:
                    field: region
                    operator: equals
                    value: A
                  action:
                    type: assign
                    value: team-001
                  created_at: '2024-01-15T10:30:00Z'
                  updated_at: '2024-01-15T10:30:00Z'
        '400':
          description: Invalid request
        '404':
          description: Workflow not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Get workflow rules
      x-operation-id: post_rules_by_id
      x-controller: rerp_crm::automation::controller::workflows::id::rules
      x-handler-name: workflows_id_rules
  /workflows/{id}/run:
    post:
      operationId: run_workflow
      summary: Manually trigger a workflow for testing
      tags:
      - workflows
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Workflow execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowExecutionResult'
              examples:
                default:
                  workflow_id: 00000000-0000-0000-0000-000000000007
                  status: completed
                  started_at: '2024-01-15T10:30:00Z'
                  completed_at: '2024-01-15T10:30:05Z'
                  rules_triggered: 3
        '404':
          description: Not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Run a workflow manually
      x-operation-id: post_workflows_run
      x-controller: rerp_crm::automation::controller::workflows::id::run
      x-handler-name: workflows_id_run
  /workflows/{id}/run-history:
    get:
      operationId: list_workflow_run_history
      summary: View execution history for a workflow
      tags:
      - workflows
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Workflow run history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
              examples:
                default:
                  items: []
                  total: 0
                  page: 1
                  per_page: 20
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
        '500':
          description: Internal server error
      security:
      - bearerAuth: []
      description: Get workflow execution history
      x-operation-id: get_run-history_by_id
      x-controller: rerp_crm::automation::controller::workflows::id::run-history
      x-handler-name: workflows_id_run-history
  /rules:
    get:
      operationId: list_rules
      summary: List all rules across workflows
      tags:
      - rules
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_workflow_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List of rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
              examples:
                default:
                  items: []
                  total: 0
                  page: 1
                  per_page: 20
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
        '500':
          description: Internal server error
      security:
      - bearerAuth: []
      description: Get workflow rules
      x-operation-id: get_rules_list
      x-controller: rerp_crm::automation::controller::rules
      x-handler-name: rules
    post:
      operationId: create_rule
      summary: Create a standalone rule (adds to a workflow)
      tags:
      - rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuleRequest'
            examples:
              default: *id003
        description: Create a new workflow rule
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
              examples:
                default: *id004
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Not found
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Get workflow rules
      x-operation-id: post_rules_list
      x-controller: rerp_crm::automation::controller::rules
      x-handler-name: rules
  /rules/{id}:
    get:
      operationId: get_rule
      summary: Get rule by id
      tags:
      - rules
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Rule details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
              examples:
                default: *id004
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '500':
          description: Internal server error
      security:
      - bearerAuth: []
      description: Get workflow rules
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::automation::controller::rules::id
      x-handler-name: rules_id
    put:
      operationId: update_rule
      summary: Update rule
      tags:
      - rules
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRuleRequest'
            examples:
              default: *id003
        description: Update an existing rule
      responses:
        '200':
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
              examples:
                default: *id004
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Get workflow rules
      x-operation-id: put_id_by_id
      x-controller: rerp_crm::automation::controller::rules::id
      x-handler-name: rules_id
    delete:
      operationId: delete_rule
      summary: Delete rule
      tags:
      - rules
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Rule deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get workflow rules
      x-operation-id: delete_id_by_id
      x-controller: rerp_crm::automation::controller::rules::id
      x-handler-name: rules_id
  /rules/test:
    post:
      operationId: test_rule
      summary: Test a rule against a sample lead
      tags:
      - rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rule_id:
                  type: string
                  format: uuid
                lead_data:
                  type: object
                  description: Sample lead data for evaluation
        description: Test a workflow rule with sample data to verify conditions and
          actions
      responses:
        '200':
          description: Rule test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleTestResult'
              examples:
                default:
                  rule_id: 00000000-0000-0000-0000-000000000008
                  test_passed: true
                  matched: true
                  evaluation_time_ms: 12
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
        '404':
          description: Not found
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Get workflow rules
      x-operation-id: post_test
      x-controller: rerp_crm::automation::controller::rules::test
      x-handler-name: rules_test
  /triggers:
    get:
      operationId: list_triggers
      summary: List all triggers
      tags:
      - triggers
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_type
        in: query
        schema:
          type: string
          enum:
          - STAGE_CHANGE
          - FIELD_CHANGE
          - TIME_BASED
          - WEBHOOK
          - ON_CREATE
          - ON_UPDATE
          - ON_DELETE
      - name: filter_enabled
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: List of triggers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
              examples:
                default:
                  items: []
                  total: 0
                  page: 1
                  per_page: 20
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
        '500':
          description: Internal server error
      security:
      - bearerAuth: []
      description: List all triggers
      x-operation-id: get_triggers_list
      x-controller: rerp_crm::automation::controller::triggers
      x-handler-name: triggers
    post:
      operationId: create_trigger
      summary: Create a new trigger
      tags:
      - triggers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTriggerRequest'
            examples:
              default: &id006
                name: On Lead Create
                event: lead.created
                enabled: true
        description: Create a new workflow trigger
      responses:
        '201':
          description: Trigger created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trigger'
              examples:
                default: &id005
                  id: 00000000-0000-0000-0000-000000000009
                  name: On Lead Create
                  event: lead.created
                  enabled: true
                  created_at: '2024-01-15T10:30:00Z'
                  updated_at: '2024-01-15T10:30:00Z'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Not found
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new triggers
      x-operation-id: post_triggers_list
      x-controller: rerp_crm::automation::controller::triggers
      x-handler-name: triggers
  /triggers/{id}:
    get:
      operationId: get_trigger
      summary: Get trigger by id
      tags:
      - triggers
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Trigger details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trigger'
              examples:
                default: *id005
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '500':
          description: Internal server error
      security:
      - bearerAuth: []
      description: Get triggers by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::automation::controller::triggers::id
      x-handler-name: triggers_id
    put:
      operationId: update_trigger
      summary: Update trigger (enable/disable, schedule)
      tags:
      - triggers
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTriggerRequest'
            examples:
              default: *id006
        description: Update an existing trigger
      responses:
        '200':
          description: Trigger updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trigger'
              examples:
                default: *id005
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update triggers by ID
      x-operation-id: put_id_by_id
      x-controller: rerp_crm::automation::controller::triggers::id
      x-handler-name: triggers_id
    delete:
      operationId: delete_trigger
      summary: Delete trigger
      tags:
      - triggers
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Trigger deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Delete triggers by ID
      x-operation-id: delete_id_by_id
      x-controller: rerp_crm::automation::controller::triggers::id
      x-handler-name: triggers_id
  /triggers/{id}/fire:
    post:
      operationId: fire_trigger
      summary: Manually fire a trigger for testing
      tags:
      - triggers
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Trigger fired successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  executed:
                    type: boolean
                  workflows_fired:
                    type: integer
              examples:
                default:
                  success: true
                  trigger_id: 00000000-0000-0000-0000-000000000008
                  workflow_execution_id: 00000000-0000-0000-0000-000000000032
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
        '404':
          description: Not found
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Fire a trigger manually
      x-operation-id: post_triggers_fire
      x-controller: rerp_crm::automation::controller::triggers::id::fire
      x-handler-name: triggers_id_fire
  /actions/schedule:
    post:
      operationId: schedule_action
      summary: Schedule a one-time action
      tags:
      - actions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleActionRequest'
        description: Schedule a one-time action at a specific time
      responses:
        '201':
          description: Action scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledAction'
              examples:
                default: &id007
                  id: 00000000-0000-0000-0000-000000000026
                  type: email
                  scheduled_at: '2024-01-16T10:00:00Z'
                  status: pending
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
        '404':
          description: Not found
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Schedule a report to run on a recurring basis
      x-operation-id: post_schedule
      x-controller: rerp_crm::automation::controller::actions::schedule
      x-handler-name: actions_schedule
  /actions/recurring:
    post:
      operationId: schedule_recurring_action
      summary: Schedule a recurring action
      tags:
      - actions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecurringActionRequest'
        description: Schedule a recurring action with a defined interval
      responses:
        '201':
          description: Recurring action scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledAction'
              examples:
                default: *id007
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
        '404':
          description: Not found
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new actions
      x-operation-id: post_recurring
      x-controller: rerp_crm::automation::controller::actions::recurring
      x-handler-name: actions_recurring
  /actions/upcoming:
    get:
      operationId: list_upcoming_actions
      summary: List upcoming scheduled actions
      tags:
      - actions
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Upcoming actions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
              examples:
                default:
                  items: []
                  total: 0
                  page: 1
                  per_page: 20
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
        '500':
          description: Internal server error
      security:
      - bearerAuth: []
      description: List all actions
      x-operation-id: get_upcoming
      x-controller: rerp_crm::automation::controller::actions::upcoming
      x-handler-name: actions_upcoming
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination (1-indexed)
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 'Maximum number of items per page (default: 20, max: 100)'
    Search:
      name: search
      in: query
      schema:
        type: string
      description: Search query string for filtering resources
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique identifier for the resource
  schemas:
    Workflow:
      type: object
      required:
      - id
      - name
      - is_active
      - trigger_type
      - trigger_config
      - action_type
      - action_config
      - sequence
      - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        description:
          type: string
        is_active:
          type: boolean
        trigger_type:
          $ref: '#/components/schemas/TriggerType'
        trigger_config:
          type: object
          description: Trigger-specific configuration (JSON)
        action_type:
          $ref: '#/components/schemas/ActionType'
        action_config:
          type: object
          description: Action-specific configuration (JSON)
        conditions:
          type: object
          description: Additional AND/OR conditions (JSON)
        sequence:
          type: integer
          description: Execution order (lower = earlier)
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
        run_count:
          type: integer
          readOnly: true
        last_run:
          type: string
          format: date-time
          readOnly: true
      description: An automation workflow that defines business logic for lead processing
    CreateWorkflowRequest:
      type: object
      required:
      - name
      - trigger_type
      - action_type
      - action_config
      - conditions
      properties:
        name:
          type: string
          maxLength: 128
        description:
          type: string
        trigger_type:
          $ref: '#/components/schemas/TriggerType'
        trigger_config:
          type: object
        action_type:
          $ref: '#/components/schemas/ActionType'
        action_config:
          type: object
        conditions:
          type: object
        sequence:
          type: integer
        is_active:
          type: boolean
          default: true
      description: Request body for creating a new workflow automation
    UpdateWorkflowRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        trigger_type:
          $ref: '#/components/schemas/TriggerType'
        trigger_config:
          type: object
        action_type:
          $ref: '#/components/schemas/ActionType'
        action_config:
          type: object
        conditions:
          type: object
        sequence:
          type: integer
        is_active:
          type: boolean
      required:
      - name
      - description
      - sequence
      - is_active
      description: Request body for updating an existing workflow
    Rule:
      type: object
      required:
      - id
      - workflow_id
      - condition_field
      - condition_operator
      - sequence
      - is_active
      properties:
        id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
        condition_field:
          type: string
          maxLength: 128
        condition_operator:
          $ref: '#/components/schemas/ConditionOperator'
        condition_value:
          type: string
        condition_value_type:
          $ref: '#/components/schemas/ConditionValueType'
        action_type:
          $ref: '#/components/schemas/ActionType'
        action_config:
          type: object
          description: Action-specific configuration (JSON)
        is_active:
          type: boolean
        sequence:
          type: integer
        created_at:
          type: string
          format: date-time
          readOnly: true
      description: A conditional rule that triggers actions when certain criteria
        are met
    CreateRuleRequest:
      type: object
      required:
      - workflow_id
      - condition_field
      - condition_operator
      - condition_value
      - action_type
      - action_config
      properties:
        workflow_id:
          type: string
          format: uuid
        condition_field:
          type: string
        condition_operator:
          $ref: '#/components/schemas/ConditionOperator'
        condition_value:
          type: string
        condition_value_type:
          $ref: '#/components/schemas/ConditionValueType'
        action_type:
          $ref: '#/components/schemas/ActionType'
        action_config:
          type: object
        is_active:
          type: boolean
        sequence:
          type: integer
      description: Request body for creating a new workflow rule
    UpdateRuleRequest:
      type: object
      properties:
        condition_field:
          type: string
        condition_operator:
          $ref: '#/components/schemas/ConditionOperator'
        condition_value:
          type: string
        condition_value_type:
          $ref: '#/components/schemas/ConditionValueType'
        action_type:
          $ref: '#/components/schemas/ActionType'
        action_config:
          type: object
        is_active:
          type: boolean
        sequence:
          type: integer
      required:
      - condition_field
      - condition_value
      - is_active
      - sequence
      description: Request body for updating an existing rule
    Trigger:
      type: object
      required:
      - id
      - workflow_id
      - type
      - entity
      - enabled
      properties:
        id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/TriggerType'
        entity:
          type: string
          maxLength: 64
          description: Entity to watch (crm.lead, crm.contact, etc.)
        field:
          type: string
          maxLength: 128
          description: Field to watch (for field-based triggers)
        schedule:
          type: string
          description: Cron expression (for time-based triggers)
        enabled:
          type: boolean
        last_fired:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      description: An event-based trigger that initiates workflow execution
    CreateTriggerRequest:
      type: object
      required:
      - workflow_id
      - type
      - entity
      properties:
        workflow_id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/TriggerType'
        entity:
          type: string
        field:
          type: string
        schedule:
          type: string
        enabled:
          type: boolean
          default: true
      description: Request body for creating a new workflow trigger
    UpdateTriggerRequest:
      type: object
      properties:
        enabled:
          type: boolean
        schedule:
          type: string
        type:
          $ref: '#/components/schemas/TriggerType'
        entity:
          type: string
        field:
          type: string
      required:
      - enabled
      - schedule
      - entity
      - field
      description: Request body for updating an existing trigger
    WorkflowExecution:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
        triggered_by:
          type: string
          format: uuid
          description: User or cron job ID
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/ExecutionStatus'
        result_summary:
          type: object
          description: Summary of actions executed
      required:
      - workflow_id
      - triggered_by
      - started_at
      - completed_at
      description: Record of a workflow execution event with timing and status
    WorkflowExecutionResult:
      type: object
      properties:
        workflow_id:
          type: string
          format: uuid
        executed:
          type: boolean
        actions_ran:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
      - workflow_id
      - executed
      - actions_ran
      - errors
      description: Result of executing a workflow including triggered rules
    RuleTestResult:
      type: object
      properties:
        rule_id:
          type: string
          format: uuid
        condition_met:
          type: boolean
        matching_conditions:
          type: array
          items:
            type: string
        actions_to_fire:
          type: array
          items:
            type: string
      required:
      - rule_id
      - condition_met
      - matching_conditions
      - actions_to_fire
      description: Result of testing a rule configuration
    ScheduledAction:
      type: object
      required:
      - id
      - scheduled_at
      - status
      properties:
        id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
        scheduled_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/ExecutionStatus'
        action_config:
          type: object
        executed_at:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      description: A scheduled action with its execution parameters
    ScheduleActionRequest:
      type: object
      required:
      - workflow_id
      - scheduled_at
      properties:
        workflow_id:
          type: string
          format: uuid
        scheduled_at:
          type: string
          format: date-time
        action_config:
          type: object
      description: Request body for scheduling a one-time action
    RecurringActionRequest:
      type: object
      required:
      - workflow_id
      - schedule
      properties:
        workflow_id:
          type: string
          format: uuid
        schedule:
          type: string
          description: Cron expression
        action_config:
          type: object
      description: Request body for scheduling a recurring action
    TriggerType:
      type: string
      enum:
      - STAGE_CHANGE
      - FIELD_CHANGE
      - TIME_BASED
      - WEBHOOK
      - MANUAL
      - ON_CREATE
      - ON_UPDATE
      - ON_DELETE
      description: Enum of trigger types (event-based, schedule-based, webhook-based)
    ActionType:
      type: string
      enum:
      - SEND_EMAIL
      - CREATE_TASK
      - UPDATE_FIELD
      - ASSIGN_LEAD
      - CALL_WEBHOOK
      - CREATE_RECORD
      - SET_VALUE
      - ESCALATE
      description: Enum of action types (notification, assign, update, create, etc.)
    ConditionOperator:
      type: string
      enum:
      - EQUALS
      - NOT_EQUALS
      - GREATER_THAN
      - LESS_THAN
      - CONTAINS
      - NOT_CONTAINS
      - IS_EMPTY
      - IS_NOT_EMPTY
      - IN
      - NOT_IN
      description: Enum of condition operators (equals, contains, greater_than, etc.)
    ConditionValueType:
      type: string
      enum:
      - TEXT
      - INTEGER
      - FLOAT
      - BOOLEAN
      - DATE
      - ENTITY
      description: Enum of condition value types (string, number, date, boolean)
    ExecutionStatus:
      type: string
      enum:
      - PENDING
      - RUNNING
      - SUCCESS
      - FAILED
      - CANCELLED
      description: Enum of workflow execution statuses (running, completed, failed)
    Workflowexecutions:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/WorkflowExecution'
      description: Collection of workflow execution records
    Scheduledactions:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/ScheduledAction'
      description: Collection of scheduled action records
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: integer
          description: HTTP error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: string
          description: Additional error details
      description: An error response with code, message, and optional details
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      description: A generic paginated response wrapper with items and pagination
        metadata
    PaginatedWorkflow:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/Workflow'
      description: Paginated list of Workflow records
    PaginatedRule:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/Rule'
      description: Paginated list of Rule records
    PaginatedTrigger:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/Trigger'
      description: Paginated list of Trigger records
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
externalDocs:
  description: Automation API Reference
  url: https://docs.rerp.com/crm/automation/api-reference
