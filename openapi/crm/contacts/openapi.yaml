openapi: 3.1.0
info:
  title: Contacts
  version: v1.0.0
  description: Contact management service — contacts, org hierarchy, addresses.
  x-api-version: CRM Contacts API v1.0.0
  x-crm-api-version: v1.0.0
  termsOfService: https://rerp.example.com/terms
servers:
- url: http://localhost:10352/api/v1/crm/contacts
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/crm/contacts
  description: Contacts API
tags:
- name: contacts
  description: Contact CRUD
- name: contacts-accounts
  description: Contact-account associations
- name: contacts-hierarchy
  description: Contact tree and relationship management
- name: contacts-leads
  description: Contact-lead associations
- name: contacts-merge
  description: Contact deduplication and merge operations
- name: contacts-search
  description: Contact search and discovery operations
paths:
  /contacts:
    get:
      operationId: list_contacts
      summary: List contacts
      tags:
      - contacts
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
      - name: filter_company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: filter_parent_id
        in: query
        schema:
          type: string
          format: uuid
      - name: filter_email
        in: query
        schema:
          type: string
          format: email
      - name: filter_active
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: List of contacts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all contacts
      x-operation-id: get_contacts_list
      x-controller: rerp_crm::contacts::controller::contacts
      x-handler-name: contacts
    post:
      operationId: create_contact
      summary: Create a new contact
      tags:
      - contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContactRequest'
            examples:
              default: &id002
                first_name: Jane
                last_name: Smith
                email: jane@example.com
                phone: +1-555-0124
                title: Marketing Director
                account_id: 00000000-0000-0000-0000-000000000003
      responses:
        '201':
          description: Contact created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
              examples:
                default: &id001
                  id: 00000000-0000-0000-0000-000000000002
                  first_name: Jane
                  last_name: Smith
                  email: jane@example.com
                  phone: +1-555-0124
                  title: Marketing Director
                  account_id: 00000000-0000-0000-0000-000000000003
                  created_at: '2024-01-15T10:30:00Z'
                  updated_at: '2024-01-15T10:30:00Z'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new contacts
      x-operation-id: post_contacts_list
      x-controller: rerp_crm::contacts::controller::contacts
      x-handler-name: contacts
  /contacts/search-by-email:
    get:
      operationId: search_contacts_by_email
      summary: Find contacts matching an email address
      tags:
      - contacts
      parameters:
      - name: email
        in: query
        required: true
        schema:
          type: string
          format: email
      responses:
        '200':
          description: Matching contacts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Search contacts by email address
      x-operation-id: get_search-by-email
      x-controller: rerp_crm::contacts::controller::contacts::search-by-email
      x-handler-name: contacts_search-by-email
  /contacts/{id}:
    get:
      operationId: get_contact
      summary: Get contact by id
      tags:
      - contacts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Contact details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
              examples:
                default: *id001
        '404':
          description: Not found
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      description: Get contacts by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::contacts::controller::contacts::id
      x-handler-name: contacts_id
    put:
      operationId: update_contact
      summary: Update contact fields
      tags:
      - contacts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContactRequest'
            examples:
              default: *id002
      responses:
        '200':
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
              examples:
                default: *id001
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update contacts by ID
      x-operation-id: put_id_by_id
      x-controller: rerp_crm::contacts::controller::contacts::id
      x-handler-name: contacts_id
    delete:
      operationId: delete_contact
      summary: Soft-delete contact
      tags:
      - contacts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Contact deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Delete contacts by ID
      x-operation-id: delete_id_by_id
      x-controller: rerp_crm::contacts::controller::contacts::id
      x-handler-name: contacts_id
  /contacts/{id}/tree:
    get:
      operationId: get_contact_hierarchy
      summary: Get contact's org tree (parent + children)
      tags:
      - contacts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Org tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get hierarchical tree structure
      x-operation-id: get_tree_by_id
      x-controller: rerp_crm::contacts::controller::contacts::id::tree
      x-handler-name: contacts_id_tree
  /contacts/{id}/leads:
    get:
      operationId: get_contact_related_leads
      summary: Get leads associated with a contact
      tags:
      - contacts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: Related leads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get leads associated with a campaign
      x-operation-id: get_leads_by_id
      x-controller: rerp_crm::contacts::controller::contacts::id::leads
      x-handler-name: contacts_id_leads
  /contacts/{id}/accounts:
    get:
      operationId: get_contact_accounts
      summary: Get accounts associated with a contact
      tags:
      - contacts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Related accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get contacts by ID
      x-operation-id: get_accounts_by_id
      x-controller: rerp_crm::contacts::controller::contacts::id::accounts
      x-handler-name: contacts_id_accounts
  /contacts/merge:
    post:
      operationId: merge_contacts
      summary: Merge two contacts (keep one, delete other, update references)
      tags:
      - contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeContactsRequest'
            examples:
              default: *id002
      responses:
        '200':
          description: Merge completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MergeResult'
              examples:
                default:
                  primary_id: 00000000-0000-0000-0000-000000000002
                  merged_from:
                  - 00000000-0000-0000-0000-000000000032
                  - 00000000-0000-0000-0000-000000000033
                  fields_merged:
                  - email
                  - phone
                  - company
        '400':
          description: Invalid request
        '404':
          description: Contact not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new contacts
      x-operation-id: post_merge
      x-controller: rerp_crm::contacts::controller::contacts::merge
      x-handler-name: contacts_merge
components:
  schemas:
    Contact:
      type: object
      required:
      - id
      - name
      - create_date
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        phone:
          type: string
          maxLength: 64
        mobile:
          type: string
          maxLength: 64
        title:
          type: string
          enum:
          - MR
          - MRS
          - MME
          description: Salutation
        function:
          type: string
          maxLength: 128
        department:
          type: string
          maxLength: 128
        company_id:
          type: string
          format: uuid
          description: Parent company/account
        is_company:
          type: boolean
          default: false
        parent_id:
          type: string
          format: uuid
          description: Parent contact for org structure
        street:
          type: string
          maxLength: 255
        street2:
          type: string
          maxLength: 255
        city:
          type: string
          maxLength: 128
        state_id:
          type: string
          format: uuid
        zip:
          type: string
          maxLength: 32
        country_id:
          type: string
          format: uuid
        user_ids:
          type: array
          items:
            type: string
            format: uuid
        active:
          type: boolean
          default: true
        color:
          type: integer
          minimum: 1
          maximum: 16
        create_date:
          type: string
          format: date-time
          readOnly: true
        write_date:
          type: string
          format: date-time
          readOnly: true
        child_contact_ids:
          type: array
          items:
            type: string
            format: uuid
          readOnly: true
        lead_count:
          type: integer
          readOnly: true
        opportunity_count:
          type: integer
          readOnly: true
      description: An individual person associated with an account or lead
    CreateContactRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        phone:
          type: string
        mobile:
          type: string
        title:
          type: string
          enum:
          - MR
          - MRS
          - MME
        function:
          type: string
        department:
          type: string
        company_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        street:
          type: string
        street2:
          type: string
        city:
          type: string
        state_id:
          type: string
          format: uuid
        zip:
          type: string
        country_id:
          type: string
          format: uuid
    UpdateContactRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        mobile:
          type: string
        title:
          type: string
          enum:
          - MR
          - MRS
          - MME
        function:
          type: string
        department:
          type: string
        company_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        street:
          type: string
        street2:
          type: string
        city:
          type: string
        state_id:
          type: string
          format: uuid
        zip:
          type: string
        country_id:
          type: string
          format: uuid
        active:
          type: boolean
      required:
      - name
      - email
      - phone
      - mobile
      - title
      - function
      - department
      - company_id
      - parent_id
      - street
      - street2
      - city
      - state_id
      - zip
      - country_id
      - active
    ContactHierarchy:
      type: object
      properties:
        contact:
          $ref: '#/components/schemas/Contact'
        parent:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        children:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              is_company:
                type: boolean
      required:
      - children
    MergeContactsRequest:
      type: object
      required:
      - keep_id
      - remove_id
      properties:
        keep_id:
          type: string
          format: uuid
        remove_id:
          type: string
          format: uuid
    MergeResult:
      type: object
      properties:
        kept_id:
          type: string
          format: uuid
        removed_id:
          type: string
          format: uuid
        merged_lead_count:
          type: integer
        merged_account_count:
          type: integer
      required:
      - kept_id
      - removed_id
      - merged_lead_count
      - merged_account_count
      description: Result of merging multiple records together
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: integer
          description: HTTP error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: string
          description: Additional error details
      description: An error response with code, message, and optional details
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      description: A generic paginated response wrapper with items and pagination
        metadata
    PaginatedContact:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/Contact'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
