openapi: 3.1.0
info:
  title: CRM Reporting & BI
  version: v1.0.0
  description: Analytics, dashboards, forecasts, and reporting for CRM operations.
  x-api-version: CRM Reporting API v1.0.0
  x-crm-api-version: v1.0.0
  termsOfService: https://rerp.example.com/terms
servers:
- url: http://localhost:10352/api/v1/crm/reporting
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/crm/reporting
  description: Reporting API
tags:
- name: conversion
  description: Lead-to-revenue conversion analytics
- name: forecast
  description: Revenue forecasting
- name: performance
  description: Rep and team performance metrics
- name: pipeline
  description: Pipeline health and revenue summary
- name: report-analytics
  description: Pipeline, conversion, and funnel analytics
- name: report-forecast
  description: Forecasting and accuracy tracking
- name: report-performance
  description: Rep and team performance metrics
- name: report-scheduling
  description: Report scheduling and export
- name: report-time-to-close
  description: Time-to-close analysis
- name: report-win-loss
  description: Win/loss analysis
- name: reports
  description: Custom report builder and scheduling
- name: win-loss
  description: Win rate and loss analysis
paths:
  /analytics/pipeline-summary:
    get:
      operationId: get_pipeline_summary
      summary: Get pipeline summary grouped by stage
      tags:
      - pipeline
      parameters:
      - name: team_id
        in: query
        schema:
          type: string
          format: uuid
      - name: start_date
        in: query
        schema:
          type: string
          format: date
      - name: end_date
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Pipeline summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPipelinesummary'
              examples:
                default:
                  items:
                  - total_leads: 150
                    stage_breakdown:
                      discovery: 45
                      qualified: 35
                    weighted_value: 375000
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get pipeline summary with stage breakdown
      x-operation-id: get_pipeline-summary
      x-controller: rerp_crm::reporting::controller::analytics::pipeline-summary
      x-handler-name: analytics_pipeline-summary
  /analytics/pipeline-weighted:
    get:
      operationId: get_weighted_pipeline
      summary: Get weighted pipeline by team/rep
      tags:
      - pipeline
      responses:
        '200':
          description: Weighted pipeline data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeightedPipeline'
              examples:
                default:
                  total_leads: 150
                  stage_breakdown:
                    discovery:
                      count: 45
                      value: 100000
                      probability: 0.2
                    qualified:
                      count: 35
                      value: 125000
                      probability: 0.4
                  weighted_value: 85000
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get weighted pipeline revenue
      x-operation-id: get_pipeline-weighted
      x-controller: rerp_crm::reporting::controller::analytics::pipeline-weighted
      x-handler-name: analytics_pipeline-weighted
  /analytics/conversion-rates:
    get:
      operationId: get_conversion_rates
      summary: Get conversion rates by period
      tags:
      - conversion
      parameters:
      - name: period
        in: query
        schema:
          type: string
          enum:
          - WEEK
          - MONTH
          - QUARTER
          - YEAR
          default: MONTH
      - name: start_date
        in: query
        schema:
          type: string
          format: date
      - name: end_date
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Conversion rates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConversionrate'
              examples:
                default:
                  items:
                  - period: monthly
                    total_leads: 500
                    converted: 62
                    rate: 12.4
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get conversion rate analytics
      x-operation-id: get_conversion-rates
      x-controller: rerp_crm::reporting::controller::analytics::conversion-rates
      x-handler-name: analytics_conversion-rates
  /analytics/funnel:
    get:
      operationId: get_funnel
      summary: Get full funnel visualization data
      tags:
      - conversion
      parameters:
      - name: period
        in: query
        schema:
          type: string
          enum:
          - WEEK
          - MONTH
          - QUARTER
          - YEAR
      - name: start_date
        in: query
        schema:
          type: string
          format: date
      - name: end_date
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Funnel data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FunnelData'
              examples:
                default:
                  stages:
                  - name: visitor
                    count: 10000
                  - name: lead
                    count: 1250
                  - name: qualified
                    count: 450
                  - name: customer
                    count: 62
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all analytics
      x-operation-id: get_funnel
      x-controller: rerp_crm::reporting::controller::analytics::funnel
      x-handler-name: analytics_funnel
  /analytics/lead-sources:
    get:
      operationId: get_lead_source_effectiveness
      summary: Get lead volume and revenue by source
      tags:
      - conversion
      responses:
        '200':
          description: Lead source effectiveness
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeadSourceReport'
              examples:
                default:
                  items:
                  - total: 850
                    by_source:
                      website: 350
                      referral: 200
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get lead source analytics
      x-operation-id: get_lead-sources
      x-controller: rerp_crm::reporting::controller::analytics::lead-sources
      x-handler-name: analytics_lead-sources
  /analytics/rep-performance:
    get:
      operationId: get_rep_performance
      summary: Get individual rep performance metrics
      tags:
      - performance
      parameters:
      - name: user_id
        in: query
        schema:
          type: string
          format: uuid
      - name: period
        in: query
        schema:
          type: string
          enum:
          - WEEK
          - MONTH
          - QUARTER
          - YEAR
      - name: start_date
        in: query
        schema:
          type: string
          format: date
      - name: end_date
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Rep performance data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepPerformance'
              examples:
                default:
                  rep_id: 00000000-0000-0000-0000-000000000010
                  rep_name: Jane Smith
                  deals_won: 12
                  deals_lost: 5
                  revenue: 125000
                  conversion_rate: 24.0
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get representative performance metrics
      x-operation-id: get_rep-performance
      x-controller: rerp_crm::reporting::controller::analytics::rep-performance
      x-handler-name: analytics_rep-performance
  /analytics/team-performance:
    get:
      operationId: get_team_performance
      summary: Get team-level performance summary
      tags:
      - performance
      parameters:
      - name: team_id
        in: query
        schema:
          type: string
          format: uuid
      - name: period
        in: query
        schema:
          type: string
          enum:
          - WEEK
          - MONTH
          - QUARTER
          - YEAR
      responses:
        '200':
          description: Team performance summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamPerformance'
              examples:
                default:
                  team_id: 00000000-0000-0000-0000-000000000006
                  team_name: Sales Team Alpha
                  total_deals: 24
                  total_revenue: 250000
                  avg_deal_size: 10416
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get team performance metrics
      x-operation-id: get_team-performance
      x-controller: rerp_crm::reporting::controller::analytics::team-performance
      x-handler-name: analytics_team-performance
  /analytics/leaderboard:
    get:
      operationId: get_leaderboard
      summary: Get ranked list of reps
      tags:
      - performance
      parameters:
      - name: metric
        in: query
        schema:
          type: string
          enum:
          - REVENUE
          - DEALS_WON
          - WEIGHTED_PIPELINE
          default: REVENUE
      - name: period
        in: query
        schema:
          type: string
          enum:
          - WEEK
          - MONTH
          - QUARTER
          - YEAR
      - name: team_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeaderboardEntry'
              examples:
                default:
                  items:
                  - rep_id: 00000000-0000-0000-0000-000000000010
                    rep_name: Jane Smith
                    deals_won: 12
                    rank: 1
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get performance leaderboard
      x-operation-id: get_leaderboard
      x-controller: rerp_crm::reporting::controller::analytics::leaderboard
      x-handler-name: analytics_leaderboard
  /analytics/win-loss:
    get:
      operationId: get_win_loss_analysis
      summary: Get historical win/loss analysis
      tags:
      - win-loss
      parameters:
      - name: period
        in: query
        schema:
          type: string
          enum:
          - WEEK
          - MONTH
          - QUARTER
          - YEAR
      - name: start_date
        in: query
        schema:
          type: string
          format: date
      - name: end_date
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Win/loss analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WinLossAnalysis'
              examples:
                default:
                  won: 45
                  lost: 30
                  win_rate: 60.0
                  by_reason:
                    price: 12
                    feature_gap: 8
                    competitor: 6
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get win/loss analysis
      x-operation-id: get_win-loss
      x-controller: rerp_crm::reporting::controller::analytics::win-loss
      x-handler-name: analytics_win-loss
  /analytics/time-to-close:
    get:
      operationId: get_time_to_close
      summary: Get average close duration breakdown
      tags:
      - win-loss
      responses:
        '200':
          description: Time-to-close data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeToCloseAnalysis'
              examples:
                default:
                  avg_days: 45
                  median_days: 38
                  by_stage:
                    discovery: 10
                    qualified: 15
                    proposal: 12
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get time-to-close analytics
      x-operation-id: get_time-to-close
      x-controller: rerp_crm::reporting::controller::analytics::time-to-close
      x-handler-name: analytics_time-to-close
  /analytics/forecast/monthly:
    get:
      operationId: get_monthly_forecast
      summary: Get monthly revenue forecast
      tags:
      - forecast
      parameters:
      - name: team_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Monthly forecast
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedForecastentry'
              examples:
                default:
                  items:
                  - &id001
                    period: monthly
                    total_value: 420000
                    confidence: 0.75
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get monthly forecast
      x-operation-id: get_monthly
      x-controller: rerp_crm::reporting::controller::analytics::forecast::monthly
      x-handler-name: analytics_forecast_monthly
  /analytics/forecast/quarterly:
    get:
      operationId: get_quarterly_forecast
      summary: Get quarterly revenue forecast
      tags:
      - forecast
      responses:
        '200':
          description: Quarterly forecast
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedForecastentry'
              examples:
                default:
                  items:
                  - *id001
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get quarterly forecast
      x-operation-id: get_quarterly
      x-controller: rerp_crm::reporting::controller::analytics::forecast::quarterly
      x-handler-name: analytics_forecast_quarterly
  /analytics/forecast/accuracy:
    get:
      operationId: get_forecast_accuracy
      summary: Get forecast vs actual variance analysis
      tags:
      - forecast
      parameters:
      - name: period
        in: query
        schema:
          type: string
          enum:
          - WEEK
          - MONTH
          - QUARTER
      responses:
        '200':
          description: Forecast accuracy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedForecastAccuracyEntry'
              examples:
                default:
                  items:
                  - period: monthly
                    forecasted: 420000
                    actual: 405000
                    accuracy: 96.4
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get forecast accuracy metrics
      x-operation-id: get_accuracy
      x-controller: rerp_crm::reporting::controller::analytics::forecast::accuracy
      x-handler-name: analytics_forecast_accuracy
  /reports/build:
    post:
      operationId: build_report
      summary: Build a custom report with filters
      tags:
      - reports
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportBuildRequest'
            examples:
              default: &id002
                name: Monthly Pipeline Report
                type: pipeline
                schedule: monthly
      responses:
        '200':
          description: Report results
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_id:
                    type: string
                    format: uuid
                  data:
                    type: object
                  saved:
                    type: boolean
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Build a custom report
      x-operation-id: post_build
      x-controller: rerp_crm::reporting::controller::reports::build
      x-handler-name: reports_build
  /reports/{id}:
    get:
      operationId: get_saved_report
      summary: Get a saved report
      tags:
      - reports
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Saved report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedReport'
              examples:
                default:
                  id: 00000000-0000-0000-0000-000000000025
                  name: Monthly Pipeline Report
                  type: pipeline
                  created_at: '2024-01-15T10:30:00Z'
                  updated_at: '2024-01-15T10:30:00Z'
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get reports by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::reporting::controller::reports::id
      x-handler-name: reports_id
  /reports/{id}/schedule:
    post:
      operationId: schedule_report
      summary: Schedule a report for delivery
      tags:
      - reports
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportScheduleRequest'
            examples:
              default: *id002
      responses:
        '201':
          description: Report scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSchedule'
              examples:
                default:
                  id: 00000000-0000-0000-0000-000000000031
                  report_id: 00000000-0000-0000-0000-000000000025
                  frequency: monthly
                  next_run: '2024-02-01T00:00:00Z'
                  enabled: true
        '404':
          description: Not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Schedule a report to run on a recurring basis
      x-operation-id: post_schedule_by_id
      x-controller: rerp_crm::reporting::controller::reports::id::schedule
      x-handler-name: reports_id_schedule
  /reports/export:
    post:
      operationId: export_report
      summary: Export report data to CSV/JSON
      tags:
      - reports
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                report_id:
                  type: string
                  format: uuid
                format:
                  type: string
                  enum:
                  - CSV
                  - JSON
      responses:
        '200':
          description: Exported data
          content:
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                type: object
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Export report data to a file
      x-operation-id: post_export
      x-controller: rerp_crm::reporting::controller::reports::export
      x-handler-name: reports_export
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Search:
      name: search
      in: query
      schema:
        type: string
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    WeightedPipeline:
      type: object
      properties:
        by_team:
          type: array
          items:
            type: object
            properties:
              team_id:
                type: string
                format: uuid
              team_name:
                type: string
              count:
                type: integer
              weighted_revenue:
                type: number
                format: double
        by_user:
          type: array
          items:
            type: object
            properties:
              user_id:
                type: string
                format: uuid
              user_name:
                type: string
              weighted_revenue:
                type: number
                format: double
      required:
      - by_team
      - by_user
      description: Pipeline data with weighted values by stage
    ConversionRate:
      type: object
      properties:
        period:
          type: string
        leads_created:
          type: integer
        opportunities_created:
          type: integer
        opportunities_won:
          type: integer
        opportunities_lost:
          type: integer
        lead_to_opp_rate:
          type: number
          format: float
        opp_to_won_rate:
          type: number
          format: float
        overall_conversion_rate:
          type: number
          format: float
        total_won_revenue:
          type: number
          format: double
      required:
      - period
      - leads_created
      - opportunities_created
      - opportunities_won
      - opportunities_lost
      - lead_to_opp_rate
      - opp_to_won_rate
      - overall_conversion_rate
      - total_won_revenue
      description: Conversion rate analytics with breakdown by source
    FunnelData:
      type: object
      properties:
        stages:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
              revenue:
                type: number
                format: double
              conversion_from_previous:
                type: number
                format: float
      required:
      - stages
      description: Sales funnel data showing conversion between stages
    RepPerformance:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        user_name:
          type: string
        team_id:
          type: string
          format: uuid
        period:
          type: string
        leads_created:
          type: integer
        opportunities_active:
          type: integer
        opportunities_won:
          type: integer
        opportunities_lost:
          type: integer
        revenue_expected:
          type: number
          format: double
        revenue_won:
          type: number
          format: double
        weighted_pipeline:
          type: number
          format: double
        avg_deal_size:
          type: number
          format: double
        avg_sales_cycle_days:
          type: number
          format: float
        quota_attainment:
          type: number
          format: float
        activity_count:
          type: integer
      required:
      - user_id
      - user_name
      - team_id
      - period
      - leads_created
      - opportunities_active
      - opportunities_won
      - opportunities_lost
      - revenue_expected
      - revenue_won
      - weighted_pipeline
      - avg_deal_size
      - avg_sales_cycle_days
      - quota_attainment
      - activity_count
      description: Sales representative performance metrics
    TeamPerformance:
      type: object
      properties:
        team_id:
          type: string
          format: uuid
        team_name:
          type: string
        member_count:
          type: integer
        total_opportunities:
          type: integer
        total_revenue:
          type: number
          format: double
        weighted_revenue:
          type: number
          format: double
        win_rate:
          type: number
          format: float
      required:
      - team_id
      - team_name
      - member_count
      - total_opportunities
      - total_revenue
      - weighted_revenue
      - win_rate
      description: Team-level performance metrics
    WinLossAnalysis:
      type: object
      properties:
        period:
          type: string
        total_closed:
          type: integer
        won_count:
          type: integer
        lost_count:
          type: integer
        win_rate:
          type: number
          format: float
        revenue_won:
          type: number
          format: double
        lost_reasons:
          type: array
          items:
            type: object
            properties:
              reason_name:
                type: string
              count:
                type: integer
              percentage:
                type: number
                format: float
              revenue_impact:
                type: number
                format: double
      required:
      - period
      - total_closed
      - won_count
      - lost_count
      - win_rate
      - revenue_won
      - lost_reasons
      description: Win/loss analysis with breakdown by reason
    TimeToCloseAnalysis:
      type: object
      properties:
        overall_avg_days:
          type: number
          format: float
        by_stage:
          type: array
          items:
            type: object
            properties:
              stage_name:
                type: string
                avg_days:
                  type: number
                  format: float
        by_source:
          type: array
          items:
            type: object
            properties:
              source_name:
                type: string
              avg_days:
                type: number
                format: float
      required:
      - overall_avg_days
      - by_stage
      - by_source
      description: Time-to-close analysis by pipeline stage
    ForecastEntry:
      type: object
      properties:
        period:
          type: string
          description: Month/quarter string (e.g., "2026-06")
        weighted_pipeline:
          type: number
          format: double
        expected_close_revenue:
          type: number
          format: double
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 100
        actual_close_revenue:
          type: number
          format: double
        variance:
          type: number
          format: double
      required:
      - period
      - weighted_pipeline
      - expected_close_revenue
      - confidence
      - actual_close_revenue
      - variance
      description: A single forecast entry for a period
    ReportBuildRequest:
      type: object
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - PIPELINE
          - CONVERSION
          - PERFORMANCE
          - WIN_LOSS
          - FORECAST
          - CUSTOM
        filters:
          type: object
          description: Filter criteria
        group_by:
          type: array
          items:
            type: string
        saved:
          type: boolean
          default: false
    SavedReport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        filters:
          type: object
        data:
          type: object
        created_at:
          type: string
          format: date-time
      required:
      - name
      - type
    ReportScheduleRequest:
      type: object
      required:
      - frequency
      - recipient_ids
      properties:
        frequency:
          type: string
          enum:
          - DAILY
          - WEEKLY
          - MONTHLY
        recipient_ids:
          type: array
          items:
            type: string
            format: uuid
        schedule:
          type: string
          description: Cron expression
    ReportSchedule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        report_id:
          type: string
          format: uuid
        frequency:
          type: string
        recipient_ids:
          type: array
          items:
            type: string
            format: uuid
        is_active:
          type: boolean
        last_sent:
          type: string
          format: date-time
      required:
      - report_id
      - frequency
      - recipient_ids
      - is_active
      - last_sent
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      description: A generic paginated response wrapper with items and pagination
        metadata
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: integer
          description: HTTP error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: string
          description: Additional error details
      description: An error response with code, message, and optional details
    PaginatedPipelinesummary:
      type: object
      required:
      - total_opportunities
      - total_revenue
      - total_weighted_revenue
      - stages
      properties:
        total_opportunities:
          type: integer
        total_revenue:
          type: number
          format: double
        total_weighted_revenue:
          type: number
          format: double
        stages:
          type: array
          items:
            type: object
            properties:
              stage_id:
                type: string
                format: uuid
              stage_name:
                type: string
              count:
                type: integer
              total_revenue:
                type: number
                format: double
              weighted_revenue:
                type: number
                format: double
              avg_days_in_stage:
                type: number
                format: float
    PaginatedConversionrate:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/ConversionRate'
    PaginatedForecastentry:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/ForecastEntry'
    LeadSourceReport:
      type: object
      required:
      - source_id
      - source_name
      - lead_count
      - opportunities
      - won_deals
      - revenue
      - win_rate
      properties:
        source_id:
          type: string
          format: uuid
        source_name:
          type: string
        lead_count:
          type: integer
        opportunities:
          type: integer
        won_deals:
          type: integer
        revenue:
          type: number
          format: double
        win_rate:
          type: number
          format: float
      description: Lead source attribution report with counts by channel
    LeaderboardEntry:
      type: object
      required:
      - user_id
      - user_name
      - rank
      - value
      properties:
        user_id:
          type: string
          format: uuid
        user_name:
          type: string
        rank:
          type: integer
        value:
          type: number
          format: double
      description: A leaderboard entry with ranking and metrics
    ForecastAccuracyEntry:
      type: object
      required:
      - period
      - expected
      - actual
      - variance
      - variance_pct
      properties:
        period:
          type: string
        expected:
          type: number
          format: double
        actual:
          type: number
          format: double
        variance:
          type: number
          format: double
        variance_pct:
          type: number
          format: float
      description: Forecast accuracy comparison (forecasted vs actual)
    PaginatedLeadSourceReport:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/LeadSourceReport'
    PaginatedLeaderboardEntry:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/LeaderboardEntry'
    PaginatedForecastAccuracyEntry:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/ForecastAccuracyEntry'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
