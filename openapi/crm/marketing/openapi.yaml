openapi: 3.1.0
info:
  title: CRM Marketing Integration
  version: 1.0.0
  description: Campaign tracking, web forms, visitor analytics, events, and surveys.
servers:
- url: http://localhost:10352/api/v1/crm/marketing
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/crm/marketing
  description: Marketing API
tags:
- name: utm
  description: Campaign, medium, and source tracking
- name: forms
  description: Public web form capture
- name: visitors
  description: Anonymous visitor tracking
- name: campaigns
  description: Campaign reporting and attribution
- name: events
  description: Event registration tracking
- name: surveys
  description: Survey response tracking
paths:
  /utm/campaigns:
    get:
      operationId: list_utms_campaigns
      summary: List all campaigns
      tags:
      - utm
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_active
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: List of campaigns
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUTMCampaign'
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      description: List all utm
    post:
      operationId: create_utms_campaign
      summary: Create a new UTM campaign
      tags:
      - utm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUTMCampaignRequest'
      responses:
        '201':
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UTMCampaign'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new utm
  /utm/campaigns/{id}:
    get:
      operationId: get_utms_campaign
      summary: Get UTM campaign by id
      tags:
      - utm
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UTMCampaign'
        '404':
          description: Not found
      security:
      - bearerAuth: []
      description: Get utm by ID
    put:
      operationId: update_utms_campaign
      summary: Update UTM campaign
      tags:
      - utm
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUTMCampaignRequest'
      responses:
        '200':
          description: Campaign updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UTMCampaign'
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update utm by ID
    delete:
      operationId: delete_utms_campaign
      summary: Soft-delete UTM campaign
      tags:
      - utm
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Campaign deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
      description: Delete utm by ID
  /utm/mediums:
    get:
      operationId: list_utms_mediums
      summary: List all UTM mediums
      tags:
      - utm
      responses:
        '200':
          description: List of mediums
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUTMMedium'
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      description: List all utm
    post:
      operationId: create_utms_medium
      summary: Create a new UTM medium
      tags:
      - utm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUTMMediumRequest'
      responses:
        '201':
          description: Medium created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UTMMedium'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new utm
  /utm/sources:
    get:
      operationId: list_utms_sources
      summary: List all UTM sources
      tags:
      - utm
      responses:
        '200':
          description: List of sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUTMSource'
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      description: List all utm
    post:
      operationId: create_utms_source
      summary: Create a new UTM source
      tags:
      - utm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUTMSourceRequest'
      responses:
        '201':
          description: Source created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UTMSource'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new utm
  /forms/{id}:
    post:
      operationId: submit_form
      summary: Public form submission — creates a lead automatically
      tags:
      - forms
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormSubmissionRequest'
      responses:
        '201':
          description: Lead created from form
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormSubmissionResult'
        '400':
          description: Validation failed
        '404':
          description: Form not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Perform an action on forms
  /forms/{id}/config:
    get:
      operationId: get_form_config
      summary: Get form configuration for embedding
      tags:
      - forms
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Form configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebForm'
        '404':
          description: Not found
      security:
      - bearerAuth: []
      description: Get web form configuration
  /analytics/track:
    post:
      operationId: track_page_view
      summary: Track a page view for an anonymous visitor
      tags:
      - visitors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackPageViewRequest'
      responses:
        '201':
          description: Page view tracked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitorTracking'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Track visitor activity on a page
  /analytics/visitors:
    get:
      operationId: list_visitors
      summary: List visitor tracking records
      tags:
      - visitors
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_converted
        in: query
        schema:
          type: boolean
      - name: filter_country
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Visitor tracking data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVisitorTracking'
      security:
      - bearerAuth: []
      description: List all analytics
  /analytics/visitors/identify:
    post:
      operationId: identify_visitor
      summary: Identify an anonymous visitor by email
      tags:
      - visitors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentifyVisitorRequest'
      responses:
        '200':
          description: Visitor identified
          content:
            application/json:
              schema:
                type: object
                properties:
                  visitor_id:
                    type: string
                  identified:
                    type: boolean
                  lead_id:
                    type: string
                    format: uuid
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Identify a visitor by their session
  /campaigns/{id}/leads:
    get:
      operationId: get_campaign_leads
      summary: Get leads generated by a campaign
      tags:
      - campaigns
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Campaign leads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCampaignLeadResult'
      security:
      - bearerAuth: []
      description: Get leads associated with a campaign
  /campaigns/{id}/revenue:
    get:
      operationId: get_campaign_revenue
      summary: Get revenue attributed to a campaign
      tags:
      - campaigns
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: start_date
        in: query
        schema:
          type: string
          format: date
      - name: end_date
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Campaign revenue
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_revenue:
                    type: number
                    format: double
                  total_opportunities:
                    type: integer
                  total_won_deals:
                    type: integer
                  average_deal_size:
                    type: number
                    format: double
      security:
      - bearerAuth: []
      description: Get revenue attributed to a campaign
  /events/register:
    post:
      operationId: register_event
      summary: Register attendee for an event (creates lead)
      tags:
      - events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRegistrationRequest'
      responses:
        '201':
          description: Event registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventRegistration'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Register for an event
  /events/{id}/registrations:
    get:
      operationId: get_event_registrations
      summary: Get registrations for an event
      tags:
      - events
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Event registrations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventRegistration'
      security:
      - bearerAuth: []
      description: Get event registrations
  /surveys/submit:
    post:
      operationId: submit_survey
      summary: Submit a survey response (may create lead)
      tags:
      - surveys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SurveyResponseRequest'
      responses:
        '201':
          description: Survey submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SurveyResponse'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Submit a survey response
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Search:
      name: search
      in: query
      schema:
        type: string
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    UTMCampaign:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        active:
          type: boolean
          default: true
        sequence:
          type: integer
        company_id:
          type: string
          format: uuid
    CreateUTMCampaignRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        active:
          type: boolean
        sequence:
          type: integer
    UpdateUTMCampaignRequest:
      type: object
      properties:
        name:
          type: string
        active:
          type: boolean
        sequence:
          type: integer
      required:
      - name
      - active
      - sequence
    UTMMedium:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 64
        active:
          type: boolean
          default: true
    CreateUTMMediumRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        active:
          type: boolean
    UTMSource:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 64
        medium_id:
          type: string
          format: uuid
        active:
          type: boolean
          default: true
    CreateUTMSourceRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        medium_id:
          type: string
          format: uuid
        active:
          type: boolean
    WebForm:
      type: object
      required:
      - id
      - name
      - capture_fields
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        redirect_url:
          type: string
        is_active:
          type: boolean
          default: true
        capture_fields:
          type: object
          description: Schema of fields to capture (key-value definitions)
        team_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        utm_source_id:
          type: string
          format: uuid
        utm_medium_id:
          type: string
          format: uuid
        utm_campaign_id:
          type: string
          format: uuid
        consent_required:
          type: boolean
          default: false
        consent_text:
          type: string
        api_endpoint:
          type: string
          readOnly: true
        embed_code:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
    FormSubmissionRequest:
      type: object
      required:
      - fields
      properties:
        fields:
          type: object
          description: Form field values matching capture_fields schema
        consent_given:
          type: boolean
          description: GDPR consent checkbox
        visitor_id:
          type: string
          description: Anonymous visitor ID (from cookie)
    FormSubmissionResult:
      type: object
      properties:
        lead_id:
          type: string
          format: uuid
        contact_id:
          type: string
          format: uuid
        form_id:
          type: string
          format: uuid
        redirect_url:
          type: string
      required:
      - lead_id
      - contact_id
      - form_id
      - redirect_url
    VisitorTracking:
      type: object
      required:
      - id
      - visitor_id
      - first_seen
      properties:
        id:
          type: string
          format: uuid
        visitor_id:
          type: string
        url_visited:
          type: string
        referrer:
          type: string
        user_agent:
          type: string
        country:
          type: string
        city:
          type: string
        first_seen:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time
        pages_viewed:
          type: integer
        converted_to_lead:
          type: boolean
        lead_id:
          type: string
          format: uuid
    TrackPageViewRequest:
      type: object
      required:
      - visitor_id
      - url_visited
      properties:
        visitor_id:
          type: string
        url_visited:
          type: string
        referrer:
          type: string
        user_agent:
          type: string
        ip_address:
          type: string
    IdentifyVisitorRequest:
      type: object
      required:
      - visitor_id
      - email
      properties:
        visitor_id:
          type: string
        email:
          type: string
          format: email
    EventRegistrationRequest:
      type: object
      required:
      - event_name
      - attendee_name
      - attendee_email
      properties:
        event_name:
          type: string
        event_date:
          type: string
          format: date-time
        attendee_name:
          type: string
        attendee_email:
          type: string
          format: email
        attendee_phone:
          type: string
        attendee_company:
          type: string
        attendee_function:
          type: string
        source:
          type: string
          default: web
    EventRegistration:
      type: object
      required:
      - id
      - event_name
      - attendee_email
      properties:
        id:
          type: string
          format: uuid
        event_name:
          type: string
        event_date:
          type: string
          format: date-time
        attendee_name:
          type: string
        attendee_email:
          type: string
        attendee_company:
          type: string
        attendee_phone:
          type: string
        attendee_function:
          type: string
        lead_id:
          type: string
          format: uuid
        source:
          type: string
        attended:
          type: boolean
        registration_date:
          type: string
          format: date-time
    SurveyResponseRequest:
      type: object
      required:
      - survey_name
      - responses
      properties:
        survey_name:
          type: string
        respondent_name:
          type: string
        respondent_email:
          type: string
          format: email
        responses:
          type: object
          description: All survey answers as key-value pairs
    SurveyResponse:
      type: object
      required:
      - id
      - survey_name
      - respondent_email
      properties:
        id:
          type: string
          format: uuid
        survey_name:
          type: string
        respondent_email:
          type: string
        respondent_name:
          type: string
        responses:
          type: object
        lead_id:
          type: string
          format: uuid
        response_date:
          type: string
          format: date-time
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: integer
          description: HTTP error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: string
          description: Additional error details
    PaginatedEventRegistration:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/EventRegistration'
    PaginatedUTMCampaign:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/UTMCampaign'
    PaginatedUTMMedium:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/UTMMedium'
    PaginatedUTMSource:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/UTMSource'
    PaginatedVisitorTracking:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/VisitorTracking'
    CampaignLeadResult:
      type: object
      required:
      - lead_id
      - lead_name
      - created_at
      properties:
        lead_id:
          type: string
          format: uuid
        lead_name:
          type: string
        created_at:
          type: string
          format: date-time
    PaginatedCampaignLeadResult:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/CampaignLeadResult'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
