openapi: 3.1.0
info:
  title: CRM Marketing Integration
  version: v1.0.0
  description: Campaign tracking, web forms, visitor analytics, events, and surveys.
  x-api-version: CRM Marketing API v1.0.0
  x-crm-api-version: v1.0.0
  termsOfService: https://rerp.example.com/terms
  contact:
    name: RERP API Support
    url: https://docs.rerp.com/support
    email: api-support@rerp.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  x-api-docs:
    service: marketing
    openapi_version: 3.1.0
    brrtrouter_version: latest
servers:
- url: http://localhost:10352/api/v1/crm/marketing
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/crm/marketing
  description: Marketing API
tags:
- name: campaigns
  description: Campaign reporting and attribution
- name: events
  description: Event registration tracking
- name: forms
  description: Public web form capture
- name: marketing-analytics
  description: Visitor tracking and analytics
- name: marketing-campaigns
  description: Campaign lead and revenue attribution
- name: marketing-events
  description: Event registration and management
- name: marketing-forms
  description: Marketing form management
- name: marketing-surveys
  description: Survey creation and response collection
- name: surveys
  description: Survey response tracking
- name: utm
  description: Campaign, medium, and source tracking
- name: utm-campaigns
  description: UTM campaign management
- name: utm-mediums
  description: UTM medium definitions
- name: utm-sources
  description: UTM source definitions
- name: visitors
  description: Anonymous visitor tracking
paths:
  /utm/campaigns:
    get:
      operationId: list_utms_campaigns
      summary: List all campaigns
      tags:
      - utm
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_active
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: List of campaigns
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUTMCampaign'
              examples:
                default:
                  items:
                  - id: 00000000-0000-0000-0000-000000000017
                    name: Q1 Marketing
                    status: active
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all utm
      x-operation-id: get_campaigns
      x-controller: rerp_crm::marketing::controller::utm::campaigns
      x-handler-name: utm_campaigns
    post:
      operationId: create_utms_campaign
      summary: Create a new UTM campaign
      tags:
      - utm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUTMCampaignRequest'
            examples:
              default: &id002
                name: Q1 Marketing Campaign
                type: email
        description: Create a new UTM campaign
      responses:
        '201':
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UTMCampaign'
              examples:
                default: &id001
                  id: 00000000-0000-0000-0000-000000000017
                  name: Q1 Marketing
                  type: email
                  status: active
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new utm
      x-operation-id: post_campaigns
      x-controller: rerp_crm::marketing::controller::utm::campaigns
      x-handler-name: utm_campaigns
  /utm/campaigns/{id}:
    get:
      operationId: get_utms_campaign
      summary: Get UTM campaign by id
      tags:
      - utm
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UTMCampaign'
              examples:
                default: *id001
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get utm by ID
      x-operation-id: get_id_by_id
      x-controller: rerp_crm::marketing::controller::utm::campaigns::id
      x-handler-name: utm_campaigns_id
    put:
      operationId: update_utms_campaign
      summary: Update UTM campaign
      tags:
      - utm
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUTMCampaignRequest'
            examples:
              default: *id002
        description: Update a UTM campaign
      responses:
        '200':
          description: Campaign updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UTMCampaign'
              examples:
                default: *id001
        '400':
          description: Invalid request
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — resource version mismatch or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Resource updated successfully
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Update utm by ID
      x-operation-id: put_id_by_id
      x-controller: rerp_crm::marketing::controller::utm::campaigns::id
      x-handler-name: utm_campaigns_id
    delete:
      operationId: delete_utms_campaign
      summary: Soft-delete UTM campaign
      tags:
      - utm
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Campaign deleted
        '404':
          description: Not found
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Delete utm by ID
      x-operation-id: delete_id_by_id
      x-controller: rerp_crm::marketing::controller::utm::campaigns::id
      x-handler-name: utm_campaigns_id
  /utm/mediums:
    get:
      operationId: list_utms_mediums
      summary: List all UTM mediums
      tags:
      - utm
      responses:
        '200':
          description: List of mediums
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUTMMedium'
              examples:
                default:
                  items:
                  - id: 00000000-0000-0000-0000-000000000036
                    name: email
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all utm
      x-operation-id: get_mediums
      x-controller: rerp_crm::marketing::controller::utm::mediums
      x-handler-name: utm_mediums
    post:
      operationId: create_utms_medium
      summary: Create a new UTM medium
      tags:
      - utm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUTMMediumRequest'
            examples:
              default:
                name: email
                description: Email marketing medium
        description: Create a new UTM medium type
      responses:
        '201':
          description: Medium created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UTMMedium'
              examples:
                default:
                  id: 00000000-0000-0000-0000-000000000036
                  name: email
                  description: Email marketing medium
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new utm
      x-operation-id: post_mediums
      x-controller: rerp_crm::marketing::controller::utm::mediums
      x-handler-name: utm_mediums
  /utm/sources:
    get:
      operationId: list_utms_sources
      summary: List all UTM sources
      tags:
      - utm
      responses:
        '200':
          description: List of sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUTMSource'
              examples:
                default:
                  items:
                  - id: 00000000-0000-0000-0000-000000000037
                    name: newsletter
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all utm
      x-operation-id: get_sources
      x-controller: rerp_crm::marketing::controller::utm::sources
      x-handler-name: utm_sources
    post:
      operationId: create_utms_source
      summary: Create a new UTM source
      tags:
      - utm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUTMSourceRequest'
            examples:
              default:
                name: newsletter
                description: Newsletter traffic source
        description: Create a new UTM source type
      responses:
        '201':
          description: Source created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UTMSource'
              examples:
                default:
                  id: 00000000-0000-0000-0000-000000000037
                  name: newsletter
                  description: Newsletter traffic source
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Create a new utm
      x-operation-id: post_sources
      x-controller: rerp_crm::marketing::controller::utm::sources
      x-handler-name: utm_sources
  /forms/{id}:
    post:
      operationId: submit_form
      summary: Public form submission — creates a lead automatically
      tags:
      - forms
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormSubmissionRequest'
        description: Submit a marketing form to capture lead information
      responses:
        '201':
          description: Lead created from form
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormSubmissionResult'
              examples:
                default:
                  form_id: 00000000-0000-0000-0000-000000000030
                  submitted: true
                  lead_id: 00000000-0000-0000-0000-000000000001
                  submitted_at: '2024-01-15T10:30:00Z'
        '400':
          description: Validation failed
        '404':
          description: Form not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Perform an action on forms
      x-operation-id: post_id_by_id
      x-controller: rerp_crm::marketing::controller::forms::id
      x-handler-name: forms_id
  /forms/{id}/config:
    get:
      operationId: get_form_config
      summary: Get form configuration for embedding
      tags:
      - forms
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Form configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebForm'
              examples:
                default:
                  id: 00000000-0000-0000-0000-000000000030
                  name: Contact Us Form
                  fields:
                  - name
                  - email
                  - message
                  enabled: true
        '404':
          description: Not found
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      description: Get web form configuration
      x-operation-id: get_config_by_id
      x-controller: rerp_crm::marketing::controller::forms::id::config
      x-handler-name: forms_id_config
  /analytics/track:
    post:
      operationId: track_page_view
      summary: Track a page view for an anonymous visitor
      tags:
      - visitors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackPageViewRequest'
        description: Track a visitor page view
      responses:
        '201':
          description: Page view tracked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitorTracking'
              examples:
                default:
                  id: 00000000-0000-0000-0000-000000000035
                  visitor_id: 00000000-0000-0000-0000-000000000014
                  page: /pricing
                  duration: 45
                  timestamp: '2024-01-15T10:30:00Z'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Track visitor activity on a page
      x-operation-id: post_track
      x-controller: rerp_crm::marketing::controller::analytics::track
      x-handler-name: analytics_track
  /analytics/visitors:
    get:
      operationId: list_visitors
      summary: List visitor tracking records
      tags:
      - visitors
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      - name: filter_converted
        in: query
        schema:
          type: boolean
      - name: filter_country
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Visitor tracking data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVisitorTracking'
              examples:
                default:
                  items:
                  - id: 00000000-0000-0000-0000-000000000035
                    visitor_id: 00000000-0000-0000-0000-000000000014
                    page: /pricing
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: List all analytics
      x-operation-id: get_visitors
      x-controller: rerp_crm::marketing::controller::analytics::visitors
      x-handler-name: analytics_visitors
  /analytics/visitors/identify:
    post:
      operationId: identify_visitor
      summary: Identify an anonymous visitor by email
      tags:
      - visitors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentifyVisitorRequest'
        description: Identify a returning visitor
      responses:
        '200':
          description: Visitor identified
          content:
            application/json:
              schema:
                type: object
                properties:
                  visitor_id:
                    type: string
                  identified:
                    type: boolean
                  lead_id:
                    type: string
                    format: uuid
              examples:
                default: &id003
                  visitor_id: v001
                  identified: true
                  email: user@example.com
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
              examples:
                default: *id003
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '400':
          description: Bad request - Invalid request body or parameters
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Identify a visitor by their session
      x-operation-id: post_identify
      x-controller: rerp_crm::marketing::controller::analytics::visitors::identify
      x-handler-name: analytics_visitors_identify
  /campaigns/{id}/leads:
    get:
      operationId: get_campaign_leads
      summary: Get leads generated by a campaign
      tags:
      - campaigns
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Campaign leads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCampaignLeadResult'
              examples:
                default:
                  items:
                  - campaign_id: 00000000-0000-0000-0000-000000000017
                    lead_id: 00000000-0000-0000-0000-000000000001
                    converted: true
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get leads associated with a campaign
      x-operation-id: get_leads_by_id
      x-controller: rerp_crm::marketing::controller::campaigns::id::leads
      x-handler-name: campaigns_id_leads
  /campaigns/{id}/revenue:
    get:
      operationId: get_campaign_revenue
      summary: Get revenue attributed to a campaign
      tags:
      - campaigns
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: start_date
        in: query
        schema:
          type: string
          format: date
      - name: end_date
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Campaign revenue
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_revenue:
                    type: number
                    format: double
                  total_opportunities:
                    type: integer
                  total_won_deals:
                    type: integer
                  average_deal_size:
                    type: number
                    format: double
              examples:
                default:
                  campaign_id: 00000000-0000-0000-0000-000000000012
                  total_revenue: 25000
                  conversions: 15
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get revenue attributed to a campaign
      x-operation-id: get_revenue_by_id
      x-controller: rerp_crm::marketing::controller::campaigns::id::revenue
      x-handler-name: campaigns_id_revenue
  /events/register:
    post:
      operationId: register_event
      summary: Register attendee for an event (creates lead)
      tags:
      - events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRegistrationRequest'
            examples:
              default:
                event_id: 00000000-0000-0000-0000-000000000029
                contact_id: 00000000-0000-0000-0000-000000000002
        description: Register for an event
      responses:
        '201':
          description: Event registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventRegistration'
              examples:
                default:
                  id: 00000000-0000-0000-0000-000000000028
                  event_id: 00000000-0000-0000-0000-000000000029
                  contact_id: 00000000-0000-0000-0000-000000000002
                  registered_at: '2024-01-15T10:30:00Z'
                  status: confirmed
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Register for an event
      x-operation-id: post_register
      x-controller: rerp_crm::marketing::controller::events::register
      x-handler-name: events_register
  /events/{id}/registrations:
    get:
      operationId: get_event_registrations
      summary: Get registrations for an event
      tags:
      - events
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Event registrations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventRegistration'
              examples:
                default:
                  items:
                  - id: 00000000-0000-0000-0000-000000000028
                    event_id: 00000000-0000-0000-0000-000000000029
                    status: confirmed
                  total: 1
                  page: 1
                  per_page: 20
                  has_next: false
                  has_prev: false
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Resource not found
      security:
      - bearerAuth: []
      description: Get event registrations
      x-operation-id: get_registrations_by_id
      x-controller: rerp_crm::marketing::controller::events::id::registrations
      x-handler-name: events_id_registrations
  /surveys/submit:
    post:
      operationId: submit_survey
      summary: Submit a survey response (may create lead)
      tags:
      - surveys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SurveyResponseRequest'
        description: Submit a survey response
      responses:
        '201':
          description: Survey submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SurveyResponse'
              examples:
                default:
                  id: 00000000-0000-0000-0000-000000000032
                  survey_id: 00000000-0000-0000-0000-000000000033
                  contact_id: 00000000-0000-0000-0000-000000000002
                  score: 4
                  feedback: Great experience!
        '400':
          description: Invalid request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
      security:
      - bearerAuth: []
      x-brrtrouter-impl: true
      description: Submit a survey response
      x-operation-id: post_submit
      x-controller: rerp_crm::marketing::controller::surveys::submit
      x-handler-name: surveys_submit
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination (1-indexed)
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 'Maximum number of items per page (default: 20, max: 100)'
    Search:
      name: search
      in: query
      schema:
        type: string
      description: Search query string for filtering resources
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique identifier for the resource
  schemas:
    UTMCampaign:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        active:
          type: boolean
          default: true
        sequence:
          type: integer
        company_id:
          type: string
          format: uuid
      description: UTM campaign tracking parameters
    CreateUTMCampaignRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        active:
          type: boolean
        sequence:
          type: integer
      description: Request body for creating a new UTM campaign
    UpdateUTMCampaignRequest:
      type: object
      properties:
        name:
          type: string
        active:
          type: boolean
        sequence:
          type: integer
      required:
      - name
      - active
      - sequence
      description: Request body for updating an existing UTM campaign
    UTMMedium:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 64
        active:
          type: boolean
          default: true
      description: UTM medium type definition
    CreateUTMMediumRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        active:
          type: boolean
      description: Request body for creating a new UTM medium
    UTMSource:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 64
        medium_id:
          type: string
          format: uuid
        active:
          type: boolean
          default: true
      description: UTM source definition for traffic attribution
    CreateUTMSourceRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        medium_id:
          type: string
          format: uuid
        active:
          type: boolean
      description: Request body for creating a new UTM source
    WebForm:
      type: object
      required:
      - id
      - name
      - capture_fields
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        redirect_url:
          type: string
        is_active:
          type: boolean
          default: true
        capture_fields:
          type: object
          description: Schema of fields to capture (key-value definitions)
        team_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        utm_source_id:
          type: string
          format: uuid
        utm_medium_id:
          type: string
          format: uuid
        utm_campaign_id:
          type: string
          format: uuid
        consent_required:
          type: boolean
          default: false
        consent_text:
          type: string
        api_endpoint:
          type: string
          readOnly: true
        embed_code:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      description: A marketing form definition with its fields
    FormSubmissionRequest:
      type: object
      required:
      - fields
      properties:
        fields:
          type: object
          description: Form field values matching capture_fields schema
        consent_given:
          type: boolean
          description: GDPR consent checkbox
        visitor_id:
          type: string
          description: Anonymous visitor ID (from cookie)
      description: Request body for submitting a marketing form
    FormSubmissionResult:
      type: object
      properties:
        lead_id:
          type: string
          format: uuid
        contact_id:
          type: string
          format: uuid
        form_id:
          type: string
          format: uuid
        redirect_url:
          type: string
      required:
      - lead_id
      - contact_id
      - form_id
      - redirect_url
      description: Result of a marketing form submission
    VisitorTracking:
      type: object
      required:
      - id
      - visitor_id
      - first_seen
      properties:
        id:
          type: string
          format: uuid
        visitor_id:
          type: string
        url_visited:
          type: string
        referrer:
          type: string
        user_agent:
          type: string
        country:
          type: string
        city:
          type: string
        first_seen:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time
        pages_viewed:
          type: integer
        converted_to_lead:
          type: boolean
        lead_id:
          type: string
          format: uuid
      description: A visitor tracking record with page and session data
    TrackPageViewRequest:
      type: object
      required:
      - visitor_id
      - url_visited
      properties:
        visitor_id:
          type: string
        url_visited:
          type: string
        referrer:
          type: string
        user_agent:
          type: string
        ip_address:
          type: string
      description: Request body for tracking a visitor page view
    IdentifyVisitorRequest:
      type: object
      required:
      - visitor_id
      - email
      properties:
        visitor_id:
          type: string
        email:
          type: string
          format: email
      description: Request body for identifying a returning visitor
    EventRegistrationRequest:
      type: object
      required:
      - event_name
      - attendee_name
      - attendee_email
      properties:
        event_name:
          type: string
        event_date:
          type: string
          format: date-time
        attendee_name:
          type: string
        attendee_email:
          type: string
          format: email
        attendee_phone:
          type: string
        attendee_company:
          type: string
        attendee_function:
          type: string
        source:
          type: string
          default: web
      description: Request body for registering for an event
    EventRegistration:
      type: object
      required:
      - id
      - event_name
      - attendee_email
      properties:
        id:
          type: string
          format: uuid
        event_name:
          type: string
        event_date:
          type: string
          format: date-time
        attendee_name:
          type: string
        attendee_email:
          type: string
        attendee_company:
          type: string
        attendee_phone:
          type: string
        attendee_function:
          type: string
        lead_id:
          type: string
          format: uuid
        source:
          type: string
        attended:
          type: boolean
        registration_date:
          type: string
          format: date-time
      description: An event registration record
    SurveyResponseRequest:
      type: object
      required:
      - survey_name
      - responses
      properties:
        survey_name:
          type: string
        respondent_name:
          type: string
        respondent_email:
          type: string
          format: email
        responses:
          type: object
          description: All survey answers as key-value pairs
      description: Request body for submitting a survey response
    SurveyResponse:
      type: object
      required:
      - id
      - survey_name
      - respondent_email
      properties:
        id:
          type: string
          format: uuid
        survey_name:
          type: string
        respondent_email:
          type: string
        respondent_name:
          type: string
        responses:
          type: object
        lead_id:
          type: string
          format: uuid
        response_date:
          type: string
          format: date-time
      description: A survey response with answers and feedback
    PaginatedResponse:
      type: object
      required:
      - total
      - page
      - limit
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      description: A generic paginated response wrapper with items and pagination
        metadata
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: integer
          description: HTTP error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: string
          description: Additional error details
      description: An error response with code, message, and optional details
    PaginatedEventRegistration:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/EventRegistration'
      description: Paginated list of EventRegistration records
    PaginatedUTMCampaign:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/UTMCampaign'
      description: Paginated list of UTMCampaign records
    PaginatedUTMMedium:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/UTMMedium'
      description: Paginated list of UTMMedium records
    PaginatedUTMSource:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/UTMSource'
      description: Paginated list of UTMSource records
    PaginatedVisitorTracking:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/VisitorTracking'
      description: Paginated list of VisitorTracking records
    CampaignLeadResult:
      type: object
      required:
      - lead_id
      - lead_name
      - created_at
      properties:
        lead_id:
          type: string
          format: uuid
        lead_name:
          type: string
        created_at:
          type: string
          format: date-time
      description: A lead result attributed to a campaign
    PaginatedCampaignLeadResult:
      allOf:
      - $ref: '#/components/schemas/PaginatedResponse'
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/CampaignLeadResult'
      description: Paginated list of CampaignLeadResult records
  securitySchemes:
    bearerAuth:
      type: http
