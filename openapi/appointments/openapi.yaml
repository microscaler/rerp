        '500':
          description: Internal server error
      x-service: core
      x-service-base-path: /api/v1/appointments/core
      description: List availability windows with pagination and optional search
      security:
      - bearerAuth: []
      tags:
      - availability
      x-brrtrouter-impl: list_availabilitys_handler
      x-operation-id: list_availabilitys
      x-controller: AvailabilityController
      x-handler-name: list_availabilitys
    post:
      operationId: create_availability
