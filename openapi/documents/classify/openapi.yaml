openapi: 3.1.0
info:
  title: Document Classification
  version: 1.0.0
  description: AI document classification service for the Documents suite. Detects document type and maps to RERP modules.
servers:
- url: /api/v1/documents/classify
  description: Document Classification API
tags:
- name: classify
  description: Document classification operations
- name: classifiers
  description: Custom classifier management
paths:
  /documents/{id}/classify:
    post:
      operationId: classify_document
      summary: Submit document for classification
      description: Asynchronously classify a document. Returns a ClassificationJob that can be polled via GET /classifications/{job_id}. If a classification already exists for this document, returns it immediately with 200.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassifyRequest'
      responses:
        '200':
          description: Classification result returned (cached, existing result found)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Classification'
        '202':
          description: Classification job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationJob'
        '404':
          description: Document not found
        '400':
          description: Invalid request
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds to wait before retrying
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
      - classify
  /classifications/{id}:
    get:
      operationId: get_classification_result
      summary: Get classification job status or result
      description: Poll a classification job by ID. Returns the job status or the final Classification if processing is complete.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Classification job result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationJob'
        '404':
          description: Job not found
      tags:
      - classify
  /documents/{id}/classification:
    get:
      operationId: get_classification
      summary: Get existing classification result for a document
      description: Returns the most recent classification result for a document. If no classification exists, returns 404. This is a cached lookup, not a re-classification.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Classification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Classification'
        '404':
          description: No classification found
      tags:
      - classify
  /classifiers:
    get:
      operationId: list_classifiers
      summary: List custom classifiers
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of classifiers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassifiersListResponse'
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
      - classifiers
    post:
      operationId: create_classifier
      summary: Create a custom classifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassifierDef'
      responses:
        '201':
          description: Classifier created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Classifier'
        '400':
          description: Invalid request
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
      - classifiers
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Search:
      name: search
      in: query
      schema:
        type: string
  schemas:
    ClassifyRequest:
      type: object
      properties:
        org_id:
          type: string
          format: uuid
          description: Organization ID for RLS
        classifier_id:
          type: string
          format: uuid
          nullable: true
          description: Optional custom classifier ID; if omitted uses default
    Classification:
      type: object
      required:
      - id
      - document_id
      - document_type
      - confidence
      - created_at
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        document_type:
          type: string
          description: Classified document type (e.g. invoice, resume, contract)
        confidence:
          type: number
          format: decimal
          description: Classification confidence (0.0-1.0)
        classifier_id:
          type: string
          format: uuid
          nullable: true
          description: Classifier used
        rerp_module:
          type: string
          nullable: true
          description: Target RERP module (e.g. accounts-payable, hr-recruitment)
        created_at:
          type: string
          format: date-time
    ClassificationJob:
      type: object
      required:
      - id
      - document_id
      - status
      - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Job ID for polling via GET /classifications/{id}
        document_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, processing, complete, failed]
        classifier_id:
          type: string
          format: uuid
          nullable: true
        result:
          nullable: true
          $ref: '#/components/schemas/Classification'
          description: Final classification result (available when status is complete)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true
    Classifier:
      type: object
      required:
      - id
      - org_id
      - name
      - created_at
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        name:
          type: string
        model:
          type: string
          description: ML model identifier
        labels:
          type: array
          items:
            type: string
          description: Supported document type labels
        model_params:
          type: object
          nullable: true
          description: Model configuration parameters
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true
    ClassifierDef:
      type: object
      required:
      - org_id
      - name
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: Omitted to create new; include to update
        org_id:
          type: string
          format: uuid
        name:
          type: string
        model:
          type: string
        labels:
          type: array
          items:
            type: string
        model_params:
          type: object
          nullable: true
    ClassifiersListResponse:
      type: object
      required:
      - items
      - total
      - page
      - limit
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Classifier'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    Error:
      type: object
      required:
      - error
      - message
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          nullable: true
          additionalProperties: true
