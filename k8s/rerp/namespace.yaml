---
# RERP application namespace — managed by this repository's Tiltfile.
# Services connect to platform infrastructure in namespace `data`
# (PostgreSQL, Redis and MinIO) and
# `observability` (prometheus, grafana, loki, jaeger).
apiVersion: v1
kind: Namespace
metadata:
  name: rerp
  labels:
    app: rerp
    managed-by: tilt
