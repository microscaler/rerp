          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralLedgerErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralLedgerErrorResponse'
