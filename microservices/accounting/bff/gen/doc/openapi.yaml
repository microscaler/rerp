      description: List all approval records with filtering by invoice, approver, and status.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: invoice_id
        in: query
        schema:
          type: string
          format: uuid
      - name: approver_id
        in: query
        schema:
          type: string
          format: uuid
      - name: action
