          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableApprovalRecord'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableErrorResponse'
        '403':
