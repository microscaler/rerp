        in: query
        schema:
          type: string
        description: Search by entry number, reference, or description
      - name: status
        in: query
        schema:
          type: string
          enum:
          - DRAFT
          - APPROVED
          - POSTED
          - REVERSED
        description: Filter by entry status
      - name: journal_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by journal
      - name: account_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by account (returns entries containing this account)
      - name: date_from
        in: query
        schema:
          type: string
          format: date
        description: Filter entries from this date (inclusive)
      - name: date_to
        in: query
        schema:
          type: string
          format: date
        description: Filter entries up to this date (inclusive)
      - name: fiscal_period_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by fiscal period
      - name: currency_code
        in: query
        schema:
          type: string
          minLength: 3
          maxLength: 3
