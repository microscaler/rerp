  /general-ledger/journal-entries:
    get:
      operationId: list_journal_entries
      summary: List journal entries
      description: Paginated list of all journal entries with optional filtering by status, date range, journal, account,
        and fiscal period.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
