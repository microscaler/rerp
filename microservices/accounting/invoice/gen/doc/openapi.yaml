openapi: 3.0.3
info:
  title: RERP Customer Invoicing API
  version: 0.2.0
  description: >-
    Canonical Phase 1 customer invoicing contract. Commands accept commercial facts only;
    authenticated tenant, legal entity, fiscal period, numbering, and GL account
    policy are resolved inside RERP.
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - name: customer-invoices
paths:
  /v1/customer-invoices:
    post:
      operationId: post_customer_invoice
      tags: [customer-invoices]
      summary: Issue and post a customer invoice atomically
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCustomerInvoiceRequest'
      responses:
        '201':
          description: A new invoice and balanced journal were committed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostingResult'
        '200':
          description: An identical idempotent request returned the committed result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostingResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
  /v1/customer-invoices/{id}:
    parameters:
      - $ref: '#/components/parameters/DocumentId'
    get:
      operationId: get_customer_invoice
      tags: [customer-invoices]
      summary: Retrieve a posted customer invoice
      x-brrtrouter-impl: true
      responses:
        '200':
          description: Posted invoice with immutable line snapshots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostedInvoice'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/customer-invoices/{id}/journal:
    parameters:
      - $ref: '#/components/parameters/DocumentId'
    get:
      operationId: get_customer_invoice_journal
      tags: [customer-invoices]
      summary: Retrieve the balanced journal produced for an invoice
      x-brrtrouter-impl: true
      responses:
        '200':
          description: Balanced journal and immutable lines
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostedJournal'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/customer-invoices/{id}/document:
    parameters:
      - $ref: '#/components/parameters/DocumentId'
    get:
      operationId: get_customer_invoice_document
      tags: [customer-invoices]
      summary: Retrieve immutable PDF metadata and a short-lived download URL
      description: >-
        Materialises the deterministic PDF on first access, stores it in private
        content-addressed object storage and returns a five-minute signed URL.
      x-brrtrouter-impl: true
      responses:
        '200':
          description: Immutable PDF artifact and temporary download capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderedDocument'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/customer-invoices/{id}/credit-notes:
    parameters:
      - $ref: '#/components/parameters/DocumentId'
    post:
      operationId: credit_customer_invoice
      tags: [customer-invoices]
      summary: Post a full credit note which reverses a customer invoice
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreditCustomerInvoiceRequest'
      responses:
        '201':
          description: Credit note and reversal journal committed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostingResult'
        '200':
          description: Identical idempotent retry returned the committed result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostingResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Sesame access token validated by BRRTRouter
  parameters:
    DocumentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Invalid request syntax or value
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unavailable:
      description: Rendered-document storage is temporarily unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication is required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated identity context is incomplete or inconsistent
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource does not exist in the authenticated tenant
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Idempotency key or source reference conflicts with existing facts
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unprocessable:
      description: Accounting policy rejected the otherwise valid command
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    SourceReference:
      type: object
      required: [system, resource_type, resource_id]
      properties:
        system:
          type: string
          minLength: 1
          maxLength: 100
          example: hauliage
        resource_type:
          type: string
          minLength: 1
          maxLength: 100
          example: delivery
        resource_id:
          type: string
          minLength: 1
          maxLength: 255
          example: delivery-123
    TaxFact:
      type: object
      required: [code, rate_percent]
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 100
        rate_percent:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
    CustomerInvoiceLine:
      type: object
      required: [description, quantity, unit_price]
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 1000
        quantity:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        unit_price:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        discount_percent:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
          default: '0'
        tax:
          allOf:
            - $ref: '#/components/schemas/TaxFact'
          nullable: true
    PostCustomerInvoiceRequest:
      type: object
      required:
        - idempotency_key
        - source
        - customer_id
        - invoice_date
        - due_date
        - currency_code
        - lines
      properties:
        idempotency_key:
          type: string
          minLength: 1
          maxLength: 200
        source:
          $ref: '#/components/schemas/SourceReference'
        customer_id:
          type: string
          format: uuid
        invoice_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        currency_code:
          type: string
          pattern: '^[A-Z]{3}$'
        rounding_minor_units:
          type: integer
          minimum: 0
          maximum: 6
          default: 2
        lines:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/CustomerInvoiceLine'
    CreditCustomerInvoiceRequest:
      type: object
      required: [idempotency_key, source, reason]
      properties:
        idempotency_key:
          type: string
          minLength: 1
          maxLength: 200
        source:
          $ref: '#/components/schemas/SourceReference'
        reason:
          type: string
          minLength: 1
          maxLength: 1000
    PostedInvoiceLine:
      type: object
      required:
        - line_number
        - description
        - quantity
        - unit_price
        - discount_percent
        - gross_amount
        - discount_amount
        - net_amount
        - tax_amount
        - total_amount
      properties:
        line_number:
          type: integer
        description:
          type: string
        quantity:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        unit_price:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        discount_percent:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        gross_amount:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        discount_amount:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        net_amount:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        tax_code:
          type: string
          nullable: true
        tax_rate_percent:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
          nullable: true
        tax_amount:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        total_amount:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
    PostedInvoice:
      type: object
      required:
        - id
        - document_number
        - document_type
        - status
        - customer_id
        - source
        - invoice_date
        - due_date
        - currency_code
        - rounding_minor_units
        - subtotal
        - discount_amount
        - tax_amount
        - total_amount
        - posted_at
        - lines
      properties:
        id:
          type: string
          format: uuid
        document_number:
          type: string
        document_type:
          type: string
          enum: [CUSTOMER_INVOICE, CUSTOMER_CREDIT_NOTE]
        status:
          type: string
          enum: [POSTED]
        original_document_id:
          type: string
          format: uuid
          nullable: true
        customer_id:
          type: string
          format: uuid
        source:
          $ref: '#/components/schemas/SourceReference'
        invoice_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        currency_code:
          type: string
        rounding_minor_units:
          type: integer
        subtotal:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        discount_amount:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        tax_amount:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        total_amount:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        posted_at:
          type: string
          format: date-time
        lines:
          type: array
          items:
            $ref: '#/components/schemas/PostedInvoiceLine'
    JournalLine:
      type: object
      required: [line_number, account_id, description, side, amount]
      properties:
        line_number:
          type: integer
        account_id:
          type: string
          format: uuid
        description:
          type: string
        side:
          type: string
          enum: [DEBIT, CREDIT]
        amount:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
    PostedJournal:
      type: object
      required:
        - id
        - entry_number
        - entry_date
        - source_document_id
        - currency_code
        - total_debit
        - total_credit
        - posted_at
        - lines
      properties:
        id:
          type: string
          format: uuid
        entry_number:
          type: string
        entry_date:
          type: string
          format: date
        source_document_id:
          type: string
          format: uuid
        currency_code:
          type: string
        total_debit:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        total_credit:
          type: string
          pattern: '^-?[0-9]+(?:\.[0-9]{1,6})?$'
        posted_at:
          type: string
          format: date-time
        lines:
          type: array
          items:
            $ref: '#/components/schemas/JournalLine'
    PostingResult:
      type: object
      required: [idempotency_key, request_fingerprint, invoice, journal]
      properties:
        idempotency_key:
          type: string
        request_fingerprint:
          type: string
          pattern: '^[a-f0-9]{64}$'
        invoice:
          $ref: '#/components/schemas/PostedInvoice'
        journal:
          $ref: '#/components/schemas/PostedJournal'
    RenderedDocument:
      type: object
      required:
        - document_id
        - media_type
        - sha256
        - size_bytes
        - renderer
        - renderer_version
        - rendered_at
        - download_url
        - expires_at
      properties:
        document_id:
          type: string
          format: uuid
        media_type:
          type: string
          enum: [application/pdf]
        sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        size_bytes:
          type: integer
          format: int64
          minimum: 1
        renderer:
          type: string
        renderer_version:
          type: string
        rendered_at:
          type: string
          format: date-time
        download_url:
          type: string
          format: uri
        expires_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
