[package]
name = "rerp-accounting-core"
version = "0.1.3"
edition = "2021"
description = "Pure accounting invariants and posting plans for RERP"
license = "MIT OR Apache-2.0"

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
rust_decimal = { version = "1.33", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
uuid = { version = "1.0", features = ["serde", "v4"] }

[dev-dependencies]
rust_decimal_macros = "1.33"

[lib]
name = "rerp_accounting_core"
path = "src/lib.rs"
