              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token for authentication. Include in Authorization header as 'Bearer <token>'.
  schemas:
    Account:
      type: object
      required:
      - id
      - chart_of_account_id
      - code
      - name
      - account_type
      - normal_balance
      - currency_code
      - is_active
      - is_system_account
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the account
        chart_of_account_id:
          type: string
          format: uuid
          description: Parent chart of accounts node
        code:
          type: string
          maxLength: 50
          pattern: ^[A-Z0-9._-]+$
          description: Account code (e.g., '1010', '2000.1', '5.1.2')
        name:
          type: string
          maxLength: 255
          description: Account display name
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
          description: Account classification determining normal balance direction
        normal_balance:
          type: string
          enum:
          - DEBIT
          - CREDIT
          description: Expected normal balance side for this account type
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          pattern: ^[A-Z]{3}$
          description: ISO 4217 currency code (e.g., USD, EUR, GBP)
        is_active:
          type: boolean
          description: Whether the account is active (inactive accounts can still be referenced by historical entries)
        is_system_account:
          type: boolean
          description: System-defined account that cannot be modified or deleted
        description:
          type: string
          maxLength: 1000
          nullable: true
          description: Optional account description
        metadata:
          type: object
          nullable: true
          description: Arbitrary metadata for extensions
          properties:
            tags:
              type: array
              items:
                type: string
            custom_fields:
              type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
          nullable: true
        updated_by:
          type: string
          format: uuid
          nullable: true
    AccountWithBalance:
      allOf:
      - $ref: '#/components/schemas/Account'
      - type: object
        properties:
          current_balance:
            type: number
            format: double
            description: Current account balance (debit - credit)
          opening_balance:
            type: number
            format: double
            description: Balance at start of current period
          period_debits:
            type: number
            format: double
            description: Total debits in current period
          period_credits:
            type: number
            format: double
            description: Total credits in current period
          child_accounts:
            type: array
            items:
              $ref: '#/components/schemas/Account'
            description: Direct child accounts in chart hierarchy
    AccountBalance:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        account_code:
          type: string
          maxLength: 50
        account_name:
          type: string
          maxLength: 255
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
        opening_balance:
          type: number
          format: double
          description: Balance at start of period
        period_debits:
          type: number
          format: double
          description: Total debits in period
        period_credits:
          type: number
          format: double
          description: Total credits in period
        closing_balance:
          type: number
          format: double
          description: Balance at end of period
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        period_id:
          type: string
          format: uuid
          nullable: true
          description: Fiscal period this balance is for
        as_of_date:
          type: string
          format: date
          description: Date as of which balance is calculated
    ChartOfAccount:
      type: object
      required:
      - id
      - code
      - name
      - account_type
      - level
      - is_active
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          maxLength: 50
          description: Chart code for grouping accounts
        name:
          type: string
          maxLength: 255
          description: Chart display name
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
          description: Default account type for accounts in this chart
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: Parent chart node for hierarchy
        level:
          type: integer
          minimum: 0
          description: Hierarchy depth level
        is_active:
          type: boolean
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateChartOfAccountRequest:
      type: object
      required:
      - code
      - name
      - account_type
      properties:
        code:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 255
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
        parent_id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
          default: true
    UpdateChartOfAccountRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
    Journal:
      type: object
      required:
      - id
      - name
      - code
      - type
      - company_id
      - is_active
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
          description: Journal display name (e.g., 'General Journal', 'Sales Journal')
        code:
          type: string
          maxLength: 10
          pattern: ^[A-Z]{1,5}$
          description: Short code used as prefix for entry numbers (e.g., 'GEN', 'SAL', 'PCH')
        type:
          type: string
          enum:
          - ENTRY
          - SALE
          - PURCHASE
          - CASH
          - BANK
          - MISC
          description: Journal type determines default account and entry number format
        company_id:
          type: string
          format: uuid
          description: Company that owns this journal
        currency_id:
          type: string
          format: uuid
          nullable: true
          description: Default currency for entries in this journal
        default_account_id:
          type: string
          format: uuid
          nullable: true
          description: Default account for entries when not specified
        suspense_account_id:
          type: string
          format: uuid
          nullable: true
          description: Account for entries awaiting classification
        sequence_number_next:
          type: integer
          description: Next sequence number for entry numbering
        sequence_prefix:
          type: string
          maxLength: 10
          description: Prefix for entry numbering (e.g., 'GEN-2024-')
        company_code:
          type: string
          maxLength: 50
          description: Company code used in entry numbers
        is_active:
          type: boolean
          description: Whether the journal is available for new entries
        restrict_mode_hash_table:
          type: boolean
          description: If true, posted entries are secured with a hash (cannot be modified)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateJournalRequest:
      type: object
      required:
      - name
      - code
      - type
      - company_id
      properties:
        name:
          type: string
          maxLength: 100
          description: Journal display name
        code:
          type: string
          maxLength: 10
          pattern: ^[A-Z]{1,5}$
          description: Short code for entry numbering prefix
        type:
          type: string
          enum:
          - ENTRY
          - SALE
          - PURCHASE
          - CASH
          - BANK
          - MISC
          description: Journal type
        company_id:
          type: string
          format: uuid
        currency_id:
          type: string
          format: uuid
          nullable: true
        default_account_id:
          type: string
          format: uuid
          nullable: true
        suspense_account_id:
          type: string
          format: uuid
          nullable: true
        is_active:
          type: boolean
          default: true
    UpdateJournalRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        code:
          type: string
          maxLength: 10
        default_account_id:
          type: string
          format: uuid
          nullable: true
        suspense_account_id:
          type: string
          format: uuid
          nullable: true
        is_active:
          type: boolean
    JournalEntry:
      type: object
      required:
      - id
      - entry_number
      - entry_date
      - description
      - status
      - total_debit
      - total_credit
      - currency_code
      properties:
        id:
          type: string
          format: uuid
        entry_number:
          type: string
          maxLength: 50
          pattern: ^[A-Z0-9\-]+$
          description: Auto-generated or manual entry number (e.g., 'GEN-2024-0001')
        entry_date:
          type: string
          format: date
          description: Accounting date of the entry
        description:
          type: string
          maxLength: 500
          description: Entry description/narration
        reference_number:
          type: string
          maxLength: 100
          nullable: true
          description: External reference number
        journal_id:
          type: string
          format: uuid
          nullable: true
          description: Journal this entry belongs to
        status:
          type: string
          enum:
          - DRAFT
          - APPROVED
          - POSTED
          - REVERSED
          description: Entry lifecycle state
          example: DRAFT
        total_debit:
          type: number
          format: double
          description: Sum of all line debits
          example: 5000.0
        total_credit:
          type: number
          format: double
          description: Sum of all line credits
          example: 5000.0
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          pattern: ^[A-Z]{3}$
          description: ISO 4217 currency code
        exchange_rate:
          type: number
          format: double
          minimum: 0.0001
          description: Exchange rate to company currency (1 foreign = X company currency)
        company_id:
          type: string
          format: uuid
          nullable: true
          description: Company this entry belongs to
        fiscal_period_id:
          type: string
          format: uuid
          nullable: true
          description: Fiscal period this entry is posted to
        posted_at:
          type: string
          format: date-time
          nullable: true
          description: When the entry was posted
        posted_by:
          type: string
          format: uuid
          nullable: true
          description: User who posted the entry
        reversed_at:
          type: string
          format: date-time
          nullable: true
        reversed_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
          nullable: true
        updated_by:
          type: string
          format: uuid
          nullable: true
    JournalEntryWithLines:
      allOf:
      - $ref: '#/components/schemas/JournalEntry'
      - type: object
        properties:
          lines:
            type: array
            description: Must have at least 2 lines with balanced debits and credits
            items:
              $ref: '#/components/schemas/JournalEntryLine'
            minItems: 2
    JournalEntryLine:
      type: object
      required:
      - id
      - account_id
      - debit
      - credit
      properties:
        id:
          type: string
          format: uuid
        journal_entry_id:
          type: string
          format: uuid
          description: Parent journal entry
        account_id:
          type: string
          format: uuid
          description: GL account for this line item
        debit:
          type: number
          format: double
          minimum: 0
          description: Debit amount (positive only)
          example: 5000.0
        credit:
          type: number
          format: double
          minimum: 0
          description: Credit amount (positive only)
          example: 0.0
        name:
          type: string
          maxLength: 500
          nullable: true
          description: Line description/narration
        reference_number:
          type: string
          maxLength: 100
          nullable: true
          description: External reference for this line
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          nullable: true
          description: Currency for this line (if different from entry currency)
        amount_currency:
          type: number
          format: double
          nullable: true
          description: Amount in foreign currency (for multi-currency entries)
        balance:
          type: number
          format: double
          description: Computed balance (debit - credit)
        date:
          type: string
          format: date
          nullable: true
          description: Line-specific date (defaults to entry date)
        date_maturity:
          type: string
          format: date
          nullable: true
          description: Due date for payable/receivable lines
        partner_id:
          type: string
          format: uuid
          nullable: true
          description: Customer/vendor partner for this line
        analytic_distribution:
          type: object
          nullable: true
          description: 'Analytic/accounting distribution (e.g., {1: 50.0, 2: 50.0} for 50/50 split across cost centers)'
        tax_ids:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: Associated tax IDs
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateJournalEntryRequest:
      type: object
      required:
      - journal_id
      - entry_date
      - description
      - currency_code
      - lines
      properties:
        journal_id:
          type: string
          format: uuid
          description: Journal to post this entry to
        entry_number:
          type: string
          maxLength: 50
          nullable: true
          description: Auto-generated if not provided
        entry_date:
          type: string
          format: date
          description: Accounting date for this entry
        description:
          type: string
          maxLength: 500
          description: Entry narration/description
        reference_number:
          type: string
          maxLength: 100
          nullable: true
        company_id:
          type: string
          format: uuid
          nullable: true
          description: Company for this entry
        fiscal_period_id:
          type: string
          format: uuid
          nullable: true
          description: Fiscal period to assign
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          pattern: ^[A-Z]{3}$
          description: ISO 4217 currency code
        exchange_rate:
          type: number
          format: double
          minimum: 0.0001
          default: 1.0
          description: Exchange rate to company currency
        lines:
          type: array
          description: Debit/credit line items. At least 2 lines required. Total debits must equal total credits.
          items:
            $ref: '#/components/schemas/LineItemRequest'
          minItems: 2
          maxItems: 100
    LineItemRequest:
      type: object
      required:
      - account_id
      properties:
        account_id:
          type: string
          format: uuid
          description: GL account for this line
        debit:
          type: number
          format: double
          minimum: 0
          default: 0.0
          description: Debit amount (positive, non-negative)
        credit:
          type: number
          format: double
          minimum: 0
          default: 0.0
          description: Credit amount (positive, non-negative)
        name:
          type: string
          maxLength: 500
          nullable: true
          description: Line narration
        reference_number:
          type: string
          maxLength: 100
          nullable: true
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          nullable: true
        amount_currency:
          type: number
          format: double
          nullable: true
        partner_id:
          type: string
          format: uuid
          nullable: true
        analytic_distribution:
          type: object
          nullable: true
        tax_ids:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
    UpdateJournalEntryRequest:
      type: object
      properties:
        entry_date:
          type: string
          format: date
        description:
          type: string
          maxLength: 500
        reference_number:
          type: string
          maxLength: 100
          nullable: true
        lines:
          type: array
          items:
            $ref: '#/components/schemas/LineItemRequest'
          description: Replacement line items (entire lines array replaced on update)
    ReverseJournalEntryRequest:
      type: object
      properties:
        description:
          type: string
          maxLength: 500
          nullable: true
          description: Override description for the reversing entry. Auto-generated if not provided.
        use_original_date:
          type: boolean
          default: false
          description: If true, use the original entry date. If false, use current date.
    FiscalPeriod:
      type: object
      required:
      - id
      - name
      - company_id
      - start_date
      - end_date
      - year
      - month
      - is_locked
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
          description: Period display name (e.g., 'January 2024')
        company_id:
          type: string
          format: uuid
          description: Company this period belongs to
        start_date:
          type: string
          format: date
          description: Period start date (inclusive)
        end_date:
          type: string
          format: date
          description: Period end date (inclusive)
        year:
          type: integer
          minimum: 1900
          maximum: 2100
          description: Fiscal year
        month:
          type: integer
          minimum: 1
          maximum: 12
          description: Month number (1-12). Null for annual periods.
        is_locked:
          type: boolean
          description: When true, no new entries can be created/modified in this period
        is_open:
          type: boolean
          nullable: true
          description: Computed field - true if current date is within period and not locked
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateFiscalPeriodRequest:
      type: object
      required:
      - name
      - company_id
      - start_date
      - end_date
      - year
      properties:
        name:
          type: string
          maxLength: 100
        company_id:
          type: string
          format: uuid
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        year:
          type: integer
          minimum: 1900
          maximum: 2100
        month:
          type: integer
          minimum: 1
          maximum: 12
          nullable: true
          description: Null for annual periods
    UpdateFiscalPeriodRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        is_locked:
          type: boolean
        is_open:
          type: boolean
    TrialBalanceReport:
      type: object
      required:
      - report_date
      - total_debits
      - total_credits
      - lines
      properties:
        report_date:
          type: string
          format: date
          description: Report generation date
        company_id:
          type: string
          format: uuid
          description: Company this report is for
        period_id:
          type: string
          format: uuid
          nullable: true
          description: Fiscal period this report covers
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: Report currency
        total_debits:
          type: number
          format: double
          description: Sum of all debit balances
          example: 1250000.0
        total_credits:
          type: number
          format: double
          description: Sum of all credit balances
          example: 1250000.0
        difference:
          type: number
          format: double
          description: Difference (should be 0 for balanced trial balance)
          example: 0.0
        lines:
          type: array
          items:
            $ref: '#/components/schemas/TrialBalanceLine'
          description: One line per account
    TrialBalanceLine:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        account_code:
          type: string
          maxLength: 50
        account_name:
          type: string
          maxLength: 255
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
        opening_balance:
          type: number
          format: double
          description: Balance at start of period
        period_debits:
          type: number
          format: double
          description: Total debits during period
        period_credits:
          type: number
          format: double
          description: Total credits during period
        closing_balance:
          type: number
          format: double
          description: Balance at end of period
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
    AccountBalancesReport:
      type: object
      properties:
        report_date:
          type: string
          format: date
        company_id:
          type: string
          format: uuid
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        total_assets:
          type: number
          format: double
        total_liabilities:
          type: number
          format: double
        total_equity:
          type: number
          format: double
        total_revenue:
          type: number
          format: double
        total_expenses:
          type: number
          format: double
        net_income:
          type: number
          format: double
        lines:
          type: array
          items:
            $ref: '#/components/schemas/AccountBalance'
    LedgerReport:
      type: object
      properties:
        report_date:
          type: string
          format: date
        company_id:
          type: string
          format: uuid
        period_id:
          type: string
          format: uuid
          nullable: true
        date_from:
          type: string
          format: date
        date_to:
          type: string
          format: date
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        total_lines:
          type: integer
          description: Number of line items in report
        lines:
          type: array
          items:
            $ref: '#/components/schemas/LedgerReportLine'
    LedgerReportLine:
      type: object
      properties:
        entry_id:
          type: string
          format: uuid
        entry_number:
          type: string
          maxLength: 50
        entry_date:
          type: string
          format: date
        entry_description:
          type: string
        journal_code:
          type: string
          maxLength: 10
        line_number:
          type: integer
          description: Line number within the entry
        account_code:
          type: string
          maxLength: 50
        account_name:
          type: string
          maxLength: 255
        debit:
          type: number
          format: double
        credit:
          type: number
          format: double
        balance:
          type: number
          format: double
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        reference:
          type: string
          maxLength: 100
    PaginatedAccounts:
      type: object
      required:
      - items
      - total
      - page
      - limit
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        total:
          type: integer
          description: Total number of accounts matching the query
          example: 150
        page:
          type: integer
          description: Current page number
          example: 1
        limit:
          type: integer
          description: Number of items per page
          example: 20
        has_more:
          type: boolean
          description: Whether more pages exist
    PaginatedChartOfAccounts:
      type: object
      required:
      - items
      - total
      - page
      - limit
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ChartOfAccount'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        has_more:
          type: boolean
    PaginatedJournalEntries:
      type: object
      required:
      - items
      - total
      - page
      - limit
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/JournalEntry'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        has_more:
          type: boolean
    PaginatedJournals:
      type: object
      required:
      - items
      - total
      - page
      - limit
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Journal'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        has_more:
          type: boolean
    PaginatedFiscalPeriods:
      type: object
      required:
      - items
      - total
      - page
      - limit
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FiscalPeriod'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        has_more:
          type: boolean
    CreateAccountRequest:
      type: object
      required:
      - chart_of_account_id
      - code
      - name
      - account_type
      - normal_balance
      - currency_code
      properties:
        chart_of_account_id:
          type: string
          format: uuid
          description: Parent chart of accounts node
        code:
          type: string
          maxLength: 50
          pattern: ^[A-Z0-9._-]+$
          description: Account code (unique within chart)
        name:
          type: string
          maxLength: 255
          description: Account display name
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
        normal_balance:
          type: string
          enum:
          - DEBIT
          - CREDIT
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          pattern: ^[A-Z]{3}$
        description:
          type: string
          maxLength: 1000
          nullable: true
        is_active:
          type: boolean
          default: true
    UpdateAccountRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 1000
          nullable: true
        is_active:
          type: boolean
        account_type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
    BulkApproveRequest:
      type: object
      required:
      - entry_ids
      properties:
        entry_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 100
          description: List of entry IDs to approve
    BulkPostRequest:
      type: object
      required:
      - entry_ids
      properties:
        entry_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 100
          description: List of entry IDs to post
    BulkActionResult:
      type: object
      required:
      - total
      - succeeded
      - failed
      - results
      properties:
        total:
          type: integer
          description: Total entries processed
        succeeded:
          type: integer
          description: Number of successful operations
        failed:
          type: integer
          description: Number of failed operations
        results:
          type: array
          items:
            type: object
            properties:
              entry_id:
                type: string
                format: uuid
              success:
                type: boolean
              error:
                type: string
                nullable: true
              result:
                nullable: true
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Machine-readable error code
          enum:
          - NOT_FOUND
          - UNAUTHORIZED
          - FORBIDDEN
          - CONFLICT
          - SERVER_ERROR
          - UNKNOWN
          example: NOT_FOUND
        message:
          type: string
          description: Human-readable error message
          example: Account not found
        details:
          type: object
          nullable: true
          description: Additional error context
    ValidationError:
      type: object
      required:
      - code
      - message
      - errors
      properties:
        code:
          type: string
          enum:
          - VALIDATION_ERROR
          description: Validation error code
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable validation error message
          example: Journal entry must be balanced
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
          description: List of field-level validation errors
        line_errors:
          type: array
          items:
            $ref: '#/components/schemas/LineError'
          nullable: true
          description: Line-level validation errors (for journal entries)
        total_debit:
          type: number
          format: double
          nullable: true
        total_credit:
          type: number
          format: double
          nullable: true
        difference:
          type: number
          format: double
          nullable: true
        tolerance:
          type: number
          format: double
          default: 0.01
          description: Balancing tolerance in the entry's currency
    FieldError:
      type: object
      required:
      - field
      - message
      properties:
        field:
          type: string
          description: Field name that failed validation
          example: lines
        message:
          type: string
          description: Human-readable error for this field
          example: Total debits do not equal total credits
        details:
          type: object
          nullable: true
    LineError:
      type: object
      required:
      - index
      - field
      - message
      properties:
        index:
          type: integer
          description: Line item index (0-based)
        field:
          type: string
          description: Field that failed validation
          example: debit
        message:
          type: string
          description: Human-readable error for this line field
          example: Debit exceeds expected amount
security:
- bearerAuth: []
