openapi: 3.1.0
info:
  title: General Ledger
  version: 1.0.0
  description: 'Core accounting service managing general ledger accounts, chart of accounts, journals, journal entries with debit/credit lines, fiscal periods, and trial balance reporting. Supports full double-entry accounting lifecycle: draft, approved, posted, reconciled, and reversed.'
  contact:
    name: RERP Accounting API Support
    email: accounting-api@rerp.ai
servers:
- url: http://localhost:8001/api/v1/accounting/general-ledger
  description: Local development (direct to service, port from port-registry)
- url: /api/v1/accounting/general-ledger
  description: General Ledger API
tags:
- name: accounts
  description: General ledger accounts and their properties
- name: chart-of-accounts
  description: Chart of accounts hierarchy and structure
- name: journals
  description: Accounting journals (sales, purchase, cash, bank, general)
- name: journal-entries
  description: Journal entries and their debit/credit line items
- name: fiscal-periods
  description: Accounting fiscal periods and lock dates
- name: reports
  description: Trial balance, ledger, and account balance reports
- name: reconciliations
  description: Account reconciliation management
paths:
  /accounts:
    get:
      operationId: list_accounts
      summary: List ledger accounts
      description: Paginated list of all general ledger accounts, filtered by type, parent, and active status.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
        description: Free-text search on code and name
      - name: account_type
        in: query
        schema:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - EQUITY
          - REVENUE
          - EXPENSE
      - name: parent_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by parent chart of account
      - name: active
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: Paginated list of accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAccounts'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_account
      summary: Create account
      description: Create a new general ledger account with chart of account hierarchy.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '409':
          description: Account code already exists in this chart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /accounts/{id}:
    get:
      operationId: get_account
      summary: Get account by id
      description: Retrieve a single general ledger account with its full hierarchy and balance information.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Account details with balances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountWithBalance'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: update_account
      summary: Update account
      description: 'Update an existing account. Note: posting an account''s code or type may be restricted if posted entries reference it.'
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: delete_account
      summary: Delete account
      description: Soft delete an account. Cannot delete if the account has posted entries or is referenced by posted journal entries.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Account deleted
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /accounts/{id}/balance:
    get:
      operationId: get_account_balance
      summary: Get account balance
      description: Get the current balance of an account for a specified period, including opening balance, debits, credits, and closing balance.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: period_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Fiscal period to calculate balance for. If omitted, returns total balance.
      - name: currency_code
        in: query
        required: false
        schema:
          type: string
          minLength: 3
          maxLength: 3
        description: Currency to calculate balance in. Defaults to account's currency.
      responses:
        '200':
          description: Account balance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalance'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /chart-of-accounts:
    get:
      operationId: list_chart_of_accounts
      summary: List chart of accounts
      description: List all chart of accounts hierarchies. Supports filtering by parent to get sub-accounts.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: parent_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by parent chart of account (returns children)
      - name: level
        in: query
        schema:
          type: integer
          minimum: 0
        description: Filter by hierarchy level
      responses:
        '200':
          description: Paginated list of chart of accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChartOfAccounts'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_chart_of_account
      summary: Create chart of account
      description: Create a new chart of accounts hierarchy node.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChartOfAccountRequest'
      responses:
        '201':
          description: ChartOfAccount created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartOfAccount'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /chart-of-accounts/{id}:
    get:
      operationId: get_chart_of_account
      summary: Get chart of account by id
      description: Get chart of account details
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: ChartOfAccount details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartOfAccount'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: update_chart_of_account
      summary: Update chart of account
      description: Update a chart of accounts node
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChartOfAccountRequest'
      responses:
        '200':
          description: ChartOfAccount updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartOfAccount'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: delete_chart_of_account
      summary: Delete chart of account
      description: Delete a chart of accounts node
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: ChartOfAccount deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /journals:
    get:
      operationId: list_journals
      summary: List accounting journals
      description: List all accounting journals with their configuration, types, and sequences.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: type
        in: query
        schema:
          type: string
          enum:
          - ENTRY
          - SALE
          - PURCHASE
          - CASH
          - BANK
          - MISC
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Paginated list of journals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJournals'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_journal
      summary: Create journal
      description: Create a new accounting journal. Journals define the source of entries and control numbering sequences.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJournalRequest'
      responses:
        '201':
          description: Journal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Journal'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /journals/{id}:
    get:
      operationId: get_journal
      summary: Get journal by id
      description: Get journal details
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Journal details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Journal'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: update_journal
      summary: Update journal
      description: Update a journal's configuration
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJournalRequest'
      responses:
        '200':
          description: Journal updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Journal'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: delete_journal
      summary: Archive journal
      description: Archive a journal (soft delete). Cannot archive if the journal has posted entries in open periods.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Journal archived
        '409':
          description: Cannot archive journal with posted entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /journal-entries:
    get:
      operationId: list_journal_entries
      summary: List journal entries
      description: Paginated list of all journal entries with optional filtering by status, date range, journal, account, and fiscal period.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
        description: Search by entry number, reference, or description
      - name: status
        in: query
        schema:
          type: string
          enum:
          - DRAFT
          - APPROVED
          - POSTED
          - REVERSED
        description: Filter by entry status
      - name: journal_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by journal
      - name: account_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by account (returns entries containing this account)
      - name: date_from
        in: query
        schema:
          type: string
          format: date
        description: Filter entries from this date (inclusive)
      - name: date_to
        in: query
        schema:
          type: string
          format: date
        description: Filter entries up to this date (inclusive)
      - name: fiscal_period_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by fiscal period
      - name: currency_code
        in: query
        schema:
          type: string
          minLength: 3
          maxLength: 3
      responses:
        '200':
          description: Paginated list of journal entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJournalEntries'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_journal_entry
      summary: Create journal entry
      description: Create a new journal entry with mandatory debit/credit line items. Total debits must equal total credits (double-entry accounting). Entries start in DRAFT status and must be approved and posted.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJournalEntryRequest'
      responses:
        '201':
          description: 'JournalEntry created (status: DRAFT)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntry'
        '400':
          description: Validation error (e.g., unbalanced debits/credits, invalid date)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '409':
          description: Journal entry date is in a closed fiscal period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /journal-entries/{id}:
    get:
      operationId: get_journal_entry
      summary: Get journal entry by id
      description: Retrieve a single journal entry with its full debit/credit line items.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: JournalEntry details with lines
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryWithLines'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: update_journal_entry
      summary: Update journal entry
      description: Update a journal entry. Only entries in DRAFT status can be modified. Entries with lines must remain balanced after update.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJournalEntryRequest'
      responses:
        '200':
          description: JournalEntry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntry'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot update posted or reversed entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: delete_journal_entry
      summary: Delete journal entry
      description: Delete a journal entry. Only entries in DRAFT status can be deleted. Posted entries must be reversed instead.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: JournalEntry deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot delete posted entries; reverse them instead
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /journal-entries/{id}/approve:
    post:
      operationId: approve_journal_entry
      summary: Approve journal entry
      description: Transition a journal entry from DRAFT to APPROVED status. An approved entry cannot be modified but can be posted. The entry must have balanced lines (total debit = total credit).
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: JournalEntry approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntry'
        '400':
          description: Cannot approve - entry must be in DRAFT status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Entry is not balanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /journal-entries/{id}/post:
    post:
      operationId: post_journal_entry
      summary: Post journal entry
      description: Transition a journal entry from APPROVED to POSTED status. Posting finalizes the entry and updates all account balances. Cannot post entries with dates in closed fiscal periods.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: JournalEntry posted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntry'
        '400':
          description: Cannot post - entry must be in APPROVED status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Entry date is in a closed fiscal period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /journal-entries/{id}/reverse:
    post:
      operationId: reverse_journal_entry
      summary: Reverse journal entry
      description: Create a reversing entry for a posted journal entry. The new entry has opposite debits/credits and same amount. The original entry is marked as REVERSED.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReverseJournalEntryRequest'
      responses:
        '201':
          description: Reversing entry created and original marked as REVERSED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntry'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Only posted entries can be reversed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /journal-entries/bulk-approve:
    post:
      operationId: bulk_approve_journal_entries
      summary: Bulk approve journal entries
      description: Approve multiple journal entries in a single operation. Returns success/failure for each entry ID.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkApproveRequest'
      responses:
        '200':
          description: Bulk approval results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkActionResult'
        '400':
          description: No entry IDs provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /journal-entries/bulk-post:
    post:
      operationId: bulk_post_journal_entries
      summary: Bulk post journal entries
      description: Post multiple approved journal entries in a single operation.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkPostRequest'
      responses:
        '200':
          description: Bulk post results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkActionResult'
        '400':
          description: No entry IDs provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /fiscal-periods:
    get:
      operationId: list_fiscal_periods
      summary: List fiscal periods
      description: List all accounting fiscal periods with their date ranges and lock status.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: year
        in: query
        schema:
          type: integer
      - name: locked
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: Paginated list of fiscal periods
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFiscalPeriods'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: create_fiscal_period
      summary: Create fiscal period
      description: Create a new accounting fiscal period with date range and lock settings.
      x-brrtrouter-impl: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFiscalPeriodRequest'
      responses:
        '201':
          description: FiscalPeriod created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FiscalPeriod'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /fiscal-periods/{id}:
    get:
      operationId: get_fiscal_period
      summary: Get fiscal period by id
      description: Get fiscal period details
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: FiscalPeriod details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FiscalPeriod'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: update_fiscal_period
      summary: Update fiscal period
      description: Update a fiscal period's date range or lock settings. Cannot modify dates if the period has posted entries.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFiscalPeriodRequest'
      responses:
        '200':
          description: FiscalPeriod updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FiscalPeriod'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot modify dates of period with posted entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: delete_fiscal_period
      summary: Delete fiscal period
      description: Delete a fiscal period. Cannot delete if the period has posted entries.
      x-brrtrouter-impl: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: FiscalPeriod deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot delete period with posted entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /reports/trial-balance:
