openapi: 3.0.3
info:
  title: RERP General Ledger API
  version: 0.2.0
  description: >-
    Phase 1 read-only General Ledger contract over RERP's authoritative
    accounting foundation. Tenant, organization, and legal-entity scope come
    only from the validated Sesame identity, which must carry the
    accounting:ledger:read permission. This API does not expose generic journal
    posting or mutable ledger records.
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - name: ledger
    description: Tenant-safe inspection of the authoritative accounting books
paths:
  /v1/accounts:
    get:
      operationId: list_ledger_accounts
      x-brrtrouter-impl: true
      tags: [ledger]
      summary: List configured posting accounts
      parameters:
        - name: account_type
          in: query
          schema:
            type: string
            enum: [ASSET, LIABILITY, EQUITY, REVENUE, EXPENSE]
        - name: currency_code
          in: query
          schema:
            type: string
            pattern: '^[A-Z]{3}$'
        - name: active
          in: query
          schema:
            type: boolean
            default: true
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Accounts visible to the authenticated legal entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/fiscal-periods:
    get:
      operationId: list_fiscal_periods
      x-brrtrouter-impl: true
      tags: [ledger]
      summary: List fiscal periods
      parameters:
        - name: state
          in: query
          schema:
            type: string
            enum: [OPEN, CLOSED, HARD_LOCKED]
        - name: from_date
          in: query
          description: Return periods ending on or after this date
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          description: Return periods starting on or before this date
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Fiscal periods visible to the authenticated legal entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FiscalPeriodList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/journal-entries/{id}:
    get:
      operationId: get_journal_entry
      x-brrtrouter-impl: true
      tags: [ledger]
      summary: Retrieve one immutable posted journal
      parameters:
        - $ref: '#/components/parameters/JournalEntryId'
      responses:
        '200':
          description: Posted journal and its one-sided lines
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/trial-balance:
    get:
      operationId: get_trial_balance
      x-brrtrouter-impl: true
      tags: [ledger]
      summary: Derive a trial balance from immutable posted journal lines
      parameters:
        - name: as_of_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: currency_code
          in: query
          required: true
          schema:
            type: string
            pattern: '^[A-Z]{3}$'
        - name: include_zero_balance
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Trial balance derived at the requested accounting date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrialBalance'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Sesame access token validated by BRRTRouter
  parameters:
    JournalEntryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Invalid request parameter
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated identity lacks permission or cannot establish an accounting scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found in the authenticated accounting scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Accounting query could not be completed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      additionalProperties: false
      properties:
        code:
          type: string
        message:
          type: string
    LedgerAccount:
      type: object
      required:
        - id
        - code
        - name
        - account_type
        - normal_side
        - currency_code
        - active
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        account_type:
          type: string
          enum: [ASSET, LIABILITY, EQUITY, REVENUE, EXPENSE]
        normal_side:
          type: string
          enum: [DEBIT, CREDIT]
        control_role:
          type: string
          nullable: true
        currency_code:
          type: string
          pattern: '^[A-Z]{3}$'
        active:
          type: boolean
    AccountList:
      type: object
      required: [items, limit]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LedgerAccount'
        limit:
          type: integer
    FiscalPeriod:
      type: object
      required: [id, name, start_date, end_date, state]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        state:
          type: string
          enum: [OPEN, CLOSED, HARD_LOCKED]
        closed_at:
          type: string
          format: date-time
          nullable: true
    FiscalPeriodList:
      type: object
      required: [items, limit]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FiscalPeriod'
        limit:
          type: integer
    JournalLine:
      type: object
      required: [line_number, account_id, side, amount, description]
      additionalProperties: false
      properties:
        line_number:
          type: integer
        account_id:
          type: string
          format: uuid
        side:
          type: string
          enum: [DEBIT, CREDIT]
        amount:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
        description:
          type: string
    JournalEntry:
      type: object
      required:
        - id
        - entry_number
        - entry_date
        - fiscal_period_id
        - source_document_id
        - currency_code
        - total_debit
        - total_credit
        - posted_at
        - lines
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        entry_number:
          type: string
        entry_date:
          type: string
          format: date
        fiscal_period_id:
          type: string
          format: uuid
        source_document_id:
          type: string
          format: uuid
        currency_code:
          type: string
          pattern: '^[A-Z]{3}$'
        total_debit:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
        total_credit:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
        posted_at:
          type: string
          format: date-time
        lines:
          type: array
          items:
            $ref: '#/components/schemas/JournalLine'
    TrialBalanceLine:
      type: object
      required:
        - account_id
        - account_code
        - account_name
        - account_type
        - normal_side
        - debit
        - credit
        - balance
      additionalProperties: false
      properties:
        account_id:
          type: string
          format: uuid
        account_code:
          type: string
        account_name:
          type: string
        account_type:
          type: string
          enum: [ASSET, LIABILITY, EQUITY, REVENUE, EXPENSE]
        normal_side:
          type: string
          enum: [DEBIT, CREDIT]
        debit:
          type: string
          pattern: '^-?[0-9]+(\.[0-9]+)?$'
        credit:
          type: string
          pattern: '^-?[0-9]+(\.[0-9]+)?$'
        balance:
          type: string
          pattern: '^-?[0-9]+(\.[0-9]+)?$'
    TrialBalance:
      type: object
      required:
        - as_of_date
        - currency_code
        - total_debit
        - total_credit
        - difference
        - balanced
        - lines
      additionalProperties: false
      properties:
        as_of_date:
          type: string
          format: date
        currency_code:
          type: string
          pattern: '^[A-Z]{3}$'
        total_debit:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
        total_credit:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
        difference:
          type: string
          pattern: '^-?[0-9]+(\.[0-9]+)?$'
        balanced:
          type: boolean
        lines:
          type: array
          items:
            $ref: '#/components/schemas/TrialBalanceLine'
