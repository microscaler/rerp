      - name: period_id
        in: query
        schema:
          type: string
          format: uuid
      - name: company_id
        in: query
        schema:
          type: string
          format: uuid
      - name: currency_code
        in: query
        schema:
          type: string
          minLength: 3
          maxLength: 3
      responses:
        '200':
          description: Account balances summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalancesReport'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /journals/{id}/entries:
    get:
      operationId: list_journal_entries_by_journal
