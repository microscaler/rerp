[package]
name = "rerp_accounting_general_ledger"
version = "0.1.3"
edition = "2021"
build = "build.rs"

[lib]
name = "rerp_accounting_general_ledger"
path = "src/lib.rs"

[[bin]]
name = "general_ledger"
path = "src/main.rs"

[features]
default = ["jemalloc"]
jemalloc = ["tikv-jemallocator"]

[dependencies]
# Entities generated by build script
rerp_accounting_general_ledger_gen = { path = "../gen" }

# Lifeguard ORM
lifeguard = { workspace = true }
lifeguard-derive = { workspace = true }

# lifeguard-migrate used by generated entity_registry.rs
lifeguard-migrate = { path = "../../../../../lifeguard/lifeguard-migrate" }

# BRRTRouter (re-exported from gen crate, but may need direct access)
brrtrouter = { workspace = true }
brrtrouter_macros = { workspace = true }

# Sea-query for LifeModel derive macros
sea-query = { version = "1.0.0-rc.29", features = ["with-json"] }

# Standard dependencies
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
config = { workspace = true }
http = { workspace = true }
may = { workspace = true }
may_minihttp = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
arc-swap = { workspace = true }
rust_decimal = { workspace = true }
tikv-jemallocator = { workspace = true, optional = true }
chrono = { workspace = true }
uuid = { version = "1.0", features = ["v4", "serde"] }

[build-dependencies]
lifeguard-migrate = { path = "../../../../../lifeguard/lifeguard-migrate" }
