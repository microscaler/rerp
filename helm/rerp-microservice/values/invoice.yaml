service:
  name: invoice
image:
  repository: localhost:5001
  name: rerp-accounting-invoice
  tag: tilt
  pullPolicy: IfNotPresent
deployment:
  replicas: 1
  namespace: rerp
app:
  binaryName: invoice
  serviceName: invoice

# Invoice posting combines typed request validation, Lifeguard/RLS persistence,
# journal construction, and document/object-store work in handler coroutines.
env:
  BRRTR_STACK_SIZE: "0x40000"

extraEnv:
  # Non-secret object-store settings come from the GitOps-owned
  # rerp-database-config ConfigMap loaded through envFrom.
  - name: RERP_OBJECT_STORE_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: rerp-object-store
        key: access-key
  - name: RERP_OBJECT_STORE_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: rerp-object-store
        key: secret-key
