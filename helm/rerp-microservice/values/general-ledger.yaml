service:
  name: general-ledger
image:
  repository: localhost:5001
  name: rerp-accounting-general-ledger
  tag: tilt
  pullPolicy: IfNotPresent
deployment:
  replicas: 1
  namespace: rerp
app:
  binaryName: general_ledger
  serviceName: general-ledger

# Typed Lifeguard queries, RLS transaction setup, journal validation, and trial
# balance serialization require more than the shared coroutine-stack baseline.
env:
  BRRTR_STACK_SIZE: "0x40000"
