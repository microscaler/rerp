# Redis configuration for RERP — connects to shared-kind-cluster Redis
#
# The shared Kind cluster (kind-kind, managed by microscaler/shared-kind-cluster)
# provides Redis in namespace `data`. RERP microservices connect via DNS.
#
# This file is merged into helm values AFTER the per-service values file.
app:
  config:
    redis:
      host: "redis.data.svc.cluster.local"
      port: 6379
      db: 0
      max_connections: 10
    observability:
      metrics_enabled: true
      tracing_enabled: true
      otlp_endpoint: "http://otel-collector.observability.svc.cluster.local:4317"
