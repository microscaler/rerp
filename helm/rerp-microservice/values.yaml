# Default values for rerp-microservice
# This is a template - use service-specific values files instead

# Kubernetes-native service convention: every app Service is ClusterIP
# 8080 -> container 8080. Only an ingress/BFF or explicit Tilt port-forward is
# exposed to the host, so per-service port allocation is unnecessary.
service:
  name: ""  # e.g., general-ledger, invoice, accounts-receivable, accounts-payable
  port: 8080
  containerPort: 8080

# Image configuration
image:
  repository: localhost:5001
  name: ""  # e.g., rerp-accounting-general-ledger
  tag: tilt
  pullPolicy: IfNotPresent

# Deployment configuration
deployment:
  replicas: 1
  namespace: rerp

# Application configuration
app:
  binaryName: ""  # e.g., general_ledger_service_api
  serviceName: ""  # For OTEL service name, e.g., general-ledger
  config:
    security: {}
    http:
      keep_alive: true
      timeout_secs: 5
      max_requests: 50000
    database:
      host: "postgres"
      port: 5432
      name: "rerp"
      user: "rerp"
      max_connections: 2
    redis:
      host: "redis"
      port: 6379
      db: 0
      max_connections: 10
    observability:
      metrics_enabled: true
      tracing_enabled: true
      otlp_endpoint: "http://otel-collector:4317"

# Resources
resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "2000m"

databaseEnv:
  enabled: true
  configMapName: rerp-database-config
  secretName: rerp-db-credentials

# Arbitrary Kubernetes EnvVar entries. Service values may use either `value`
# or `valueFrom` (for Secret/ConfigMap keys).
extraEnv: []

# Health checks
healthCheck:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

# Environment variables
env:
  RUST_LOG: "debug"
  RUST_BACKTRACE: "1"
  BRRTR_LOG_FORMAT: "json"
  BRRTR_LOG_SAMPLING_MODE: "all"
  BRRTR_LOG_ASYNC: "true"
  BRRTR_LOG_INCLUDE_LOCATION: "false"
  # May coroutine stack in bytes. 128 KiB is the safe shared baseline for
  # BRRTRouter services which perform typed validation and database work.
  # Heavier services override this to BRRTRouter's 256 KiB default maximum.
  BRRTR_STACK_SIZE: "0x20000"

# Internal service-to-service routing; expose only BFF/ingress where required.
serviceType: ClusterIP

# Prometheus scraping
prometheus:
  enabled: true
  port: 8080
  path: "/metrics"
